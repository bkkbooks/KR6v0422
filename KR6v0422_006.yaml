body:
  text: 宋朝逈撰夫曲士束教不能宏達子好和會敷演庶有開悟焉據佛書楞嚴經説三無漏學謂戒定慧也豫於儒書周易中各取一句則象其理亦無差別今取損卦之文一句四字云懲忿窒欲用之以為戒又取繫辭一句四字云寂然不動用之以為定又取繫辭一句七字云精義入神以致用用之以為慧唯變所適有何不可維摩經云安處道場圓覺經云宴坐靜室豫重茲語句而怡然愜心圓覺道場修證儀第十一并本經清淨慧章注并引華嚴初地文云得經論智豫因自喜看經論生智思入道之初也寶積經云諸魔平等煩惱為先又云現住煩惱魔煩惱無所有又云智者於苦樂不動如虛空善觀察煩惱我我所俱離豫究經文重復言説足表無人無之當知煩惱性空既過即止無使留礙是其法也又聞之惟要略法中説心想住者見有種種色光從身而出又有經中説自覺聖智境界豫因思素聞靈響久而增勝亦可謂種種妙音從耳而聞乃目之曰自覺妙音境界莊子首篇名曰逍遙遊豫今動則臨文求智縱觀於法苑英華謂之外逍遙遊靜則反聽聞和凝神於妙音境界謂之內逍遙遊其趣尚也如此詳究寤時之想性所存也寐時之夢亦性所存也夢中所為之事皆己素所習者所見之人多己素所識者自念世間之法屬意浮沉偶經耳目猶得存於性中而不失況乎出世之法屬意深切洞貫心府固當存於性中其可失乎今生結緣既熟必為來生張本定矣易曰積善之家必有餘慶豫因擬之而言曰學道之心必有餘應何謂也夫家之積善此外事也善力延及猶為後嗣之慶心之學道此內志也道力延及豈失來生之應形聲影響又何疑乎三教之人皆有修行要法而人不能知不能行正相反夫居易俟命儒教修行要法也而多冒行於險徑深根固蒂道教修行要法也而多縱伐於元命息緣反照釋教修行要法也而多外役於正性順此三法其為利也可知矣反此三法其為害也可知矣全得之者上也得其二得其一者次之又次也全不得之者民斯下矣固無算也豫嘗夢中有如侍從遊觀之際不見己之僕馬方在憂煩忙迫計無所出忽爾夢覺豁然而喜因思楞嚴經云淨極光通達寂照含虛空却來觀世間猶如夢中事此喜可知也幻質無堅定隨化往靈心有覺須從靜來洞曉詳求斯為上智干將之劍利可刜鐘柙其鋒鋩則全也豫章之木高可凌雲護其根幹則成也聖賢之德蒙養正晦養明恬養智抑亦全成之道是以莊子辭千金重聘列子避五漿先饋姑務含華隱曜者意在此也前言有云三代之將道家所忌豫因續為兩句語曰四大之相智人所避學道者戒貪瞋癡具聞思修導氣令和引體令柔心靜而明息細而幽習頭陀行與逍遙遊不驚不怖無喜無憂幾乎出世名為入流恬智相養定慧之權輿也定慧均濟恬智之臻極也上根圓觀當如是解見聞為外寇意識為內應內外交締劫吾道寶吾知之矣自茲戒嚴伊豫內應慧悟增新由己性也道力深固由己志也慶緣畢會由天應也願出三福成吾一心豫似記憶李白有詩句云野禽啼杜宇山蝶舞莊周後又見佑有感懷詩句云幽禽喚杜宇宿蝶夢莊周席地一樽酒思與化元浮但莫辜明月何必秉燭遊豫謂才思暗合古今無殊不可怪也自念餘生得幾何固當隨時隨處於世間法中就隨分適意於出世法中就隨分冥心夫復奚云修道之法譬如金不鍊不精水不澄不清燈不燃不明穀不種不生其理必爾何以不信逆計而憂憂而無益況未必爾即悟而斷不如去憂觸境而怒怒而無益況多偶然即悟而斷不如去怒隨意立法出自然智出世有法此法難全全同聖賢接武差肩導之以仙而入於禪仙中之樂高蹈雲煙禪中之樂敻超人天處世有法此法易致致養情氣含和孕粹導之以醉而入於睡醉中之樂陶陶茂遂睡中之樂栩栩遨戲酌用隨宜消憂釋恚見道學法之人當令照了之智如明鑒之明果決之斷如利刃之利次第相應久久純熟自到大安樂處極見聞於外而周知者處世之明聖也反見聞於內而周知者出世之明聖也智明斷利力勝志堅四次第全可以入道周身之防外辦之事固鞭心入理內習之誠篤世故萬變推為大常有外官寓書于豫有語云仰燕居之申申諒吉祥之止止此雖奬飾之詞而暗合豫意中天機也因之竊喜而書於此莊子有云兩臂重於天下豫謂一身即可知也而有貪虛榮冗利據權門畏途恃力固守卒致覆族之禍者較其輕重何如哉斯為智乎大妙之道不在名相深智自明辨才難説立不易方行不由徑允執厥中不失其正口無擇言身無擇行餐和履順樂天知命見賢思齊同聲相應清心釋纍收視反聽澄神定靈窮理盡性從吾所好於茲為盛文中子中説有語云子曰變風變雅作而王澤竭矣變化變政作而帝制衰矣吾愛其言雅而理大因采而書之文中子謂賈瓊等曰諸生何樂賈瓊曰樂間居子曰靜以思道可矣豫覽之信以為然文中子謂房玄齡曰好成者敗之本也願廣者狹之道也豫覽此因思陰符經云生者死之根老子云福兮禍所伏殆相類乎自然之理也文中子中説云賈瓊曰甚矣天下之知子也子曰爾願知乎哉姑修焉天將知之而況於人乎豫覽此因自言云豫所修唯願天知不願人知也文中子曰廣仁益智莫善於問乘事演道莫善於對非明君孰能廣問乎非達臣孰能專對乎其可因旨引類鈎深致遠無不終乎鼂董公孫之對洋洋乎其對之宗乎其得王道之綱乎豫覽此乃知遠祖西漢大夫公其才智之大已經文中子盛稱之矣周易繫辭云精氣為物老子道經云恍兮惚其中有物窈兮冥其中有精噫精物兩字孔老二氏言之矣此乃妙用之本體也而釋氏但謂之實相而復教人不取於相是故人倫不能窮其理鬼神不能見其迹也唐權文公二疏贊有句云優遊衡門棲息化源日飲醇酎身間道尊豫愛其文美其事然而猶是處世之事也豫重出世之事因而同韻別為四句以擬象之述己意云觀光妙門探奧真源日味禪悅情忘志存文中子燕居董常真宗廟諱權改為常竇威侍子曰常也謂董生也其殆乎坐忘靜不證理而足用焉思則或妙豫詳此説因知董生幾乎知出世之道也而云靜不證理者言其行未至未得其所應耳佛書勝思惟經有語云繫念住一處名為具足禪定心蓋明入道之法必以坐忘為始坐忘即繫念住一處之類也故云足用焉其於發慧遲速各由力致之分限又云思則或妙者此欲其窮理盡性而入於神不欲其沉空住寂而已矣豫所億度自證而已出世之道極于寂照寂雖固不可著空以實無照雖明不可取相而涉有妙理如是不亦難乎束教之士多笑迦談豫非迦談不盡其意如見由基射徹札似得麻姑癢處抓是也老年所學心法隨時隨處且依觀音菩薩聞其音聲而得解脫又依數息頭陀抖擻煩惱歸於涅槃此皆己所了知不能委細而説夫智人安而利之及于國及于天下斯固難者而止及于身及于家亦鮮矣文中子曰疑滯者智之蝥忿憾者仁之螣纖吝者義之蠧豫覽之深重其言堪為鑒戒文中子曰吾不仕故成業豫因自思之不致仕無以成其味道之志古今賢愚雖異其理一也文中子曰君子不貴得位豫覽此因原其意而繼之以言曰君子貴乎得道文中子中説云賈瓊曰德不在年道不在位豫因而言之夫青襟之子性或幼敏不可以童蒙小之也白衣之士志或高簡不可以布素輕之也文中子曰以靜失之者寡矣豫詳此語有似孔子曰以約失之者鮮矣豫謂靜也非止寡失亦可學道而有得也或問道之説文中子曰泯其迹絶其心然可以神會難以事求吾不知其説曰敢問其旨子曰非禮勿言非禮勿動非禮勿視非禮勿聽或曰此仁者之目也子曰道在其中矣豫詳此説大約古聖之教名言則異而體用同也文中子所陳雖非內典之文而其理暗合故云吾不知其説而但引言動視聽必以理者此如釋氏之戒戒生定定生慧其勢必然故曰道在其中矣前言有云得全於詩者得全於酒者豫亦自謂得全於道法喜禪悅之味也文中子曰智者樂其存物之所為乎仁者壽其忘我之所為乎豫詳此説推演仲尼之意也論語云智者樂鄭曰智者自役得其志故樂仁者壽包曰性靜者多壽考竊謂斯言隱微非夫嗜欲淺志趣遠不能知而明之也苟當公論不讓於師可也豫以為存物是得理性之深者也易家人卦象曰言有物而行有常此云存物是此有物之類也得此理性之深者自然得志而樂矣又以為忘我是去封纍之至者也論語云無固無我此云忘我是此無我之類也去此封纍之至者自然性靜而壽考矣豫頗好觀書立言常在真理而暢悅逮及耋耄之歲退處恬愈而輕安所以信其果驗而申明之也文中子謂顏延之王儉任昉有君子之心焉其文約以則豫又云古之文也約而達今之文也繁而塞噫豫也何人晚嵗為文唯求簡當學妙道者若有智明行果志堅福會悉備臻極何勝如之豫嘗屢言意深所及文中子之食去生與冷酸醎必適果菜非其時不食曰非天之道也非其土不食曰非地之道也餌藥必輔性命者曰吾無他疾也豫詳此説非唯立教亦善攝生大約與論語相類豫心所至多涉於此豈非宿習之然乎芮城府君起家召為御史將行謂文中子曰何以贈我子曰清而無介直而無執曰何以加焉文中子曰太和為之表至心為之內行之以恭守之以道豫詳此説曲盡其妙常見世有拔俗者清而多介直而多執先生之言至矣哉文中子曰中和之為德盛矣我未見體之而樂也子曰訾過而好怒唯利是得愚矣哉子曰我未見仁而好利者也子曰好忿嗜利愛名詭利小人哉豫詳此説因而省己有所樂有所懲有所勸是故取而書之以為己法文中子曰輕譽苟毀好憎尚怒小人哉豫詳此説意亦同上垂訓深切謹書諸紳文中子謂薛收善接小人遠而不疏近而不狎豫詳此説子之知人甚精收之接物甚妙竊以為接君子易接小人難收於難能而能也善接小人是謂明哲之深者矣俗語云畏虎不畏佛倣此文中子不相形不禱疾不卜非義豫雖愚亦如此上所録薛收善接小人豫雖言其接物甚妙而言不盡意夫不善接君子止有過不善接小人必有禍蜀志關羽張飛之事可知矣仲長子光曰子光字不耀元和姓纂有姓仲長在險而運奇不若宅中而無為文中子以為知言也豫愛之重之因而曲解文中子所云知言者蓋謂知道之言也文中子曰其名彌消其德彌長其身彌退其道彌進古之人其知之矣豫詳此理固難得知所以傷今而思古然而焉知來者不如今也文中子謂北山黃公善醫先寢膳而後針藥汾陰侯生善筮先人事而後為卦説豫服先生精鑒無不及兼明事理本末垂為教也洞徹天真之靈廓然虛明陶融太和之氣薰然茂遂於茲有得孰曰無修虞世基使謂文中子曰盍仕乎子見其使者曰通也適有風瞀之疾不暇也飲其使者歌小明而送之世基聞之曰吾徒特遊矰繳之下亦怨乎若夫子飛冥冥矣豫詳此説有以見先生高尚不仕宿素能然所歌之詩以表其志小明者小雅之詩其序云小明大夫悔仕於亂世也噫豫仰先生越世清塵邈不可及而且自喜歷仕重熙之世引年而退不失其正抑又次焉比夫傴僂入金門者幸無深愧耳然而先生曠達無所顧避歌詩致意亦涉危言刺譏失於韜晦豫所慎也豫志於無上妙道久矣桑榆之光浸暮金石之誠尤固必冀天從善願神介景福盡此報身之數不失勝緣之會是所禱也其可退乎吾今退身居靜境收心入靜境餘無所求唯願道應至妙止之以吉祥神聽至靈介之以景福勝緣畢會何樂如之明哲保身大雅也聞勤行道上士也二者備矣不亦善乎豫殆庶幾留心於此韓詩外傳云凡草木花多五出雪花獨六出豫之所居有迎春花桃花因間觀之二花多五出亦有六七出者百中之一爾譬如千萬人中或有一人生六指物理如此不足怪莊子云枝指是也萬一有反常之事固當無執定之理曲士有三執著謂意言事三者於迷中成滯固達人有二脫灑謂身心二者於悟中免拘繫上智當默識吾不能縷述之也白氏集中有詩題云期李二十文略王十八質夫不至獨宿仙遊寺其詩云文略也從牽吏役質夫何故戀囂塵始知解愛山中宿千萬人中無一人豫詳詩意此猶言外境之清勝者而更有內境之清勝者用而擬之別為四句詩云角勝勞生不足云濫傳僧語亦非真始知解愛禪中樂萬萬人中無一人豫嘗究觀人倫大槩夢本緣想夢是想之幻化固無窮極豫嘗患未能豁然無想所以未到恬然無夢又謂言本析理言亦理之幻化亦無窮極嘗患未能冥然契理所以未到默然無言豫今有此二病若得二病俱瘳朝氏之叟其殆庶幾乎西漢書贊略有云世稱張湯陷嚴助石顯譖捐之察其行迹嚴賈出入禁門招權利死皆其所也亦何排陷之恨哉豫嘗披詳本傳此謂嚴助賈捐之也助事武帝為中大夫在左右與大臣辨論因使淮南與王相結而還後淮南王來朝厚賂遺助交私論議及王反事與助相連上欲勿誅而廷尉張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助遂棄市元帝時捐之上疏言得失召待詔金馬門數召見言多納用時中書令石顯用事捐之數短顯以故不得官後稀復見捐之乃與長安令楊興共議為奏更相延薦欲以興為京兆尹捐之為尚書令石顯聞知白之上乃下興捐之獄令顯推治而捐之坐棄市興減死髠鉗為城旦豫因究觀人事不必當鈞軸凡居待問之列不以才之能否行之淑慝已涉危疑之地矣雖存誠守正猶有忌克而誣謗者焉而況嚴賈或過貪重賂結諸侯而無嫌或交締偽情恃抗言之有力所云招權利者蓋謂此也死皆其所抑亦信然是知禍福之來先宜自考履祥不當但委天命合身心息三者凝然之相強名曰不動尊聞金泉蟬三者自然之聲強名曰內觀音吾無師智獲此法印混而為一用之不匱白樂天有詩云心不擇時適足不揀地安窮通與遠近一貫無兩端豫愛其語因而擬之別為四句以述己意云心不擇時息書不擇時觀達理意無礙豁如天地寬分假之身非大身也起滅之心非本心也知此身心者幾何人哉未有證之者也豫嘗靜思獨斷欲求無上菩提須學無生法忍夫無上菩提次第之理不離觀也慧也照也無生法忍次第之理不離止也定也寂也凡諸曲士多笑迦談若不迦談何由到此孟子曰養心莫善於寡欲雖有不存焉者寡矣趙氏注云雖有少欲而亡者謂遭橫暴若單豹臥深山而遇飢虎之類然而寡少也又章指言清淨寡欲德之高者豫愛此説録而斷之舉一類諸其理皆爾智者推究不必條陳入道從權當依佛事衆人禮念歸有相智人禮念歸無相知須自知説則煩説無思之心若存之息自然之音三者相合凝而融之用為法印得寶多矣寶積經云於一剎那盡一切相及諸所緣故得名忍又楞伽阿跋多羅寶經云一切法譬如電光剎那頃現現已即滅豫因檢證剎那之理如電光睒爍之頃也今詳此寶積經文之意但於至少時間止息心之妄緣猶可名為法忍而況如此息念時日增多其資勝利可知矣是故唐太原李逸人作華嚴合經論有云一念相應一念佛一日相應一日佛豫以考求經論重重相照不覺私喜彌加䇿勵雖造次顛沛之際自願力學正念之法必有所濟耳洞曉古聖賢善誘之仁也金剛經云有持戒修福者於此章句能生信心當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根豫自此方於此法門宿有至心抑亦知其歷劫以來不於一二三四五剎那時而歸正念已於無量千萬剎那時歸於正念矣不然者何以自壯及老志於道也愈切安可自輕自棄哉博覽智可以資見性內見自然之理靜居力可以資聞性反聞自然之音二者交濟伊豫所得白氏集中有詩題云題贈定光上人其詩云二十身出家四十心離塵得徑入大道乘此不退輪一坐十五年林下秋復春春花與秋氣不感無情人我來如有悟潛以心照身誤落聞見中憂喜傷形神安得遺耳目冥然反天真豫愛此詩因而別作七言八句述己意云孟子四十心不動定光四十心離塵我到明年加一倍如何此際尚因循已喜自逃名宦網猶患長隨造化鈞記得前賢有詩句祖師元是世間人四威儀中一剎那頃得心法無住之住猶為妙用而況習熟時多理可知也江南才子佑有詞句云凝神入混沌浙中詩僧貫休有詞句云融神出空寂豫愛其語該涉道釋凝融出入之理因而采取相合書之自定純修之法但於一切時中隨其辦及止習無住之住足矣金剛經云應生無所住心是也僧肇五論有云聖人之心住無所住其住解云安住無為名之為住住無方所故名無住六祖壇經云我此法門無住為本坐忘論樞翼云不依一物而心常住如此之類不可具舉佩為密印何煩別求觀一切境順違無不空勿失無礙法於一切時間忙無不可勿失無念法協用堅久吾事濟矣豫以無師智自明無上道以觀練薰修之心入正真圓妙之覺其名有四意分次第夫洞分至理不入邪見名曰正覺靈徹而見名曰真覺覺之大成無所不備名曰圓覺此覺以其馴致臻極所云等覺者是也等覺之上名曰妙覺即本覺也此覺之理盡性之處其上更無一法故曰無上道也陸龜蒙復友生論文書有云僕少不攻文章讀古聖人書誦其言思行其道而未得者也每涵咀義味獨坐日昃案上一杯藜羹如五鼎七牢饋於左右加之以撞金石萬羽籥也豫以讀經妙趣得法喜之味又以習靜靈應聞天簧之音其為殊勝超彼自樂尤深也動則臨文求理任意記忘無固必靜則冥心息念隨時多少無固必日復一日不期符應古人有欲碎其首為保連城璧伊豫却愛熟其心令如百鍊金較量得失何如哉唐醉吟先生有詩斷句云歸去臥雲人謀身計非誤又有詩斷句云回首語秋光東來應不錯人謂先生率爾成章豫謂先生的然有理豫年臻耋耄而所好之學益務精至深遠竊謂抗志肥遁不嬰矰繳之纍故曰冥鴻演道合變不挂名迹之網故曰猶龍出世無敵不屬造化之鈞故曰大雄冥鴻賢人之狀也猶龍聖人之狀也大雄神人之狀也豫皆愛之重之略述形容而言不盡意者也太宗朝端拱年豫偶與進士劉安國同舟出京師安國酷愛庾信哀江南賦是時凌晨舟行高聲誦之自言每誦此賦雖日旰未食而不飢豫亦素曾披覽美其雄富晚嵗之學志趣高邈因追思安國好此賦者以其詞氣鼓動快哉愜心而已矣不知前賢評品有云南朝徐庾體乃是風雅之變而流宕之勝者也昔豫方壯樂遊文𫟍之洪麗今老矣唯於微言妙道回向深切文章中有白樂天求玄珠賦高邁長明燈頌一宿覺證道歌每一讀誦非但忘飢有如食其品膳侑以國樂比較安國所好類乎野人美芹以為至味也豫嘗泛覽羣書及諸文章內有潛心遊心棲心息心如此字者頗愛重之唯願潛心遊心常在於覺海棲心息心不離於禪林亦如池魚籠鳥有江湖山藪之思也我之讀易唯變所適取其文句恢為法門剛健中正可間邪以成定窮理盡性可鈎深以成慧言外得意有何不可定力如天慧用如日月日月得天而能久照慧用得定力而能盡妙吾何以知厥理之然哉以此晉時孫登答嵇康之問有説云火用其光人用其才用光在乎得薪所以保其耀用才在乎識真所以全其年今子才多識寡難乎免於今之世矣豫因之演暢而言云才識兼備可以為佐時之器定慧均濟可以辦出世之事豫憶少年日嘗見凡人中有及耆艾之年者遇壯夫發怒侵凌而能不答且曰我昔年似汝少壯時必不奉容今則不能也豫因思之凡夫年長猶善改往而況吾徒太老矣深究內典或對不順之境比彼耆艾忍事得不加其一等乎豫能諦觀古人今人心之情又得處世出世法之髓非謂如目前掌中物盡見之但知其理必然也大耳三藏不能知慧忠國師最後之心者蓋以前心是有念妄心動而有迹故可知之後心是無念真心止而無迹故不可知之夫有念心如物象可思量也無念心如虛空不可思量也吾謂知出世之法者合大喜合力行觀世間法無以比而未見有大喜力行與我同者吾今自思所得者已得經論智又得因緣會若除瞋恚閡更除疑悔蓋未及道超升且致心恬泰或問豫間居何樂豫對曰條暢太和之氣適悅天真之味研覃微密之言依遊上妙之道以此為樂此外之樂則不知也豫自微細揣摩己之三毒貪癡殆盡矣唯有餘嗔未殄故宗尚老子之日損周易之懲忿立言自規者多矣偶看圓覺道場修證儀第十三第二十葉有注云一念嗔起具八萬障門因思己漸老矣而於去嗔之法尤宜力行又看維摩經之初佛國品列五十二菩薩名號內有喜根菩薩什公注云於實相法中生喜及隨喜也又有喜王菩薩什公又注云清淨喜故言王也豫謂習喜成性是菩薩行修證儀又説得經論智是入初地豫於內典詳覽已多既得經論智若持歡喜行可以竊名歡喜地也習之成熟非徒懲忿亦足銷憂矣祥瑞冠五靈之首唯有獨覺之麟竒持冠五行之秀唯有獨覺之人彼上人者不可多得高邁作寶融寺經藏院所置長明燈頌據序中説其燈以鐵盆盛膏而序之語句其略云佛有燃燈名法有傳燈義長明燈是其蘊乎日中則昃昃則沒長明燈不沒月滿則虧虧則盡長明燈不盡四維上下虛空不可思量長明燈功德亦復如是邁願銘頌之數年間迫賤事未致鄙思一朝忽染目疾瞢瞢然不自審從何得之也會夜夢神人謂邁曰子於長明燈不有負乎邁應聲而寤寤而起起而作頌明日而目愈豫謂長明燈以喻佛法即維摩經中無盡燈是也無盡燈以法喻燈長明燈以燈喻法豫竒其説以邁踐言補過之速有如此者靈應疾愈之速又有如此者可以警勸信士存至誠結勝緣耳因而采述入於法録事以理遣明而深可以為慧用心以道寧純而固可以為定力久於相濟何有不豫已自定純修之法録之於前自為無住法門今又見寶積經中所説菩薩安住無所住之念非憶非忘所一安住念即名法界豫詳之冥契前法重增欣慰而思䇿勵也豫得理性之髓而形於言曰破幻妄而見精真習虛靜而成寂照從簡盡妙立法存誠冥心靜慮之學深逆計追思之念息二者不失何勝如之我願書紳常為己法大般若經第三百八十四內有語云名是分別妄想所起亦是衆緣和合假立豫因此語究觀人世之事灼然如此彌重教法精深苟能知之而大決了何有休戚之心乎豫今知足寡欲既合人天之業觀書弄翰又得經論之智私喜緣熟固非自矜究彼前聞勇於獨斷身非己有是天地之委形性命非己有是天地之委順姑務乎心靈靈而不昧息綿綿而若存何必尋師然後為學真歸伏處竊仰天人師學而知之粗得經論智油然法喜與日增新豫知法要不離定慧定可定非常定是對境不動之定非用力制之之定慧可慧非常慧是見性不迷之慧非役心求之之慧學定慧者當如是解景德傳燈録第二十六內説杭州報恩光教寺通辨明達禪師紹安上堂有語曰一句染神萬劫不朽豫愛其法語因自推而演之云夫真學之流得第一義諦薰修浸漬貫心達性是人不可惑之智至信至悟不可奪之志至堅至固自然生生世世無復忘失矣豫先密訪契勘屢同亦既融怡彌資䇿勵直上一路絶妙一句罕有知者苟有知者若能御三清淨輪入三解脫門此勝因緣不是小事華嚴法界其用也神妙無窮圓覺道場其體也凝虛不動言意及此誰與我同南史何點字子晳性隱退而名重當時齊豫章王曾命駕造焉點從後門遁去竟陵王子良聞之曰豫章王尚望塵不及吾當希岫息心也後於法輪寺遇之子良欣説不已豫美其事因成文句云望風懷想雖仰於清塵希岫息心慮煩於高德事君有二心不可為忠臣事佛有二心不可為法器唯當一心於忠一心於法是也吾今退居養老隨分充足寬床穩枕以便支體清心靜慮以養神氣如斯可矣誰能委細分別禪機道法以自煩乎佛書法華經説安樂之行道書莊子有恬愈之言其理同出而異名本乎心者也然而不住于相方為盡妙非止此法他皆倣此世間法禍機忽發之甚者聞有甘露事出世間法妙蘊難窺之深者聞有甘露門可畏可愛無大於此上智之人洞然明了正其定心北辰之不動均其慧照南日之方中妙覺之尊體用如是宋宗炳字少文常遊名山老疾還江陵歎曰老疾俱至名山恐難遍覩唯澄懷觀道臥以遊之凡所遊履皆圖之於室豫覽之愛見雅趣自謂登山臨水固不能然澄懷觀道庶乎可及晝觀良書采微妙之言而窮理盡性夜習宴坐入凝寂之道而澄神定靈伊豫晚節未為虛過晉隗照善於易臨終書版授其妻曰吾忘後當大荒窮雖然慎勿賣宅却後五年春當有詔使姓龔來頓此亭此人負吾金以此版往責之照亡後其家大困乏欲賣宅憶夫言輒止至期果有龔使者止亭中妻遂齎版往責之使者初惘然不知所以沉吟良久而悟謂曰賢夫何善妻曰善於易而未曾為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也吾不負金賢夫自有金耳知亡後當窮困故藏金以待太平所以不告兒婦者恐金盡而困無已也知吾善易故書版以寄意金有五百斤盛以青甕覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜焉豫覽此而歎隗龔易卜精至有如此者而隗生未嘗為人卜因思此藝若中人以上學之則入正真彼妙道可致中人以下學之則入邪偽唯姦利是取夫卜筮之流如隗照龔使者及嚴君平者幾何人哉而又知事有前定之理人有預知之理此乃數術有為之法學之精深猶能神異而況禪觀無為之法苟能盡妙何以比方乎忘情之心不住於相如湯消冰冰湯俱盡無可分別觸境之心未能不動如響應聲即應即止無復有餘二法詳熟妙用足矣白樂天詩云昨日制書臨郡縣不該愚谷醉鄉人豫謂此語自述其情而於愚谷醉鄉理有未盡因而別作二十字推演其意云貌愚愚谷邃道醉醉鄉春愚醉無迷謬伊豫意又新前賢有以樽長空飯不足形於詠歎者豫則不然但醉道飽德亦自充足此則味外之味也每覽前輩詞章豫心愜當者必采而書之有句云凝神入混沌豫以為學道之初從宴息也又有句云融神出空寂豫以為學道之成得自在也枚卜同人未遇知者布武輕安反聞清警益新經論之智密奉天人之師絶其交遊老於禪觀怡然自得夫復何言一簞一瓢顏子不改其樂一丘一壑莊子不易其樂去五鼎而食豐屋而居果得勝茲樂乎李華作荊州南泉故蘭若和尚慧真塔碑文中語云有問師修行功德遠近答曰滴水下岩則知朝海豫因而自悟但能剎那際冥心半銖亦是古先生善入無為之法隱君子歸根復命之道積習經久不止不退自然有臻極之理豫以開悟於法觸如灌頂沃心佩服其妙言若銘肌鏤骨諦思所習寧無自慶見外境而迷者繼踵競進居怨府蹈畏途觸禍機懵然不知見內境而悟者拂衣獨往躋壽域棲天真養太和翛然自得高卑敻絶何啻霄壤義學禪學理須兼備非義學何以開其智非禪學何以成其行豫之趣向立志如此史記孔子謂老子其猶龍耶寶積經謂佛為龍中之太龍豫思聖功神化有以見其彌高矣唐李華作故中嶽禪師常越塔記首句云智之深者反照人之大者無思豫愛重其語深入法門欲援證據觸類滋廣今聊舉一端而已前言有云阿難多聞總持積嵗不登聖果息緣反照暫時即證無生豫謂止引此一事明之足矣然而不離止觀二法息緣即止也反照即觀也凡夫之心終日趣外逾遠逾背唯反照者向真合覺至簡至速者也所云無思即無生也前言又有云若能忍者即名為有力大人豫謂反照無思者亦可名為深智大人矣凡一百三十八章覆校官博士臣劉光第校對官中書臣范來宗謄録監生臣宋允辰詳校官監察御史臣王爾烈檢討臣何思鈞覆勘
