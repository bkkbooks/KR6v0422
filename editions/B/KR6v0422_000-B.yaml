body:
  text: 欽定四庫全書子部十三法藏碎金錄釋家類提要臣等謹案法藏碎金錄十卷宋晁迥撰迥字明遠澶州清豐人其父始徙家彭門太平興國五年登進士第至道末擢右正言直史館知制誥旋為翰林學士加承旨天禧中判西京留司御史臺以太子少保致仕卒諡文元迥受學於王禹偁以文章典贍擅名而性躭禪悅喜究心內典是編乃天聖五年退居昭德里所作皆融會禪理隨筆記載蓋亦宗門語錄之類其曰碎金取世說新語謝安碎金義也孫覿謂其宗向佛乘以莊老儒書彚而為一蓋嘉祐治平以前濂洛之說未盛儒者沿唐代餘風大抵歸心釋教以范仲淹之賢而手製疏文請道古開壇說法其他可知迥作是書蓋不足異南宋初年迥五世孫公武作郡齋讀書志乃附載迥道院集後列之別集門中殊為不類殆二程以後諸儒之辯漸明公武既不敢削其祖宗之書不著于錄又不肯列之釋氏貽論者口實進退維谷故姑以附載回護觀其條下所列僅敘迥仕履始末行誼文章而無一字及本書其微意盖可見矣然自阮孝緒七錄以後釋氏之書久已自為一類歷朝史志著錄並同不必曲為推崇亦不必巧為隱諱今從陳振孫書錄解題入之釋氏類中存其實也其書傳本頗稀明嘉靖乙巳迥裔孫翰林院檢討瑮始從內閣錄出鋟板以行改其名曰迦談殊為無謂今亦仍迥原名以著于錄焉乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀法藏碎金錄原序予爰自弱齡逮茲暮齒探古聖之域闚眾妙之門涉獵儒道諸經必也考求微旨修身慎行著為葴規又於貝典詳觀了義法喜融液映奪居多倦聞世諦不爭戱論洞見至理新新無窮然知撫心馴柔道所由致而且揮翰祖述志未能忘暨挂冠之後棲息乎浚都昭德坊之舊居別葺靜齋翛然獨處素所樂欲習以成性手不釋卷筆不停綴貫微臻極深入骨髓消憂釋結大沃襟靈雖患思縈亦慶緣熟斐然章句聯翩衍溢開陳有補弗忍遐棄眾製詞律存乎別集每分類例頗煩命篇自今聽覽機會或該演勸屬文導意靡拘詳畧片言鱗次混而編之數無預定興盡當止奉法寶而推美非小智之自矜故名之曰法藏碎金錄內有意涉重出積習之故前輩亦爾不復刪簡若其束於教者或以迦談見誚亦無憚焉不能以外妨內也時天聖五年丁卯歲季秋望日序云爾天聖九年仲冬月稍量字數分為十卷晁逈撰
