body:
  text: 宋朝逈撰定慧之法宜知至理仍令均濟二者相資何謂也凡言定者貴乎澄明之定勿入頑空之定定而無慧譬如石人木偶雖不動而奚為凡言慧者貴乎安詳之慧勿肆輕狂之慧慧而無定譬如雲電風燈於久照而何有混而為一曲盡其妙至信發外之著者可以貫金石蹈水火密行積中之深者可以動天地感鬼神其次權實隨宜外順世間之法得中而不失其正者上也凡諸識想之數內妄也名物之飾外妄也人能去二妄之惑詣一真之理久於其道何以加焉良將御兵多多而益辦方略有餘也大士御情亦多多而益辦智慧有餘也萬緣紛紜一心曉了道馴致而善應德日新而無窮默識冥符豈凡庸之可及啄食之禽善驚畏而疾起虞繫捕之奄及也涉境之心善驚覺而疾止防流宕之忘返也內習之士宜乎知此此言雖小可以喻大大乘四法經云求菩提者當修四法一者發大菩提心寧失身命不應退轉豫今於此四法之中止舉第一之法詳其語意因知菩提心至精至妙雖身命至親至切若比菩提心猶是外物豫久知菩提心之義即是真正本覺之心也唯此心字方是真我其餘我所節次踈遠窮到此際弥歎己之道孤矣東方之教以言行為本言顧行行顧言處世之第一義西方之教以理性為本理合性性合理出世之第一義擬象經語𡸁文導意古今之人一也勿以榮陋為蔽豫觀寶積經第一百四臨末有語云若彼比邱於一切法但取一行極隨順者所謂無生是為禪行豫詳此語若有的然明禪理而學佛法者止用此一科足矣諦觀悠悠萬事無不是空智者一以貫之歸於無物事來干我我皆應之以無生無生謂心不起念譬如物觸虛空有何妨礙隨順謂物我皆如無所違逆故圓覺經云照了諸相猶如虛空此名如來隨順覺性是也此無生法是禪中一行簡當臻極之處何必以多為貴者無上妙道敻超諸有上上智人了達一切法不住一切相心如虛空自然無礙何以故心住於相即屬有法豫歷觀經旨大率以此為根極議處世之士當以才行兼偹議出世之士當以理性相符此外云為資其崇飾者也順違二境俱為纏縛順則生愛結細業而難解違則生憎結粗業而易解有大智力行方能擺脫之也學道之人須由觀行息心達本貫微洞密謂之觀收視反聽忘情契理謂之行觀行明偹根力堅深入道法門此當樞要諦觀物情大率以僞為智邪為樂不知至人以真為智正為樂僞邪多真正少自古而然豈非流轉浩劫中宿習猶存耶忘自身之至親營他事之至重狥不急之多欲踐不測之畏途非智眼觀焉能洞見夫日目有晦明陰陽有舒天之常道不得不爾施之于人亦其類也其樂滿志理或難勝間以鬱然固當如是釋迦氏捨去王宮入雪山修道六年而成不戀富貴之樂其果决也如此慧可斷臂立雪求法於達摩不顧支體之苦其懇切也又如此因原佛理精真殊勝可歸仗也何如哉人愛萬金資用以為我所何如萬行莊嚴以為佛士夫深於妙道者始可與之談此理苟失言於不知者必大笑其迂濶也定矣窮理盡性易義具矣豫嘗因此四字別有所陳夫剖析至理有淺深次第淺者及於名深者及於身深之又深者及於心心由性生必若窮其理之盡處極於性而後已故曰窮理盡性豫有法喻密獲二寶其一曰如意淨明珠圓而照能破一切昏暗而珠無染著此喻不惑之智其一曰降魔金剛杵堅且利能破一切障礙而杵無虧損此喻不退之志持用二寶天下無敵何往而不至哉其後因看寶積經第一百二十內有金剛杵如意珠二物之名豫喜暗合衆生之心本有空寂安樂之體臻其極者此名涅槃本有靈明照了之用臻其極者此名菩提既是本有何假外求又緣棄本逐末迷失久矣固當啓迪懷柔須有頴悟之人師資授受一切之形形本無無而有生有生則有化滅有化滅則復歸於無也定矣一真之性性本有有而無象無象則無化滅無化滅則常存其有也定矣不有之有名曰妙有不空之空名曰真空妙有真空其體一也夫良藥所以去病加之信重則易服必由誠感而其效彌應妙法所以去迷加之信重則易入必由誠感而其道彌勝是故切於去迷而見性亦如切於去病而保命儒教之法以正身為深切勿求其名而名自得矣道教之法以養生為深切勿求其功而功自成矣佛教之法以復性為深切勿求其證而證自知矣是三者率以無心而然也中智以降得地成勢下必趨勢而動色上亦乘勢而變態其理所至自然而然達觀了知不當驚異儒教本於名與情佛教本於理與性儒教大意修己成美善之德不許伐其德佛教大意清心得微妙之相不許住於相至論概舉深學當知夫萬類萬形形必不同斯可見矣萬類萬情情亦不同固當然歟人心如面安可同也有一不同於己己即非之若以理斷曲反在己前漢書有陳大道之要去健羡黜聰明豫嘗三復其言深以為然夫去健羡則無貪欲黜聰明則反其素人能行此六字亦足為越世出塵之士矣豫有宿志者二焉其一欲得解去名利之場獨歸自得之場不被仕宦所拘今則已遂志矣其一欲得解去分段之身別生意生之身不被造化所拘未知果能然乎豫常愛白樂天詞旨曠達沃人胸中有詩句云我無奈命何委順以待終命無奈我何方寸如虛空夫如是則造化陰隲不足為休戚而况時情物態安能刺鯁其心乎夫形之壯衰隨時而變理之常也萬一不變此乃神仙之流情之順違隨勢而變亦理之常也萬一不變此乃聖賢之流形之與情若責以盡與神仙聖賢為比不亦難乎豫自問曰晚年學道日課何如哉自對曰動則觀書以廣智求出世之階差靜則息念以存誠恐涉境而流宕如此而已餘無所能昔向子平有言曰吾已知富不如貧貴不如賤但未知死何如生耳豫因思莊子云以生為附贅懸疣以死為決疣潰癰列子云善哉古之有死也仁者息焉不仁者伏矣斯亦可知矣晉山濤不知山簡父不知其子也王濟不知王湛猶子不知其叔父也而况他人之踈遠乎士之屈於不知己據理當然何恨之有哉觀練之法我今自陳其觀也見諸相之本同色空如一其練也勤守中而不失心息相依率是而行以為日用吾常諦觀一切因緣有合有離一切情識有起有滅親踈順逆愛憎是非雜然交并混而成世新新之事與日無窮身心之苦何有紀極其或萬萬數中有一大達之人越世高蹈特立獨行出此方域之外者其人智力何如哉彼至人者角立傑出智了一真餘惑不能障其明心住一境諸念不能奪其志不挂名利之綱不嗅嗜欲之餌我今誓願師之服膺終老而已有名有色隨造化而遷草無色無名亘古今而靈明誰曾究此徒自負於豪英人間有三大事皆無可奈何須歸委順而已謂身也世也劫也人之自身生之始不能知化之終不能知無可奈何此委順之大者一也處於世則有因緣之善惡身心之苦樂無可奈何此委順之大者二也又說浩劫運數中則有陷歷陽之地居人變水族之類鑿昆明之池胡僧辨劫灰之理無可奈何此委順之大者三也唯聞別有至神至聖之人超出此三事之外無能及者故謂之大雄氏顛倒之心反掌成菩提譬如迷路之人忽爾醒然見其路覺背所趣即時旋踵先迷後悟之速非反掌而何苦惱之心反掌成涅槃譬如憂事之人忽爾聳然聞其事得遂所志即時開懷先憂後喜之速非反掌而何一氣幻化而生形形之妍醜不一也一性幻化而生情情之善惡不一也自古而然無可奈何唯聞大雄氏之法至深至大至微至妙超出二幻化之外此明復其理性之根本非在末迹孰有智識論議之勝過於此乎吾不敢以區區所見臆斷其事也佛書中說安樂行豫今引儒書比類儒書云君子居易以俟命此是安樂行小人行險以徼幸此是不安樂行夫學道之人在乎智力兼備何謂也設使觀慧明了見法指歸此名智也須得妙心精密入佛境界此名力也智力相濟為兩足尊苟或止務高談斯則未為了義西方聖人垂法詳悉有大善利不可非也於幻化中明一切空不執為有雖賢愚異貫皆見其空矣於虛空中立一切法不落於空深智之士信知其法妙矣終使人離空有二邊之見出輪環大苦其理如此其能仁也何如哉不達之人若以世間法比方致詰何可與之論議哉吾自省己頗能推窮至理直詣精深之處唯有情纍綿綿未到豁然安穩之處力量如此畫工之格致高妙有能注思落筆傳神寫照而逼真者文士之格致高妙有能注思落筆窮理盡性而臻極者此二事頗相類也吾常覽唐賢著述有陳心法宗趣而立言利明白鑿出大意使其曉暢文義者了了見妙道之源信知才俊精敏有資助發揚之力今之僧俗所談分禪辨律互相矛盾各執其末不究其本但目作者之詞曰文章也非禪話也吾所不取吾能大和會一以貫之爾吾能了知身心世三者本從虛妄中有而終歸於空此則吾自斷之以智也既知之則一切念慮徒有憂勞而無所濟者當令不生此則吾自濟之以力也此是出世智力與世間智力不同若霄壤矣豫自陳頓悟漸修之說各有二焉豫知一切之有都屬幻化者無不終變滅此為頓悟之一也唯一真法界散而為萬靈者決定無變滅此為頓悟之二也此二頓悟既明而不昧者也憂悲苦惱之念無人無之自省了達已久今求日損當以理遣此為漸修之一也常樂我淨之道唯大雄氏能然自省信重已久今求日益當務馴致此為漸修之二也此二漸修有進而無退者也內省詳求樂欲所趣如是得非宿習使然乎豫觀釋氏之書而有一經一論各言無生之法簡妙大同合而敷演可以足用寶積經中有說云若彼比邱於一切法但取一行極隨順者所謂無生是為禪行摩訶止觀論中有說云小乘對治如應病用藥藥必兼備大乘對治秪用第一義諦如阿竭陀藥能治衆病其語云空無生中誰是煩惱誰是能治但以無生一方遍治一切此文極略須善取意豫博考諸經諸論大約盡是修行出世之法若得其樞要之處何須廣覽今據此經指陳極隨順之理又據此論指陳善取意之理並在無生之法而已其為精當何以加焉必能觸境無生則所謂盡善臻極矣世間俗士而為名利纏縛嗜欲纏縛其身不得自在而致敗壞小乘人又為空纏縛法纏縛其心不得自在而有障礙唯大乘上乘人免此二纏縛謂之解脫身心俱自在無敗壞障礙得出世之樂名曰涅槃人之談禪好以隱晦為深密豫之談禪好以顯暢為親切雖談者隱顯不同而道之本源則無異也豫今自思晚年內習雖窮理盡性務極於精研而澄神定靈未臻於純熟疑善根之宿植期勝果以圓成聊用披陳亦非矜伐衆緣之纍須以道斷理遣一真之妙須以馴致冥會略舉大端智者善自求之也夫醉者墜奔車而不傷全其外也乘蕩舟而不懼全其內也故先賢頌酒德贊酒功稱其美利蓋非徒然苟或遂肆沈湎自貽諸失前言作戒抑又深切或問豫曰先生不從遊賞之朋不設歡娛之具闔扉燕處何以銷日豫對曰老夫致政之後適意居多觀練薰修獲溫尋於妙道棲遲偃仰遂頤養於天和自便衰軀更無他想至寒暑之來往歲時之代謝任彼運行而已與豫了不相關約己自修立為條教所學無生之法或遇習氣欻爾而生我當記之即時而止所學安住之法未果全然安住我當隨其緩急量力而住新新之智其理可書而旋復忘失惜而求之再縈心緒我願不復追思又欲禮必逮情常念彌縫其闕斯乃世間之法耳學出世法抑亦相妨自今亦宜無可無不可縱心浩然而已豫於晚節勝進彌堅歷觀莊子微言兼采楞伽妙法吉祥止止但務於心齊正智如如自符於成相道釋二典責實同歸夫何末流妄有分別我立一志自學無生法忍入道權輿此乃小乘獨善之利也佛度四生盡入無餘涅槃成功臻極此乃如來兼濟之利也力量殊致固當如是儒家之書大易為首有象本乎乾坤道家之書老子居最無名始於天地二家之說率以此為造極矣若引佛書言之空生大覺中如海一漚發又據譬喻則天地乾坤沙界之一沙也學道不易為師亦難學道之人性有優劣上根之士來學則師逸而功多下根之人來學則師勞而功少譬如良駒駿利見鞭影而疾行駑馬鈍頑受錐鋒而不動豫於悟修自能和會研覃乎定慧之學𠫵驗以老莊之書設使遵老聃之言練谷神之粹契莊子之說發天宇之光二教指歸有何差別夫事君者不可以二心唯一至忠而已矣至忠則名光而衆仰學道者亦不可以二心唯一至誠而已矣至誠則神會而自知昔向子平讀易至損益二卦乃曰吾已知富不如貧貴不如賤豫讀莊子至巧者勞而智者憂豫又知巧不如拙智不如愚矣此與常情不同唯有深達妙道者可與言之耳夫天地中空虛生成萬物而不妨有日月照臨而盡見身心中空虛含容萬法而無礙有智慧觀察而盡知真學之人當須具此知見易曰龍蛇之蟄以存身也吾思據定以寧志又曰精義入神以致用也吾思乘慧以立法從事於道唯變所適吾能然爾不求人知豫嘗自思獲其法利少分焉何謂也凝然不動定力也了然常明慧用也鏘然聞和天樂也翛然自得道情也合此四妙歸乎一真世間富貴功名未可爭其勝負耳夫學法之人尤宜洞達雖發蒙辨惑始務於從師若榮古陋今則乖於適變豫於此道灼然了知精思而究前言觸類而生新意開示悟入佛存方便之門收合凝融自得修行之要但懷宗趣安可講求豫偶自思而言曰夫有財而不能用與無財同有學而不能行與無學同豫今照了其事不欲落二者之失姚秦時釋僧肇初以莊老為心要後見古維摩經歡喜曰始知所歸矣豫今信以為然豫初讀南華真人之書因齊物之理自得一法目之曰逍遙大同觀且無一事可爭後讀西方聖人之書因無我之理又得一法目之曰平等大空觀兼無一物可齊由是省己之所學有增長二家之書有淺深矣夫學法之人必在乎破相觀空見性行道此四次第端如貫珠與我同志應作是念知而能爾斯所謂入佛境界者也初學道人念念須有所法觸正念如不及涉智地也如此觸邪念如探湯避諸趣也如此豫自覺者㳙毫法利安住無念之念或時能然獨聞無聲之聲未嘗有絶吻然相契翛然自得而已豫自以為粗得少分殊勝但覺聞性彌聰妙音無窮猶未得心如大空中有日月昭融若能到此吾道方隆見可見非常見我見無色之妙聞可聞非常聞我聞無聲之和雖如是言亦無所有也得者當自得不可以言宣世間法或能捨去大權位者有語云如釋重負出世間法有語云菩薩斷除五事所謂五音能令衆生生死相續不離重擔因思二重之纍豫且於世間法中不當重負矣猶於出世間法中欲得離其重擔自念具足凡夫未知智力志願果何如哉涅槃經云譬如芭蕉生實則枯一切衆生亦復如是噫豫之生子身相已衰又見生孫衰可知矣去身逾遠復憂於孫以道眼觀悠悠斯甚老馬識路猶歸國而不迷老夫識道豈還源而有失雖云耄及自憐智生施肩吾三住銘序云心常御氣氣與神合圓覺經圓覺章注云心息相依息調心淨豫觀兩處之說因知道家言神仙之術釋氏明禪那之法其理大同矣已往事勿追思未來事勿迎想見在事勿留念隨覺而止習以為常久久彌堅不煩多學世間所愛者不過富貴功名而已若以道眼觀之豈能勝第一義諦老子云道冲而用之或不盈淵兮似萬物之宗又云湛兮似或存豫詳文意所云或似者不敢決定言之此於世智中得為高邈唯西方古先生直指顯說無非臻極可謂出世殊勝之智也豫嘗有晚年勤道自修詩云老來何故惜分陰如月明虧魄漸侵進道不遑求廣智隨時隨處且冥心因思自說冥心二字蓋言四威儀中不拘間忙每遇意到即時隨分檢情攝念是也晉書隱逸辛謐傳云冥心至趣而與吉會唐賢白樂天寄酬常州陳使君詩斷句云勿使問榮枯冥心無不可近代僧俗有名者詩僧貫休懷香爐峰道人詩景聯句云冥心同槁木掃雪帶微陽又齊己山寺喜道者至詩斷句云知住南岩下冥心坐緑苔又吳融寄貫休詩斷句云若得重相見冥心學半銖如此之類不可具舉大約冥心二字謂以其心向晦宴息善入無為潛符妙道之理也我願得天聰明入佛知見以決定信致精進力到涅槃域無退心也或問豫曰子嘗言不求功名不求富貴何謂也豫對曰豫不求富貴而取樂樂變則苦不求功名而干譽譽變則毀夫至樂無樂至譽無譽此道家之閫域也可以意到不可以言宣問者曰妙矣哉虛往而實歸矣儒家以名教為親切而道書云士以身殉名道家以壽命為親切而佛書云壽者見度長挈大窮理盡性若非允臻其極何名第一義諦大覺聖人推為無上尊者何謂也以其豁達大觀洞見形質空言語空文字空名器空大約無數空如是真見無人能及故曰無上尊夫淺識滯泥挾私而爭彼我者亦如夢中所爭及其覺也方知盡空矣而此聖人又特見空中不空此則別論豫思鑑圍燈帝網珠光影重重交相涉入此喻諸佛妙契心心混融非異非同之相也豫晚歲自修協用二法止觀也導引也止念令靜觀理令明念靜理明無生可成導氣令和引體令柔氣和體柔長生可求此二法內外相資之法也豫有二有餘一不足演法無盡意聞和無盡音此二有餘既盡美矣未得無念心此一不足若得此心又盡善矣世間人有二大怖而不怖何謂也在則必有涉畏途觸禍機以貪冒而致死者事可信亦可見此既可怖而不怖歿則必有落陰崖入苦海以昏冥而流轉者事可信不可見此又可怖而不怖夫如是觀其根性以擇法器萬中無一而與之議出世之法不亦難乎詳夫止觀二字但以文順而言用隨便宜不拘先後或先止而後觀也有如臨池俯視對止水而影象可觀或先觀而後止也又如秉燭夜行觀險路而車徒乃止譬喻易曉明敏當知夫開示悟入錫智則由乎師觀練薰修致力則由乎己與我同志當如是解吾今自約當以先覺智無生忍奉為頓教實教又以對治法方便門奉為漸教權教二者並用其理偹矣豫初觀老莊之書其心豁然包太虛而不礙次觀釋梵之書其心吻然貫微塵而深入所以安貧佚老蔚為𦏁皇上人也吾居靜境可比華胥國之境吾為逸民可比葛天氏之民吾聞和聲可比鈞天樂之聲飲食節約無求所嗜之滋味寢興順適何須外助之嬉戲不改其樂永錫難老動與吉會其如豫何眼中不可有一物有則不安心中不可有一法理亦如是是故佛佛所傳無一法可得罪人出枷名為釋放智人出家名為解脫與其免有限之拘繫曷若免無窮之拘繫乎百骸導引貴乎動久久必和柔此道家之妙用也一心檢攝貴乎靜久久必凝明此禪家之妙用也非二妙用吾何所歸內外二定有深淺吾得其淺者矣外有捨名利之心已能得定內有學禪觀之心未能得定此心若定可謂卓然而獨立者也世人貪於我所種煩惱根我願常於佛所種諸善根此自然智不從外得孔子云富貴如可求雖執鞭之士吾亦為之如不可求從吾所好豫謂先聖所言外富貴耳豫之所求內富貴也豫欲得華嚴藏百鍊金以此為富又欲佩祕密王三昧印以此為貴未知可求不可求吾所好也榮啓期三樂則嘗聞之矣豫又別愛三樂以儒家言之豫愛顏氏子簞瓢陋巷不改其樂以道家言之豫愛莊氏子栖遲一邱天下不易其樂以佛家言之豫愛釋氏子生滅滅已寂滅為樂是三者由外以及內自淺而至深矣天聖六年戊辰歲豫年七十八矣身輕安心清爽竊謂之自覺身心境界但未知楞伽經中所說自覺聖智境界何如耳佛書之言菩提如道書之言大覺莊子云有大覺而後知此其大夢是也佛書之言涅槃如道書之言至樂莊子云至樂無樂至譽無譽是也吾好旁達於理也如此向子平讀易至損益二卦乃曰吾已知富不如貧貴不如賤但未知死何如生耳豫詳子平學而知之者也而學不兼該止曾泛覽儒書知富貴之為纍不及肥遁之超絶未嘗深究佛書不知生死之為纍不及寂滅之解脫所以有所知而有所不知矣夫出世入道之法廣大微妙之臻極者非世人所能知故隱君子之書有語云不可致詰古先生之書有語云不可思議豈可以世人情量測度哉智人不當與之是非鋒起而爭勝負耳豫以為煩惱性空不當過執須以智慧燭理勿與愚夫混同故佛書云以智慧劒破煩惱賊又云以智慧力裂煩惱網又云以智慧火燒煩惱薪是也禪門樞要唯以無念為宗嘗有學人與豫談云不怕念起唯恐覺遲豫深以為然因而依韻別作四句續之以自規云覺速止速二妙相宜知非改過蘧顏可師唐刺史李繁述玄聖蘧廬十六篇其序有云冀深信照之能度苦厄又知有以常相見不在於眼界豫因思白樂天有詩云東宮白庶子南寺遠禪師何處遙相見心無一事時是知至人之相見在心不在眼也吾今諦觀人倫一切之形一切之情一切之聲一切之名重重虛妄唯一真之靈謂之實際固當隨緣而過以順外事如理而住以辨內事獨斷在己無以詢于衆論蓋由殘年迅景不可以踈而害親以小而妨大也吾有二失與道為纍觸境小忿熖熖成炎嬰情隱憂綿綿不斷改之為貴唯力是視琢磨至此吾道庶幾論者言養生之道身貴乎勞心貴乎逸豫因思之得正為妙身貴乎勞蓋謂勞動之勞非勞役之勞心貴乎逸蓋謂優逸之逸非放逸之逸智人當知其理如是白樂天酷好遊觀形于吟詠有詩句云留春不住登城望惜夜相將秉燭遊又有詩句云眼看筋力減遊得且須遊如此之類不可具舉豫謂樂天所好者常遊耳豫所好者遊可遊非常遊豫好列子之遊列子曰人之遊也觀其所見我之遊也觀其所變謂凡人唯覩榮悴殊觀以為休戚未覺與化俱往勢不暫停豫又好壺丘子之遊壺丘子曰務外遊不如務內觀外遊者求偹於物內觀者取足於身取足於身遊之至也求偹於物遊之不至也豫詳其意謂人身取象二儀無有不偹大約貴乎反躬觀理心遊於大道足矣故豫好之豫於遊觀又好莊子云假道於仁託宿於義以遊逍遙之墟又好老子云常無欲以觀其妙豫以立意為宗觸類而長唯變所適下筆不休也吾獲三勝之利其理超然知寡欲之道無大疾疢而獲康勝見正念之法無大濁亂而獲清勝居不競之地無大咎悔而獲吉勝此三者自得而已身相日日變衰心相念念遷謝汩沒浮世誠宜自惜洞見至真之源梵語謂之菩提安住至樂之境梵語謂之涅槃上智兼該當如是解豫因泛覽究觀具知世為幻也人為幻也心為幻也智為幻也何以明之白樂天有詩云幻世春來夢浮生水上漚此言世為幻也又有詩云生去死來都是幻幻人哀樂繫何情此言人為幻也圓覺經云衆生幻心還依幻滅諸幻盡滅覺心不動此言心為幻也圓覺道場修證儀云佛運如幻智慧出谷響音聲說空中風畫言教救攝夢想苦惱衆生還令悟入法性此言智為幻也夫如是則從凡至聖無不是幻誰能於此重重夫幻化之中妄執有法以自苦耶而今而後豫當遇物而應無所將迎順緣而過無所固必未知果能然乎而志願如此吾嘗覽儒書禮記禮運云人者天地之德陰陽之交鬼神之會五行之秀氣也又嘗覽道書列子冲虛至德真經云一體之盈虛消息皆通於天地應於物類吾久未感悟及引年致政之後間居於浚都之舊廬至天聖六年戊辰歲李春月一日之中忽爾先降細雹後作密雪一旬之內而多風不雨吾見本族卑幼屢有微爽康寧者或有咽喉壅閉不利皆經信宿而愈復聞鄰里之家亦如之蓋愆玉燭之和而使然也二書之言信不虛矣豈敢自謂學際天人但明氣類果同決定無疑耳因而諦思由於天者既了知而無悶由於人者當調護而攸宜偶書其事遍示諸兒孫俾之詳究且表古聖垂文設教灼然有據又表吾老年之學重增精至非孟浪而言也姚秦時釋僧肇初以莊老為心要後見古維摩經始知所歸吾已嘗述之矣復有緒餘之意今續書之再明理之淺深焉道家所說猶涉世間之法貴乎混然大同外無一迹可識釋氏所說直是出世之法貴乎豁然大空內無一法可得具此知見者必能自信自足彼此無往來定矣佛書中意不許人偏計之心為其誤認虛妄無窮重增太煩也道書中意不許人逆計之心為其預生勞慮過當未必果然也二計之失吾當自戒畏苦愛樂當修福業出世入道當修慧業修慧業者固不可得修福業不失其正者亦鮮矣夫悲哀感恚成其性習者道家不許以為幽陰之病也鼓發狂閙恣其娛樂者禪家不許以為放逸之咎也離邊得中由己之智用智之道精之至者可洞貫於人神其道有為故有成有敗有所不偹焉不用智之道誠之至者必洞貫於人神其道無為故有成無敗無所不偹焉此則大槩而言不可剖析者也向子平所云富不如貧貴不如賤豫嘗立理為文因言及此者多矣而未始引證其事有所明據夫二不如之事歷代尤多難以具舉今且以古人富貴之極灼然易見者陳其二人以為驗焉昔晉石季倫奢豪角勝可以言富矣及乎孫秀矯詔季倫遇害乃歎曰奴輩利吾財此則富不如貧信有之矣隋越王侗留守東都及乎唐公起義而東都之臣立侗為帝仍號皇太主可以言貴矣而遭王世充威勢所迫乃焚香發願從今以去不生尊貴家此則貴不如賤信有之矣我於一念二念三四五念乃至百千萬念於念念中存其覺慧即是一佛二佛三四五佛乃至百千萬佛於佛佛所種諸善根圓頓之宗貴簡而速其有妄想氷執當使應時融液不厯僧祗獲法身其理如此世間法厯任之身則一也考其官業而陟降各各不同出世間法厯生之性則一也隨其行業而升沉各各不同世間法粗或容規求規避出世間法妙如影響之應形聲決定無差也吾今立言明學人頓悟漸修之喻頓悟如燈來照物入暗室即時而洞分漸修如春至融氷積和氣移晷而消盡其理親切誰曰不然唐相裴公休所作勸僧俗發菩提心文各有條目內有一條勸通圓頓經典有句云金剛圓覺簡妙通明華嚴涅槃廣大具足豫於簡妙二經最所留意因思金剛經云須菩提聞說是經深解義趣涕淚悲泣又思圭峰密禪師初為僧在蜀隨衆齊于民家居下位以次受經遇圓覺了義卷末終軸感悟流涕是知二經殊勝大同貫心達性感動之深切也如此豫今止采二經名義决定總持以為智力先以圓覺淨明之體為其智此則識心達本其智永不迷永不昧矣又以金剛堅利之用為其力此則有進無退其力不可礙不可壞矣得此二法守而弗失可自號曰無敵公也我願以無所住心退藏於密令人不可窺測有如季咸善相不能相壺丘子末後之相在列子第二莊子第三又如大耳三藏得他心通不能觀慧忠國師末後之心在景德傳燈録第三此相此心無迹可尋故也豫因看景德傳燈録第十五筠州洞山良價禪師有語云若不體此意何超始終之患直須心心不觸物步步無處所常不間斷稍得相應豫三復怡然冥符宿志乃録於此以為法要勸農墾荒勿責近利責近利則闢土不成何以廣滋殖之業立法𡸁裕勿定深文定深文則殘人無極何以贊生成之德賢良翼聖明恕居最非其明不能達佐治之本非其恕不能逃始禍之罪唯濟世安民之主暨論道經邦之臣同心而行方期集事古語有云見怪不怪怪自壞豫因擬之別為兩句語云見魔非魔魔自和幻身諸病須以藥攻幻意諸病須以理攻病既去矣其攻即止諦觀吾身身之未生不知預喜身必有化如何預憂此是覺慧此是埋斷其次緣纍抑亦浸踈豫問覺道之人曰此物大包太虛為何百步視秋毫之眼不能覩輕無一毛羽為何擘太華山之力不能舉彼但熟視於豫默然而已學道之人雖曰有心心常在定非同猿馬之未寧雖曰無心心常在慧非同株塊之不動理性體用至論如此身隨一氣而聚散孰能制也心應衆緣而起滅孰能避也唯燭理之明者善以智力委順裁遣耳豫自謂曰爾能總持三事可以足用讀儒書若能樂天知命不以世故貽憂讀佛書若能識心達本不以外緣致撓讀道書若能遺物離人不以衆人同趣既明且守夫復何求吾今直指顯說心法簡妙精微之理取其正真但得明了安靜到純熟而已物有生化心有起滅事有變遷天下古今理之大常者也達觀熟者不當驚異凡一百三十八章詳校官監察御史臣王爾烈檢討臣何思鈞覆勘
