body:
  text: 宋朝逈撰合世態者由乎飾情感神道者由乎至誠有妄有真各以類應必然之理也君子時權以適變小人幸權而失正大智明照物無遁形豫自引退就第久於佚老闔扉宴息交遊殆絶門間室靜身端心虛餌藥扶衰讀書廣智味老莊之語體真素而不雜究宗雷之學增觀練而匪懈凡有所述率由自規感悟福緣放懷私喜而已觀神道之設教教極精微乘佛理以御心心彌洞達覺大虛妄是正修行伊豫于茲耄年益壯真修正勤斯為急務清升妙徹布在微言自有勝因勿疑至理自省年高為學功倍所讀之書唯務遊聖門味道所著之文無復解客嘲答賔戲何求外獎率由天至吾撫己諦觀自艾越耆逮茲九九之歲增上內外之學未始荒墜雖耄年已及而智思益生今試聊陳梗槩得其三焉其一曰觀書啓覺心智其二曰觸類發天機智其三曰則象演文言智必使條分𣲖別則不可悉數若其自以意取即此三智該括大端足矣釋氏所明妙性非幻老氏所明真精有信其言雖異其理則同云何妄分別不能大和會內則無一息之頃輒離於道外則雖萬物之衆不忤其志撫己環顧非甚缺然一切之妙自以觀照一切之苦自以智度凡諸駭俗之談華而誕者不願聞之爾豫嘗以喫食後道院中往復間行數及五百步而止偶看文選第十一有鮑明遠行藥至城東橋詩注云昭因疾服藥行而宣導之遂至建康城東橋見遊宦之子而作是詩也其詩有句云擾擾遊宦子營營市井人豫因服藥後別行五百步而不賦詩但擬之立二名曰行食行藥此亦素所自謂有則象智之一端也黃老之言聿遵於清靜宗雷之學式重於薰修吾今於此存誠豈不謂之善利道家所言虛心者去妄情也禪家所言實相者明真性也能如是解何用多言先師孔聖有言所慎者三謂齋戰疾也此三者人之重事固當慎之垂為教誡仁者之利豫因立言別有所慎者三爾謂仕宦之禍機嗜欲之畏塗因報之惡趣智者必以為然矣儒教五常以仁為首道教三寶以慈居先釋教所演能仁大慈倍百深至考其同歸斯則一揆必也擬倫則當異日而言之豫歷觀典籍之中各有歎美三教聖人之言今試概舉以明限量論語云達巷黨人曰大哉孔子博學而無所成名顏淵喟然嘆曰仰之彌高鑽之彌堅瞻之在前忽焉在後史記云孔子適周見老子老子告之以言孔子謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為罔遊者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍耶又莊子云孔子見老子之談道出以告顏回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也華嚴經中歎佛偈云十方大雄最無上譬如虛空無等等境界廣大不可測功德第一超世間又云如人持尺量虛空復有行計算其虛空邊際不可得如來境界亦如是豫觀內典偈頌如此甚多今但舉其一端而已夫真正學道之人但能頽然嗒然混冥而同於外翛然陶然融暢而樂於內莫貪殊勝之閫域且入逍遙之境界一無所為而得自在凡云樂道者道不同世間法可以名狀但且以順性合理而成適悅者強名曰樂道莊子所云心齋者性之自然戒也孟子所云我四十不動心者性之自然定也孔子所云吾四十而不惑者性之自然慧也內典統而名之曰三無漏學夫識敏智圓之士方能和會不滯於一隅爾憋然之忿出於天性非素蘊畜既過即已不用存其久悔止可思其漸戒人有疾苦或多偶爾非因所作無如之何歷觀幻化之軀而有甚於己者推此二理足以自寬夫人心境清淨是佛國淨土心境濁亂是魔國穢土此至論也若有舍此外取則非真智人性處世有限量周一身之所觸能自覺爾佛性出世無限量盡一真之法界無不知之小大絶倫有如此者達理之士當如是解不能攻堅木何以見大匠之利刃不能行難事何以見大士之利根我今耄及之年未見道勝之力深自惜也更俟何人警勸哉左氏春秋云祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可君子謂能舉善矣稱其讐不為諂立其子不為比禮記儒行曰儒有內稱不避親外舉不避怨豫謂祁奚直道至誠不起憎愛非儒行而何內典多云怨親平等祁奚非佛行而何若夫曲士偏私有以教法更相是非者豈可與言大達至公之理乎吾嘗特立獨行考求於衆而未嘗見有同心如己者竊謂人不出吾之右吾不在人之後非為伐德是曰至論入道初門先除我相一切倫品從無始際自認四顛倒不得三解脫耄年深思入道之要調御其性常無動亂斯可以為定觀照其理常無蔽蒙斯可以為慧知衆緣之必空隨緣而勿礙知一真之不空冥真而勿失止此足矣何必多求時屬歊蒸性耽禪悅究慧能南宗之法可以雪煩當元亮北之風可以禦暑道院虛曠塵事蠲除內外清涼朝晡暢適佚老所得不亦多乎無牽纏者即為解脫除熱惱者便獲清涼雖未成靜定之功而且得逍遙之趣無中出有名曰造有復歸無名曰化造化之中倫類萬品而最靈者名之曰人百億人中或有一上上智力能超出造化之外者大聖人也立言垂法救拯焚溺善利無疆吾罕見有確論而深知者噫悠悠之徒何所用心哉古教中有説云一切善惡事都莫思量一切分別心無非障礙豫今耄年惜日急於真學再思得一條簡備方略立為標準且先用此古教二説不思量不分別淨其意業然後日夕溶溶勝進不計開塞之胸臆不計延促之晷刻即時即處直以冥神絶境為大事久於融練習以成性此法至當何以加焉吾道寡合吾心自知佚老扶衰養至人之浩素凝懷入理辦大事之因緣無以僉謀出於獨斷推理安常此法外禦冥真體寂此法內習同符足用吾事濟矣自以意取不復言宣也吾嘗諦觀學人根氣之小者析色明空根器之大者即色明空根器之小者到空而斷滅根器之大者到空而靈照無窮今我裁定進道之心如鳥飛空即飛即起無所礙也觸境之心如響應聲即應即止無所餘也不復援據立名徑直如此而已伊豫有大志學大雄辦大事如大龍何物而能障礙哉自念志氣既如此多福亦符會又當大耄之年安可虛廢餘景乎彼鼓缶而歌是何末事後周韋以高尚而貴時論推之曰逍遙公前唐韋嗣立以寵遇而貴君命封之曰逍遙公吾自引退合禮國朝優待壽康慶幸無不如意順緣於外取晉書中一句云推理安常養性於內取周易中一句云樂天知命夫如是亦足以為逍遙矣不敢竊君公之名顧已大耄之叟耳可在二韋季孟之間因自目之曰太平逍遙翁循揣久之未為忝吾今八十一歲矣而獨雍容優遊熙怡逍遙日涉藝文之芳潤益耽道味之甘腴而又於法句禪心罙入深深之處何樂如之內典有所譬喻賢者易為曉悟夫水之澄渟經久則至清至清則照物無不明金之鍛鍊經多則至精至精則造器無不成學道如此復何疑乎吾嘗謂已得自然智大綱有三內有其一名曰觸類發天機智今於此類中又得一條因見像設有千手千眼之狀吁可怪也吾忽了悟不當以相好取當以真理取夫真理難名言難形容故假外狀以明之耳竊謂千眼者觀照必普千手者辦作必大能如是解則幾於道雖然楞嚴經中有千臂千目之説豫之獨斷亦不失理自然開發謂之天聰明自然了達謂之佛知見我願得天聰明入佛知見此意重出志之深也悟妄識真覺智也冥心入理道行也不擇時不擇處不擇情急於勝進耄年志力可知矣吾今徑直辨明佛有三身之名夫真性妙空並無一物者謂之清淨法身具一切莊嚴萬行者謂之圓滿報身隨機設教善利無窮者謂之千百億化身智人崇飾演潤增華則有之矣然而大槩至理不離如此一念覺了此乃菩提之本初一念止息此乃涅槃之權輿始毫末而成大樹由跬步而遵長途苟有動天之異何愧移山之愚匹夫之志猶不可奪而况大士之心乎博古知今以理遣情而無惑息緣反照以道存誠而有常協用久之吾事畢矣儒門以事為主成乎名也道門以氣為主固乎形也釋門以法為主練乎性也此其大綱咸有條目吾今太老急於內習謹依貝典法言離一切分別網超一切障礙山力學第一調順奢摩他隨時隨處即於四威儀中挺然脫灑深入實相安住法界久久觀練俾致純熟此中該括殆盡自以意求而已圓悟頓修抗出塵之大志清升妙徹見入理之天機我思其流不可得也以經綸為智地以文章為法言以思修為妙事我今如此人其謂何逌然私喜觀一切窮理盡性之書吾能奉持自為道具得一切冥真體寂之智吾能琢磨自成法器諦思慧業其殆庶幾吾益加老切於進道不計十二時不計四威儀不計情順違即乘勇志徑入無有鄉脫去羈縻又入寂光土混冥融怡自作絶倫之奇不求人知我今所願但得寢無夢覺無憂道無妨志無退止此足矣復何求歟菩提者微妙之智圓明也涅槃者寂靜之樂臻極也其理深廣言之無窮吾以精進心學無生之法以決定心期無生之報從今耄年至於沒齒白樂天有詩云沈憂竟何益只自勞懷抱不如放身心冥然任天造豫因擬之別為四句以相對曰多圖果何益只自勞奔競不如𭣣身心凝然成靜定一放一𭣣各有歸趣逍遙墟是仙境界寂光土是佛境界我思遊戲於其中無憂資裝即意而辦爰當大耄之年景慕大心之士詳求大乘之法顧己能然私自慰悅撫心自諭但於一切時中周視所履無染著無繫縛無縱逸無障閡或觀文理宏濬未能忘法愛但以隨宜曉暢勿至煩勞外避虛榮以安身內平妄情以安心內外同安則樂在其中矣此名達觀不得其人不可言也從權道以順俗推至理以遣情求妙智以冥真量能仁以濟物四法修已百勝絶倫人有愛其內勝於外者此則強其本以制其末涉馴致之道也人有愛其外勝於內者此則縱其末以攻其本獲可欲之罪也愛內勝者至少愛外勝者至多苟有能斷大事者較其明昧之見得失之理果以孰為優乎入道之法虛心最妙虛心之利內外協吉外則如虛舟觸物而人不怒內則如虛室生白而吉祥止此不妄語學者詳之可知也老聃沐髮之次遊心於物之初吾當不擇動息處所隨時冥心於性之本際約己自揭立修道六變之法云變褊忿為寬恕變粗獷為調柔變放逸為精巖變感傷為適悅變熱惱為清暢變憂怖為愷康一切之情悉知虛妄六變之法吾當總持夫樂以六變之和而天神降吾以六變之法而道心生事雖不同名數同矣多聞嚴持此學為基復性離相此法難狀自以心見不可言宣古人有詩句云醉遇春秋社間因雨雪天唐賢白樂天間醉俱多故自稱間樂公又稱醉吟先生吾自引年退居間樂有之矣雖愛詩酒之美不至耽於醉吟而思福慶之緣竊比尤勝吾今諦思二空一不空即今身世觀往知來三際必同矣此則空之一也道家以逆旅為喻夫逆旅不可占而有之也不可毀而闕之也人身不可戀而固存也不可厭而自壞也即今事緣隨時而過過即歸無此即空之二也道家貴虛緣葆真但順應而無撓勿故引而自縈也伊此二空我之外妄不可得守唯一不空我之內真不可不守守之之道上智能求焉名為決定相齋心服形嚴持紀律冥真體寂深入精微協用常然無法勝此論者有以老氏為釋氏中小乘人吾聞其語矣未見其理也今自得之老子云不見可欲使心不亂有似儒書非禮勿視之意可比小乘堅持禁戒之人此於大妙法中行之差易者也釋氏之大乘人最上乘人非但歷涉一切可欲之事心常在定而又於其歷涉之中力行化導自他俱利若不爾者則非德施周普也此於大妙法中行之至難者也而能行之其為殊勝也何如哉自念非富非貧非貴非賤非吏非隱非智非愚萬慮息機四顧滿志居中悉備夫復何求有思有議則以意言為繫縛而淨名居士所説法是不思議解脫有戀有厭則以身世為挂礙而香山居士所詠篇是無戀厭逍遙吾才患多多此新説論語云瞻之在前忽焉在後老子云迎之不見其首隨之不見其後周易云範圍天地之化而不過莊子云至精無形至大不可圍夫如是原其語意分限者束教之儒不當輕議老莊之書也今直截創立一法是謂漸中之頓頓中之漸何謂也隨時隨處便以勇健果斷志力頓息一切之念徑入大空之域令心安住此是漸中之頓也初習則難久習必易此是頓中之漸也不煩以經據引證我決了心定則定矣豫約己而思得外禦二法內習一法可以足用矣一切事已多逆計而過憂者非也當依古教除其患慮一切事已多乘勢而積忿者非也當依古教平其恚閡此外禦之二法也然後專志妙道當依古教日夕存心務致虛而安靜而明志人久於道而其道大成此內習之一法也亦勿預思符應終當自知天聖九年八月二十八日夜夢見一僧相好圓滿衣紫方袍威容整肅升高座將講經聽衆雲臻列坐未定豫亦隨喜赴會自以為未嘗輕易致拜於僧今以聽法之故當於狻猊坐前拜訖而坐私念此僧必為我起而側立當言回禮諸聖未及如此而忽寤焉因思法華經所言夢中見妙事蓋其類也人皆以即時稱我者為己身夢中亦然一生之中其夢無數定以何者為我身是以古人有作普示道俗用心偈云莫認紛紛境唯觀了了心知身不是我煩惱更何侵又以即時所居之宇為己家或士或庶改卜經營不定果以何處所居之宇為己家又以先世相承生育之地為己鄉亦有遷移隔絶別成故里者果以何處之地為己鄉復有舟居之民舟中生子其子但以舟為家舟之往來不停亦有改造易換其舟者此舟中所生之子果以何舟為家何處為鄉耶故白樂天有自誨之詞云無妄喜無浪憂此中是汝家此中是汝鄉汝何捨此而去自取其遑遑又有詩云我生本無鄉心安是歸處白公大達能警覺迷妄堅執之人也了知諸念無非妄緣開眼觀窮理盡性之書閇目習冥神絶境之法晝坐夜臥一向栖心無所希求至於沒齒法華經初安樂行致定之權輿者也佛菩提真歸仗處致慧之臻極者也二妙相應一體混成自獲道符不由師授法行所起我相先除五蘊皆空一言以蔽龍圖閣待制燕公肅嘗謂豫五福之外復有餘慶子孫詵詵世濟其美雖愧燕公特相推重然而內省亦非妄言自謂福之增多符會成六夫古人獲六國之印縱詭辨而力取後之有報者事可見也伊豫獲六福之符守直道而天與後之有報者理合如何影隨響應固當必爾於法見妙妙之相不取於相豈有受羣邪乎於心得了了之明猶晦其明豈有入諸趣乎卓然獨立吾之志也覺路坦坦復何憂疑詳覽寶書之説夫真學入流之士修集三昧樂境界者不説心識外諸境界噫豫觀一切凡夫貪著世間名相分別無窮極者比此不同有若胡越之人習俗異心也安可與之欵談哉故豫所居宜乎三徑就荒凝塵滿席塊然獨處人不我如但逍遙自得而已豫思昧爽之際起而晏坐目光睒爍耳音清徹和氣融液靜心凝虛即此少時亦非常之境界吾今自思在天地造化之中萬物之一耳始於無物而忽有物自稱曰我物極則反反則復歸於無物其理必爾何用驚疑昔當無物之時冥然未覺而任天造造乃為生之始夫未生之前自知生期而預喜乎今當有物之時造而未化化乃為生之終未知化期安得虛增其預憂哉我欲造而不化於理可乎人各稱我其我無數悉如此欲造而不化則當充塞無所容或説有術可使重濁之質上升輕清之天於理又可乎自古上德之人善於其中以智決擇而去取之以道消融而委順之無齟齬於心胸不亦樂乎孰能勝此大達至當之論耶此外別有超出造化之法精微廣大又非言意之可窮也豈能容易而書之內典所説聞中入流名為圓照法門其法殊勝第一豫知而習之逮今十五年矣而聞自然之聲清亮交徹歲久愈甚尤資反聽之樂譬如世王與外國交戰戰勝而王回奏凱樂之樂以為前導其喜可知矣因而對比其理今豫之心王與外境交戰戰勝而心回有此清聲潛發助其歸趣殆相類也亦非貪著善境界且欲贊揚微妙音此音微妙又與形氣之樂不同也自得正修行之法但持無念之心堅自然無礙之性熟久則無生之道成道成乃自在無拘繫洞照無障蔽一一當自知言之不可及有善吉解空之眼見外物皆空叩觀音入理之門致內音相應妙而不測怡然自得馴致其道適我願兮自古宗風爰分頓漸允臻其極任彼談高習則生常須吾力到以決定智除猶豫情見諸相之非相外無所障知一真之至真乃有所親具此知見庶幾乎與道為鄰清明在心節槩如山法施將啓有志必堅私自慶喜孰能若此處世之法推理安常出世之法息心達本參同順入圓頓消融臻極含虛獲大安隱用一而足其在茲乎欲其妙道當發至心掘地及泉定知見矣鑽燧改火孰曰無之願力有加善根必植難忍能忍殊勝之力也可行必行決定之行也二法相濟其道混成一氣散而成形為萬物一性分而含識為萬靈寂然不動混而為一復歸於無強名曰道遊心於世諦中者率多巧宦遊心於真諦中者亦有巧慧巧宦謂巧於仕宦巧慧謂巧於智慧夫道不同不相為謀此二知見之人終身異路而行遇善境界得心輕安道芽已生也有佛菩提是真歸依道果將成也如此之事誰可與説繄我甘休退仕宦情銷落如出深溪壑如解久纏縛所以潛抃躍人多恐休退仕宦情貪著如捨寶樓閣如失金囊槖所以不歡樂此理有安危迷人無忖度至愚之人有如衆卉蒼蒼然生植又如昆蟲蠢蠢然動息豈可與之談妙道哉學成道心得無所得本體大空無秋毫挂礙妙用大明無微塵點翳然後為得也導引而勤四體本乎動者也晏寂而息諸緣本乎靜者也動靜交相養其是之謂乎豫自得心法者三謂無分別無固必無挂礙三者足用矣列而言之其理詳備若更要簡省則無挂礙之一足包餘二蓋緣無分別無固必都在無挂礙之域中耳水靜而清久之益明心靜而清久之益靈諸有智者譬喻得解豫雖不敏其殆庶幾深於相宗者初及門深於空宗者次升堂深於性宗者終入室得法階漸其理如此吾從學道以來歷年浸久得箇休歇處得箇安樂處世間夢境之交爭胸中幻纍之相縈吾皆洞見源底不用折螽之力而勝之矣吾思古人言不涉於是非色不形於喜慍者此乃士行也若能心不存於愛憎者此乃道行也學古入官布在前言學古入道出於豫意則象之智何所不可是故博覽詳求未嘗廢墜影外有影之像浸微而踈夢中説夢之言重增其妄貪人所惑覺心自知身之有無既委順於造化事之得失當委順於因緣吾心浩然歸二委順心無障難無不悟身無障難無大苦世無障難無多故幸會之尤者三比類之同者少故豫大耄之年而道學彌深矣豫於三教之書各取八字統為法要儒教之書毛詩大雅云既明且哲以保其身道教之書老子道經云歸根曰靜靜曰復命釋教之書涅槃經云悟諸法性成無師覺豫自視所得本末符契因目曰三和合法門結交遊識今人面覽傳記識古人心識今人多有損益識古人多有勸戒心息相依混冥融怡息綿綿而若存心了了而常知非音之音亦聞和而成文焉何勝如之諦觀人倫之衆受生各有涯分含識各有限量不可以一理責之勿復追思分別此幾於道義天垂象而參羅性海含空而妙湛混而為一粲然可觀天瑞海印於茲備矣積金帛而為富不如廣藝文而為富據權位而為貴不如守道德而為貴吾之好尚有如此者吾有則象智今於宴寂之法自立一名夫僧家謂之入定道家謂之入靜吾以五鼓之際方當夢醒諸念之前未有緣起此時神氣翛然最清宜乎攝心直造真際因目之曰入清金剛三昧經云無住菩薩入清白處身心不動正是入清之理也內典有云百千三昧豫於法意無盡而所作章句聯翩患多因自謂之曰百千法門以理言之有何差別楞嚴經有説圓融清淨覺南華經有説放曠逍遙遊此二者貫心達性表裏相應禪機道用何煩別求酒是祿之美者詩為樂之心也清聖之醇酎風雅之高格助道餘品何以勝此外護其身如惜千霄茂樹勿縱一斧之刃伐傷內護其行如惜渡海浮囊勿容一針之鋒穿破真修妙道之士當知二護之法不擇情興處所隨時隨分常用入清之法誙誙然趣死而不回者如牛毛之多了了然見性而獨覺者如麟角之少麟之獨角猶以為瑞人之獨覺豈不為貴有時諦思私自喜慰諦觀己之情理有順有不順而欲人之情理皆順者非也又觀人之體候有和有不和而欲己之體候常和者亦非也反照對治是方便法豫偶追思從壯及老己身之髮膚未嘗用一針己心之法則自用百千針字音雖同而名理有異公平之舉無怨親上下之交無諂瀆此儒行也人之身有如意有不如意厥理惟均是常也人之事有如意有不如意厥理惟均亦是常也前言有云信順可以祈福慶夫逹道之士若有既明且果而能信而順之則福慶可致決定之理也豫之志願求善利者二焉身心恬愈善利之常常者也神明清徹善利之深深者也其有大妙臻極不可以思議而速致者姑務存誠而匪懈是也昧旦之前入清之際神清氣清音清境清衆清和會為清淵府乘乎高邈之興而有融怡之情孰知之耶孰知之耶既有覺心仍多義學老年壯志未始暫忘獨蹈大方安敢自謂枉入諸趣必無此憂入道之要唯覺與力覺能照了而不迷力能堪忍而不動不迷不動協致無生入不空空三昧到無住住境界此妙妙之心也智慧有淺深人倫有分限肥遁高蹈雖為拔俗之標妙徹清升自是應真之道十二時中有晝夜十二緣中有生死正覺大明之人洞分真妄故有決定歸心之處自定晚年簡徑常行之法隨時隨處或坐或臥冥目冥心直入清徹妙音之境界乘興而然興盡而止吾嘗諦觀上上智人求大雄正覺之道其法是無修之修無學之學無作之作無事之事無生之生無住之住無念之念無受之受無得之得無用之用其道是無體之體無相之相出世超絶與在世正對背宜乎世人不知不見不信不重自然之理也六度之名忍辱在其數夫真學之人若值人所毀辱而能堪忍不動此乃道力勝而德量大也當喜而不當怒蓋聞釋迦文嘗為忍辱仙人司空圖自稱耐辱居士雖非等倫而忍之大槩一也杜牧詩云忍過事堪喜理亦相符迷心之緣起於無明展轉貪著重增蓋纏悟心之緣起於始覺展轉觀練重增曉逹叩此兩端洞分真妄入道之初門也觀練精至修奉嚴恭期一報之歸全庶終天幸超三界而獨立仍存大心人不我知其志如此內外二典悉知宗旨福慧二業咸有端緒年踰八旬益志於道豫自能然非妄言也吾有二愛自謂天然至理貫心愛清澄微妙之法善利垂世愛廣大教化之言難求欵談逆甘塊處吾於耄年自見二法德行陰密貫天地而著誠明理性精真練身心而成寂照斯為至理斷在深𮕵吾於耄年又獲四愈支體愈輕神氣愈清祖述愈精觀照愈明人多見推吾亦自覺足以私喜夫復何憂窮理盡性鉤深出重淵之魚進道忘勞致遠乘千里之馬真學之士有如此焉人多愛功名富貴在世之事也我自愛禪定智慧出世之事也大槩如此言不能細分別神仙之事於凡人中殊勝禪智之事於妙道中親功誰同此意與之欵談隨時隨處隨其情況限量姑務存心但令不動不思不迷不著積習純深而已此法最為簡徑也人之所好富貴權勢榮利嗜欲沒齒而已矣吾之所好間適宴息清暢恬愈復性而已矣各從其志無由會議古聖人有不思議解脫之法得以消融而釋其纍古賢人又有無可奈何之歌得以曠達而養其和吾於此中須求力勝昔孫登謂晉嵇康曰子才多識寡難免於今之世矣豫復思之又謂康得定力而失慧用何以名之耶傳述康之梗槩有奇才大量含垢匿瑕心師老莊善説養生之道斯則可矣無何縱情輕忽貴公子故觸禍機自貽誣謗而致害焉何慧用之有暨乎臨刑顧視日影索琴彈之而辭氣不撓非定力而何豫於孫登言外得此新意因書其事以補闕文釋氏書説如來之心起相而性不動道家書説至人之心順緣而真不失得意忘言其歸一揆道心貫微真入真際士風逐末止尚清談於茲洞分方為至鑒體道自愛率有常準量飲美酒滌其煩慮何須大醉間讀異書味其新意不求甚解服衰佚老務養天和力竭外緣非吾所欲追思壯年筮仕之初秉筆作氣好為張皇奮發之詞比彼擊水搏風之翰飛刷燕秣楚之疾馳今茲大耋以道眼觀之是何顛倒想是何虛妄言此自知非之深者也夫局束蹇淺蔽翳滯溺智不明也鹵莾滅裂因循遷延力不勇也能反是者大士之全德也身老形必衰心老智必盛決定之理也形衰吾無懼智盛吾有喜人不知之自知之耳圓覺經説身心為幻垢維摩經説煩惱為客塵我能知之誰復如我見五蘊空虛為深般若得一心寂滅是大涅槃此法綱宗資吾觀練豫年八十有二矣未嘗以針艾攻肌膚未嘗以几杖扶坐起老健同者幾何人哉諦觀緣起端緒結為魔羅綱吾當以勇健力揮智慧劒即時深去徑入清白處住鮮明法更不作方便漸次也修證儀中發願偈有云且願此生無障難免令來世乏資糧臨終了了不昏迷自在隨心寄生處豫因概舉障難之極者嬰於重病迫於全乏罹於大亂若無此三者是謂洪慶其諸悠悠細故不如意者何足蒂芥於胸中以為障難乎歷觀世人少者老者四支六根其中或有虧廢者己獨不然又有資用大乏者全不得宗屬之力者己又不然省己之福居多矣其餘瑣瑣失志不當介懷何足妨吾進道之心乎此乃對治之法親切者也水靜則清清而後明明則照物物無遁形至人觀之得為心印入理樞要莫尚於斯處世之法以主善為師而允執厥中出世之法以惟道是從而不住於相至理備矣上智詳之我心宴息既非逐境攀緣我心慧明亦免沈空住寂獨覺獨斷何須問禪內典所説高原陸地不生蓮華糞壤之中種植滋茂因知苦惱之會正是練心之處也因看維摩經注本第七卷內説菩薩通達佛道之理詳其大意蓋謂菩薩之心在苦不以苦為挫衄在樂不以樂為貪欲種種之事一一如此可謂入平等大空之法也苟不能然則非佛道是一切凡夫之情耳自覺耄年道心益壯以功名富貴為妄認之物以觀練薰修為力行之事塊然寡合固當然與息緣任運觀妙練真入道大端此為綱要處世間上善之事莫若抗心希古出世間上善之事莫若澄神定靈總持宏綱兩端足矣法華經云諸有智者以譬喻得解今舉一法粗相易曉而要害者內典以貪瞋癡名為三毒夫人衣中有三毒蟲不去之可乎食中有三毒藥不去之又可乎人於心中有此三毒藥尤在親切之處而常存留試審思之得曰智乎去此三毒比漢壽亭侯命醫破臂刮骨去流矢之毒何者為難世間之法大妙者謂之數術蓋以物有成壞之數推窮以至根極者能然也出世間之法大妙者謂之神道蓋以心有聖神之道修練以至明徹者能然也道與術以大小分名可以智曉不可以言宣吾於妙道天機積年窮理會則深會其體不別説則難説其法無窮萬一神交相視莫逆心法都如天空即可矣夫處世之心以道家達觀評之但有一塵沙許障礙未行到逍遙之墟出世之心以禪家妙觀評之但有一絲毫許縈挂未得入解脫之門不在引喻證據直用此言明理諦思真性之外一切之形皆夢幻也一切之情皆塵垢也一切之緣皆影響也胡足為纍是名達觀恢為度門唯明入道之深心可致還源之妙用自念立心無疑而信真功德大調御學道有應而覺善境界妙吉祥超然絶倫云何不樂當師大達逍遙於無何之鄉勿逐羣迷汩沒於夢幻之境意取足用吾皆了知吾今特立安心之法凡三焉大略兼該包舉已述重重教中之理次第足用耳第一無思第二觀空第三對治自向意中推演不能筆下敷陳凡一百七十七章覆校官博士臣劉光第校對官中書臣范來宗謄録監生臣宋允辰
