body:
  text: 宋朝逈撰證道歌云無罪福無益寂寞性中莫問覔豫嘗獨斷此謂真性無物廓然虛明究極三空何有一法罪福益皆屬妄情若有橫生疑惑謂其為善無福為惡無罪為學無日益為道無日斯則悮矣達理之士必無此疑古德有言曰今人看古教不免心中閙欲免心中閙但知看古教豫因擬之而言曰今人學宴坐不免尋思過欲免尋思過但知學宴坐諦思內身外事因緣資畜統而言之都為我所悉欲如意理不當然設使皆然諒難克荷間以不爾却恐易勝有智之人冝乎消遣豫所趣動靜之境不越兩端趣動境志在內典愛讀鮮潔句趣靜境志在內身愛入清白處同志深者方明此說凡諸有思有為倒置也却行也無思無為正受也勝進也名相分別則有異也理性臻極則無異也明智之士當知此法金剛三昧經云無住菩薩聞佛所說一味真實不可思議専念諦聽入清白處身心不動豫因援老莊之言配解清白二字所謂清者得非老子云熟能濁以靜之徐清乎所謂白者得非莊子云瞻彼闋者虛室生白乎但能到此徐清虛白之地亦可謂之入清白處矣豫又思宜作水月觀水月定令其心如水之澄清月之潔白亦可謂之清白處矣白傅有詩云攝動是禪禪是動不禪不動即如如此言定體之深者也豫擬之別作二句云破暗用明明是用非明非暗即惺惺此言慧用之深者也華嚴論云一念相應一念佛一日相應一日佛但自了三界業空即是佛矣何必須歷阿僧祗劫然後成之乎豫謂此說包含密意是權實相兼之教也夫久迷忽悟悟即覺也覺即佛也一念成佛其理在此必要稱真合體理須有漸故以一念一日以言其始若能積久增多所獲法利即可知矣此乃實教也亦慮志弱之人患其歷劫綿遠直謂不可希及甘心永退故偏舉圓頓之說云不須歷劫所以獎勸之此乃權教也隨其根器俱可用之耳大士方便如此豫之管窺亦李逸人之知音也定如大空自然清曠慧如皎日自然光明均定慧以凝融等空明之混合茲為內習何必多聞吾愛後漢書中有清心釋纍之言吾今行此四字而已內澄諸念漸清其心外簡諸緣漸釋其纍過此以往未能自知人以一心而為靈道以一真而為體諸念雖異同是一心之緣起衆生雖異同是一真之法界所以千經萬論多說人空法空必然窮理盡性何彼我之有哉善惡有報此决定理在陽之報踈而速在陰之報密而遲敢告仁賢信而無忽內修本真當如養雞成其木雞之狀是也外順物性當如養虎不以生物與之之類是也密禪師語句云靈靈自覺元無物擾擾他緣盡是空又云勿認紛紛境唯觀了了心白少傳詩云一性自了了萬緣徒紛紛一宿覺證道歌云一切數句非數句與吾靈覺何交涉莊子注云凡非真性皆塵垢也夫學法之人但自了悟靈明之心是謂本源所有念念妄想皆是塵垢勿令染著久當證知清淨法身也外身雖見而元無譬如水上之泡暫起而還滅也內身不見而元有譬如木中之火求之而可得也此世界者釋教謂之五濁惡世然而不當厭之何以故夫煩惱者菩提之本根居此世界中若有智力明果照了練習可以學出世之法也不同在天逸樂因而自恣反淪墜耳譬如高原陸地不生蓮花蓮花生於淤泥濁水之中矣花有榮落果有甘苦木品之常也年有盛衰情有憂樂人倫之常也人若愛盛懼衰厭憂戀樂偏曲在己未離於貪龐居士詩云世人重珍寶我貴剎那靜金多亂人心靜見真如性豫因擬之成四句云人愛貴而富我愛白而虛富貴榮辱會虛白吉祥居老子云大道甚夷而民好徑豫知其理所以自戒偏邪之見華嚴經云深心不動成不壞業豫知其理所以務守堅明之志人多忙中切於辦間事我獨間中切於辦忙事此理可以智識及不可以言說到兩儀萬物之父母不能免寒暑成歲之怨咨二親諸子之父母不能免懲責成人之忿恨其理必爾自當釋然豫嘗自作兩句語云古今無始終虛空無邊際因看老子云迎之不見其首隨之不見其後此語有似古今無始終莊子云至精無形至大不可圉此語又似虛空無邊際子之語但謂時代方所無以窮也經文之語蓋言妙道體用不能詰也牧羣羊者加之以鞭驅其落後之行懲不及也釣巨魚者縱之以綸𭣣其有漸之勢戒欲速也約己進道得中為妙韋弦自警理亦如斯周易之樂天知命老子之少思寡欲莊子之安時處順釋氏之背塵合覺若能四者不失久而彌堅斯亦非常之人也佛書華嚴經中說六通謂天眼天耳他心智宿命念神足通漏盡智道書南華真經中說六徹謂目徹為明耳徹為聰鼻徹為顫口徹為甘心徹為知知徹為德徹即通也佛書則無以加矣道書之文豫因更增其二云情徹為聖性徹為神聖屬於外外為世間之法也神屬於內內為出世之法也一氣分而為萬物一真分而為萬靈萬物化而還一氣萬靈復而合一真無數稱我以同為異仍計我所迷妄何窮華嚴經云菩提心如快箭破一切苦的豫因思漢將軍李廣出獵見草中石以為虎而射之中石沒矢視之石也他日射之終不能入矣其故何哉豫以廣之前心是精誠果敢無分別不動之心也所以射而能入廣之後心是猶豫畜縮有分別已動之心也所以射而不入夫學道之人發菩提心若能真純决定如李廣之前心此乃聖心又超彼凡心遠矣破一切苦的何難之有耶豫今於儒書釋典中各引一端之語可以包舉世間法及出世間法精要悉備曲禮云博聞強識而讓敦善行而不怠此則東魯之教明古君子盛德之全者也維摩經云能善分別諸法相於第一義而不動此則西域之教明古先生妙道之全者也若能兼而有之則內外相應盡善盡美矣學者當知不煩縷述豈容易而企及哉內典甚深之道非與世教故為仇敵自是後人分彼我角勝負而云云也其實竺乾古先生理性之說曲盡其妙所謂窮理盡性之書焉試舉大意之簡當者且如世教中仁德本乎施濟而有偏恩之在私愛也謙德本乎恭順而有飾情之隔純誠也佛法則不爾行必歸於無緣慈言必歸於决定信包含衆善若洪溟之納細流混而為一其廣大有如此者博聞洞曉之士當以斯言為然道佛二家各述心要其理之大小淺深余今又舉大端以明之道家謂心如虛舟委順而遊此屬於外外屬世間之法也佛家謂心如太虛觸境皆如此屬於內內屬出世之法也妙道難說深學乃知必須盡破諸結等金剛之堅利不染五欲比蓮花之清淨受想行識如消湯裏之氷爽利虛明似得握中之寶若能到此可謂奇人深於妙法之人當知方便門者是謂有餘說不了義真實相者是謂無餘涅槃無上菩提豫愛諸佛語心上乘經旨得圓融之寶覺六根混同發明妙之心華十方照了如斯如勝何以加焉謂之無上菩提信不虛矣白樂天有詩其末句云窮通不由己歡戚不由天命即無奈何心可使泰然且務由己者省躬諒非難勿問由天者天高難與言豫因擬之別作八句云求位不由己求道不由天位即無以求道可使進焉且務由己者己能盡心源勿問由天者天高擅化權又擬之別作八句云順逆不由己喜怒不由他他即無奈何己可存太和且務由己者克己諒非多勿貴由他者他心是我魔智悟不迷智有所見此名智人智人之心達理之聖心也神徹無礙神無不見此名神人神人之心圓覺之妙心也又言行相顧儒家之常德也理性相符佛家之妙道也儒家立一切法以為規檢目曰名教此於佛家門中有如相宗道家破一切法貴乎混一復歸虛無此於佛門中有如空宗若乃立一切法不礙真空破一切法不妨妙有并包廣大唯佛法之性宗焉豫讀魏志見高柔所上疏有句云育精養神專靜為寶頗愛此語因采而書之進道之方亦資外獎檢迹攝念二者相須自謂浮想猶存且非邪惡分別名相未能頓除雖不及學禪精奪趣定之前令萬緣盡閉亦可比奉祭恭肅致齊之日唯祀事得行東漢史論有言佛法云清心釋纍之訓空有兼遣之宗所云空有兼遣蓋謂著有著空二俱為病故兼遣之也夫達道之人於有法中不同凡夫之癡愛於空法中不同小乘之偏局豫嘗較量二病著有之病小而淺著空之病大而深何以故著有多慮或有發慧之因免成斷滅之見著空定性而無適變之智遂失菩提之心故無上依經云佛言若有人執我見如須彌山大我不驚怪若執著空見如一毛髮我不許可豫謂我見猶可柔服空見絶方便之行也古聖經典大意頗同自是後人妄分彼此因看論語一科其有語句聯貫正是佛之智行矣孔子曰默而識之學而不厭誨人不倦何有於我哉豫以為默而識之䪺悟之理也學而不厭漸修之理也誨人不倦自覺覺他自利利他之理也何有於我哉亦如佛之真實語不以飾情而妄謙也憂與喜相參鍊成之福福必久也魔與定相敵鍊成之心心必堅也學道之士當知此理維摩經云是身如芭蕉中無有堅僧肇注云芭蕉之草唯葉無幹豫詳大意止喻人身不堅實也今又別得新意可喻人心亦不堅實往年自作芭蕉詩句云葉外應無葉心中更有心蓋言草木之葉無有長大於芭蕉葉者故言葉外應無葉而又抽心其葉漸展復有葉從中而出故言心中更有心芭蕉葉展重重盡非堅實世人心生念念悉為虛幻豫以身心對比豈不二理俱然世間人中二顛倒者十有七八其一少而當勤以圖身計而反自放逸老而無成故古人有詩云少年經歲月不解早媒身晚歲成無益低眉向世人其一老而當逸以就便安而反自勞役老而彌苦故古人有詩云可憐八九十齒墮雙眸昏朝露貪名利夕陽憂子孫唯此二事知之不難而知者尚少何况深妙之事乎凡夫之心常動而不住如來之心常住而不動如來之心有時而動動以應用未用雖動而本體不動如空中之雲雲動而空不動凡夫之心無時不動動皆過用未用既動而本體亦動如風中之雲雲動而風亦動退省狂言庶幾屢中唐賢梁肅作隋智者修禪道場碑銘其序有云自縉雲至左溪玄珠相付向晦宴息而已豫據周易隨卦象曰君子以嚮晦入宴息其義明萬物皆說豫相隨不勞明鑒故君子象之鄭康成云晦冥也猶人君既夕之後入於宴寢而止息楞伽經云初中後夜當自覺悟修行方便圓覺經云欲求如來淨圓覺心應當正念遠離諸幻先依如來奢摩他行堅持禁戒安處徒衆宴坐靜室豫詳肅之立言假彼文句而已豫今引二經之文以相配合方見向晦宴息之意垢淨念無容起滅善惡事都莫思量內不覺其一身外不知其天地豫詳入道此語最親儒佛二聖之道洞達本源者親矣滯泥末流者踈矣何謂也儒門以禮樂為事禮在檢其迹樂在和其心斯為儒門之本也夫惟升降揖讓之容采章形器之物繁會節奏之音鼓舞蹈厲之狀以為禮樂者斯乃儒門之末者也佛家以定慧為事定以復其性慧以神其用斯為佛門之本也夫惟取三十二相八十種好目之曰佛已踈矣至其虛飾土木濫希福報踈之又踈斯乃佛門末之甚者也吾觀世人擾擾營為不出循環之趣冉冉遷謝皆歸入暗之塗因而作偈歎佛曰起滅心不停生化形無數奇哉大丈夫自在空中住又觀生物無窮知一氣之冥造含靈相續見一真之常存有能深解來起豫者始可與言道已矣觀二儀而為始見一漚之初生指八極以窮邊分一沙而立界此中稱我不亦小哉涅槃經云智者言出息入息之頃我當於中精勤修道中陰經頌云一意一念頃斷垢自不為垢本勝於我墜我於三趣今我勝於垢滅汝入涅槃襄陽龐居士詩云世人重珍寶我貴剎那靜金多亂人心靜見真如性以此參詳吾當隨時少分方便增修斷在不疑矣僧文詡所談云佛所說法不離五法三印若離於此即非佛說五法謂無常一也苦二也空三也無我四也涅槃五也就此五法分為三印無常苦空一印也無我二印也涅槃三印也豫詳其說因而觸類解釋別立三法之名以濟其說三法謂之智力果也夫言無常苦空者破事相也謂世間事非常也是妄也非樂也是苦也非實也是空也若能見此三者豫以為智又言無我者破心相也謂心本無我妄為主宰乃是一真流散未得還源者也若事相破則無我無我則心相破也能破心相豫以為力又言涅槃者事與心外內之相皆破則了無結使罣礙而快樂矣無窮自然之樂謂之涅槃獲此樂者豫以為果其理相符至人信受故謂之印當法不讓於師幸勿責豫管見佛書中有偈云一切業障海皆從妄想生若欲懺悔者端坐念實相豫以自得因而擬之別作一四句偈云一切是非藪皆從外聽成我是厭聞者反聽存靈響既而乘興求已又翻成五言四句詩云收視契無我冥心合太虛消融浮想盡名曰小無餘世間富貴之外別有出世富貴而人多不知且夫人之身中元有無價寶珠若自認得以為己用則所求如意莊嚴具足此即出世之富也又若能了達自在不被無明郎主恩愛魔王之所役使此即出世之貴也此之富貴比夫貪冗利爭虛名自致憂勞悲苦者不亦勝乎顧己晚年味道逾至分別諸法尚多見想游戲三昧未住妙境聊以自娛猶勝別勞心也學法之人直須頴利便學最上乘法夫英雄之士圖王不成猶足為霸馳騁之人逐鹿弗獲尚能得兔學上乘法設使未成必勝人天之福孔子曰豫欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉豫詳此意有似維摩詰默然之義因擬之別作四句語云佛何言哉一乘行焉萬物生焉佛何言哉豫又詳孔子自比於天亦如佛之真實語不同人之飾讓情也學法者得色空如一之心住凡聖平等之境是也若以此法為有有復為病吾得聞中自然之音是樂也又得禪悅自然之味是餌也又得日新自然之智是過客也此三者與老子之說不可同日而言之矣大乘經典中說信解修證之四法理勢當然豫因思更立四法以濟其用謂智志力量是也非智不能知非志不能求非力量不能成力量是二事此舉其大意若更細說又涉繁文世間萬法皆以得中為妙乃至出世之法亦當如是豫觀四禪天此是佛境界而在三界之中色界之內詳究其理夫不及者固不可也過猶不及亦不可也色界既能超六欲之有染又不入四空之不還得其中道乃是佛之行處也莊周之書雅士多讀而其所取不過潤彩毫之華藻資玉柄之清談而已豫則不然別有所得詳其書中所述聞和見曉超老氏之希夷神靜心明契釋宗之定慧與豫同者復何人哉列子所說人之身形性命皆非已有乃是天地委積和氣而生莊子所說大冶鑄金金踊躍曰我且必為鏌鎁大冶必以為不祥之金譬喻造化中偶得為人輒自矜而有我造化必以為不祥之人也因而思之更若計我我所滋蔓無已一切外物逮諸權利皆為已有豈非重疊不祥乎時情物態奔勢競利常理必爾不當訝之譬如祁寒附炎盛暑䕃樾人之所趣其可已乎白樂天有詩云是非都付夢語默不妨禪豫因擬之稍加增易別為七字句云色空辨相何妨道語默由心不礙禪世間之法戒人貪多常宜知足唯有出世之法則獨不然不許得少為足涉於增上慢而自貽懈怠之咎也士所著文千章萬句皆以立理為本佛所說法千章萬句皆以明心為本事有體統可以類知至如才力之變態神化之應物亦各隨其作用矣古人善別味者知黑白之鵝辨淄澠之水奇則奇矣有何所濟豫知道中之淡為無味之味禪中之悅為有味之味較其優劣何如哉古人有以故車輪為樵㸑者或目之曰勞薪豫謂此乃無情之勞為人所用耳夫有情之勞為人所用又甚於此而終歸滅絶則同矣般若心經者心是樞要之義亦如文之樞要者名文心律之樞要者名律心此則般若之樞要是為智心其末言神明等呪者蓋明正法之語以破邪心之惑如彼禁呪之義耳故謂之呪豫之獨斷欲人易曉唐張燕公陳州龍興寺碑文云言語之不到者心識心識之不到者真如豫今觸類窮理更增其句於前別序事云文字之不到者言語因謂心識者真如之影也言語者心識之影也文字者言語之影也去道彌遠斯可知矣故輪扁謂齊威公所讀之書古人之糟粕耳信如是哉所以敏悟之人雖憑文字言語往往別得深旨又不可好奇自是失中過當反成見障也豫又謂意為心影言為心響離真即妄終非本體若得道於言意之表此不同影響之踈也學佛法之人要入無餘入無餘則其漏有盡營世財之人常欲有餘有餘則其貪無極陰物晦微影響眹兆不當疑怪過有推窮夫甚於此者尚不能曉至如日月之出沒雷電之震耀風雨之飄灑草木之榮落究其所以果知之乎是則疑於小而不疑於大怪於少而不怪於多人之形軀亦是幻化若能悟此物物皆如真心湛然外境自謝維摩經中長者子寶積歎佛偈頌云能善分別諸法相於第一義而不動豫詳其意蓋以讚美佛心定慧闕一理事混融成無礙之法界也因擬此別作二句以為自心量力所依之道云善思委順世間法於本真心而不動白氏詩云富貴亦有苦苦在心危憂貧賤亦有樂樂在心自由豫因擬之別作詩云權要亦有苦苦在當憂責間慢亦有樂樂在無縈迫學古入官自知名宦視履考祥自知禍福勿萌貪欲之心誤問姦人瞽者受其承迎誑惑也吾重西方聖人大雄氏所說之理無超於此者形容擬議終莫能及今且以十字稱贊云此法廣大殊勝真正深遠要妙者也儒書但說世間云為之事而節制之內典說人身心之理生滅去來曲盡其妙儒書不能到此慎勿以世間法比類而非之自貽聾瞽其實不可非也古之高賢道充於內者物空於外是以一簞一瓢鼎食任列於他庖一丘一壑天下不易其自樂世人情塵厚重翳之不見其性而况至虛至靜之中至真至妙之理霄壤殊絶何由能知一切法師廣傳佛語以明設教到詳偹處一切禪師直指佛心以明還源到簡妙處是故長者子寶積歎佛頌云能善分別諸法相此一句法師之體也又云於第一義而不動此一句禪師之體也後人當二師之號不亦難乎古之病人身變為虎而食其兄者但聞牛哀而已孰不驚異其事乎今之迷人恃權挾私肉視於人容易殺其非辜自矜奇特以取殊寵者有之矣乘勢睚眦以攄宿憾者有之矣斯則心變為虎也鮮有驚異其事者世情之慣習也如此噫身變不由己心變不由天夫病者識隨形變本無害人之心止可同於過失若怙威枉殺有欲心以取寵有忿心以攄憾於理自斷罪合如何報應影響非無至論圓覺經句我記妙言當知身心皆為幻垢因知大覺豁然性空不執身心有何挂礙老子曰雖有拱𨐧以先駟馬不如坐進此道豫因擬之別作四句語云雖能致位一品營利百倍不如四威儀中常進妙道古德有語云戒生定定生慧有經文云尸羅不清淨三昧不現前此則戒生定之理也又有經文云淨極光通達寂照含虛空此則定生慧之理也寂照含虛空又似經文云心精遍圓含裹十方豫之管見也如此摩訶止觀論云憶三世事不忘名解脫無減又龐居士詩云緣覺若誤空醒見三生事豫以為出纏在纏繫乎真妄之心也夫明靜之性彌深者雖宿生事亦漸能記憶昏亂之情益厚者雖今生之事亦轉多遺忘考其物理固當然乎吾欲澡雪柔挺斷無疑也一宿覺永嘉集中所說枝條念吾願學人無使滋繁李逸人華嚴論中說根本智吾願學人務令深固若能了悟此理是入妙用之門又若能得法出於意表回心遊於物初是登勝進之路一宿覺云初修心人須識五念一故起念二串習念三接續念四別生念五即靜念得此五念停息之時名為一念相應豫以為照見五蘊皆空如服藥去病之始得其一念相應如覺藥勝病之初觀練純深心地安適又如藥力漸勝厥疾頓瘳深於神仙之學者見衆人逆知未來之狀既哂且憫曰滿目紛紛無非行尸走骨深於定慧之學者見衆人亦知未來之狀既哂且憫曰滿目紛紛無不隨心變形夫行尸走骨在世之見也人皆可知隨心變形出世之見也人不能知第十四祖龍樹尊者嘗至南印度為衆說法遂於坐上現自在身如滿月輪大衆唯聞法音不覩師相衆中有長者子名迦那提婆謂其衆曰此是尊者現佛性體相蓋以無相三昧形如滿月佛性之義廓然虛明言訖輪相即隱尊者復居本坐豫因詳究今之像塔頂上以銅為相輪必因取象於此菩提者慧解能覺至明之因也涅槃者空寂成功至樂之果也此二者之名不離煩惱情根本性非同非異混然為一求之者不可捨動取靜避焚就溺道無不在在無所有但志於其妙不擇時不擇所自可洞曉馴致譬如頑礦出真金淤泥生嘉蓮必然之理更勿疑也况佛經多說凡諸清淨國土人皆放逸不能修行不及五濁世中却有勇猛精進出世之力倍勝於彼故古語謂南閻浮提為選佛場信不虛矣真學勉陶淵明讀書不求甚解白樂天亦有詩云書不求甚解琴聊以自娛豫則不然嘗思圭峰密禪師有語句云觀空直遣空於色解義須教解入神豫每讀書詳味文理觸類而長唯變所適往往別得新意人患解少豫患解多亦常以此為勞然而亦勝別勞心矣吾觀大雄氏之智力虛明廣大如太清視一切妄想如游雲游雲其能蔽太清乎解脫自在如象王視一切妄緣如游絲游絲其能繫象王乎妄相不能蔽妄緣不能繫智力如此所以謂之大雄氏懵然不知者乍聞斯言宜乎大笑之也自始覺證本覺都名菩提得菩提者須有大智識失菩提者良由癡迷蔽翳局束滯泥也自初安樂至寂滅樂都名涅槃得涅槃者須有大志力失涅槃者良由因循放蕩鹵莽滅裂也若能學二心法去二心病此人無敵於天下也論者曰至人體道自然心無主宰豫謂此言雖嘉其理未盡豫別有二說其一謂世間之法其或人之多僻浸以成俗雖欲忿嫉規正必不能敵自禍無益何如卷懷此可心無主宰矣若見其效尤徼利風行草靡或爭先迎合有靦胡顏而我弗往朋從此則心有主宰矣其一謂出世之法一切妄緣不可不忘此宜心無主宰矣一乘真理不可暫忘此宜心有主宰矣智者詳之可也豫於老莊之旨自得新之又新之理所云視之不見聽之不聞謂凡夫也至人則不然視於冥見夷中之有曉聽於寂寂聞希中之有和見可見非常見聞可聞非常聞天地不可同其曉天地不可同其和此以至寂而成至妙耳苟非其人安可與之交談哉佛也者離相窮理反情合性之總名也夫人迷一切事本從自心悟一切事亦從自心起一切事本由自心止一切事亦由自心佛心則悟而不迷止而不起了達深遠淨明純熟胸中大空不礙諸有萬行盡善神化無極其法如此何關外求廬山歸宗寺慧誠禪師有答僧問之語云祖師西來秪道見性成佛其餘所說不及此說豫因默而識之推而廣之竊以為世人縱情背性未始覺悟故曰凡夫也智人明了至理識心達本知其佛是覺義見性見覺覺了真性便是佛也故曰見性成佛如師之言固當不煩別說也諦觀浮世凡諸人倫迷失一真如遂成三差別何以明之唐相裴休所著之文明菩提心體云十方諸佛一切衆生與我此心三無差別豫謂從無出有自然含識始有差別之形一也踵事增飾因而辨等次有差別之名二也乘勢肆意極于私己又有差別之情三也轉喪鴻蒙漸分罔兩如此三者滔滔皆是必使和會三差別同歸一真如不亦難乎哉或於萬萬之中有一不以為難者不亦異乎哉習定之光聞和之音自然而然天之義也豫自謂神遊於光音天束教之士無庸致詰圓覺經威德章中有注云一切衆生壽命但為浮想任持豫因擬之別作十二字語云一切世間名數皆是妄情交立如來有出世智照了窮盡至聖悉備故推其法為大明咒如來有出世力奮迅超絶自在無礙故推其名為大雄氏世智測度未可輕議寶積經云知苦斷集證滅修道余詳此四諦之法並依次敘粗得指歸苦集二諦不必更說既云證滅復云修道余謂此是自體起用覺利及他亦如既云解脫又有解脫知見是也諦思一真法界無始終無邊際自然神妙不知其所以然孰得指名而形容哉古今智人雖能窮理盡性立語言文字擬議而目之曰法亦為外事唯有忘情吻合者是矣此一真散而為萬靈萬靈中秀出者目之曰人人中秀出者目之曰賢賢中秀出者目之曰聖聖賢之於一真太虛之電光也聖人之秀出者智力臻極而能歸合一真之源目之曰道天竺之語又名佛陀豫在洛中避暑燕居有風泠然而至因私語曰意隨無事適風愛自然清又間看史傳難得文行具美者又私語曰豫欲一見具美才賢西漢之文格東魯之儒行正自不可得也學法者舉要言之但學道家宗旨清虛淡泊佛家宗旨微妙寂靜如此足矣其清虛淡泊出前漢書敘傳第七十說莊子之事其微妙寂靜出楞伽阿跋多羅寶經及大般若經中是也佛書立法本乎性儒書立法本乎情道書立法該涉二書該涉佛書不盡復性之理該涉儒書不耴飾情之容吾之所貴者三焉身貴安而輕氣貴和而清心貴靈而明三者備矣莫之與京何羡重重規冗利久久計虛名教文中說大乘菩薩亦有出世貪瞋謂不以得少為足而乃直趣最上乘位有此貪也又訶責小乘之人智力狹劣不能如己超邁不羣有此瞋也豫亦有在世貪瞋夫身緣之事欲得壽考且寧子孫逢吉有此貪也世緣之事又欲得除惡務本去邪勿疑有此瞋也豫知菩提者梵語也原其理具正遍知非世間覺知之知也涅槃者亦梵語也原其理得寂滅樂非世間悅樂之樂也色即是空非無色之空原其至理恐人執色為礙空即是色非有色之色原其至理恐人執空為礙色空雙泯心境一如無纖塵可拂方是曠然了達自念已臨大耋之年尚愛知新之學涉獵書記雍容藝文吟詠情性諧和律呂時或有作未能頓除蓋宿習之使然也老子曰名與身孰親我知之矣我當既明且哲深根固蒂以保其身不取虛名也因復擬之別立五字句者二其一曰情與性孰親我亦知之我當懲忿窒欲割慈忍愛以遣其情自全真性也又一曰事與道孰親我亦知之我當息緣反照背塵合覺無營於事獨歸妙道也智之適變觸類如此覽之者以為何如哉莊子云舊國舊都望之暢然注云得舊猶暢然况得性乎釋文云暢然喜悅貌豫嘗涉歷人事因知經旨信然往歲使于龍荒回及彊場遠望雄州喬樹目明心喜故行程詩中有橋過涿水心先喜路入雄州眼更明之句並經進御蒙降手詔優答焉是知望鄉歸國猶得暢然喜悅而况還源復性合如何哉後秦符堅時有僧曰鳩摩羅什與佛陀耶舍接座交談堅問何謂第一義二師相顧而不答意明不可以言宣也豫謂然則然矣若且隨時而答云元不動者是第一義元不二者是第一義堅有道眼自可默而識之若無道眼必當隨答更問如是問答則無有窮盡譬如年長喪明問物之狀說其形象彼必知之若有初生即盲未嘗識物問物答狀其問何窮吾常謂開示悟入雖假於道師觀練薰修不由於朋執自宜為道日見善則遷奉以周旋不敢失墜是也豫壯歲之前聞道流所說云學道之人目有神光耳有靈響豫始志於道自耆年之後乃思勤而行之而於澄神定靈有之矣未得精至將及從心之年而夜視或時熠熠有光又聞靈響未嘗暫歇歲久益清緊意其神靈澄定而光響彰聞理必當然難加異議吾嘗究觀世人心念日夜所到境界大率不離於幻中分別幻夢中分別夢影外認微陰聲外尋餘響如此而已若要箇回心來知有深深處妙妙處空空處靈靈處但恐萬中無一設使萬一有知者若要箇必能觀照萬境起於一真而妄有又能止息萬念歸於一如而大同但恐萬中無一凡一百十六章覆校官博士臣劉光第校對官中書臣范來宗謄録監生臣龔果詳校官監察御史臣王爾烈檢討臣何思鈞覆勘
