body:
  text: 宋朝逈撰論語云子絶四毋意毋必毋固毋我豫詳義理謂孔子絶去四事與常人異也毋意者常人師心徇惑自任己意孔子以道為度故不任意毋必者常人行藏不能隨時用舍好自專必孔子用之則行舍之則藏故無專必毋固者常人之情可者與之不可者拒之好堅固其所行也孔子則無可無不可故無固行毋我者我謂身也多制作自異以擅其身孔子則述古而不自作處羣萃而不自異和光同塵唯道是從故不有其身豫於四者似得百分之一每希馴致其道未嘗縱心所欲此近無意昔仕宦之日不苟求進用此近無必友交泛交不偏執一此近無固好為文立理而無所自衒此近無我因思儒宗孔聖四絶之德比夫釋氏經教有陳大乘四法大乘四行同歸善利抑亦何殊哉豫今又以四絶之德各以其類分而合之其一其四無意無我混而為一以屬於內其二其三無必無固混而為一以屬於外內習出世之法事事無意無我外順世間之法事事無必無固若能觸類融攝果決盡然此為樞會可目之曰無礙法門矣白樂天有詩云慙將理自奪不是情人竊思理奪二字正是豫切用之法夫御世之道求理而已出世之道理可廢乎以理奪情率由智勝以理復性率由力勝若能智力兼備理性相符真學指歸曲𥁞善矣達摩説大乘四行其三曰無所求行豫甚慕之奈何迫於情纍未能免此雖求之在我而可否在彼既或應或違須無固無必因別持一行勿以順逆自起欣恚自為所求無固必行梁氏刪定止觀第一內有説云意之所起即修三昧謂之覺意三昧行者心數起時反照不見動轉根原故名覺意又窮諸法本皆由意造故以意為言端未對境覺知異乎木石名為心次心籌量名為意照了分別名為識如是辨別墮心想見倒中豫讀此一科愛之重之尤喜精要因而崇重其名立為一法以備自修目曰覺智平意識法門凡有意識所起即時以覺智平之而自斷曰教中説身心於真性皆為幻垢則表意識諸念又屬身心之餘事乃是重重疏遠之妄顛倒之見不知此理則無智者也既知此理豈可與無智之人混同汩沒當觀意識是真我之賊來即殺之不復容縱在我明鑑利刃而已昔向子平讀易至益二卦因而發歎謝絶塵寰又老子有日日益之言豫漸老矣夙好棲真禪寂而鈍根重障既不能速成圎頓之理若不策勵精修勝進更俟何時乃約己而自立益二法門用為入道樞要但省己不當復為者一一而日之憂恚二病居先也省己即今切用者一一而日益之明住二妙居先也自出於心固難縷述楞嚴經中所説如來命文殊師利法王子較量二十五無學諸大菩薩及阿羅漢各陳從初入道法門何者最為圎通令將來學者易得成就時文殊辨白最許觀音聞中入流圎照三昧其對佛偈中有六句云我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入豫愛重此法形於贊詠多矣又獨聞靈響殊常清妙凝聽融怡乃是天賜神奇吉祥助發樂欲俾成大事因緣也何慶如之自今了達天時人事世態物情往古以來不可齊一但委順而過勿介於懷凡諸魔境我當以觀空覺妄之智平定於外唯此佛境我當以聞和攝念之力修詣於內決定不退轉不復別求入道法門也豫嘗作心禱六符詩云恬和端潔及虛明六妙均融道法成願考此祥皆密契不求知己浪傳名今復追解其意意欲己心恬靜和暢端真潔清虛白明了妙妙相應若得心之體用如此畢備不必廣求禪學之法亦不求衆人知己也白氏詩云自從苦學空門法消𥁞平生種種心豫因此語曉悟學空之理乃是無礙法門何以故夫學人有明智有果斷諦觀在外隨時過去者事事盡空不執其事則身無礙也在內隨時過去者念念盡空不執其念則身無礙也身心外內無礙無縛更去何處別求解脫譬如雲翔之鳥在空中自然自在人若不能以空破有自取罣閡乃是凡愚知見於己有何所利所以佛許須菩提解空第一斯人足可景慕若能於空不著空此又妙之又妙也衡山石頭希遷大師有僧問如何是解脫師曰誰縛汝又問如何是淨土師曰誰垢汝又問如何是涅槃師曰誰將生死與汝豫知禪家問答有茲體勢最為切當豫能觸類適變則而象之設使有人問豫如何得心地清涼當答曰誰令汝熱惱又問如何得心地安靜豫答曰誰令汝煩動豫非但能學其語類又能悟其法意直臻要妙之處蓋明一切煩惱起滅只由於己己能照了諸法性空不以為礙便是菩提涅槃之體用豈待如來慧以三昧必無此理智者當如是解勿與愚人混同也𮨇此法至簡至易其如知之者至少行之者至難矣今自清審決擇居常進道之功莫若齋心服形收視反聽退藏於密直在其中住無所住得無所得堅久之志日復一日其餘法塵煩動亦宜稍稍休息矣國家法要則有任賢勿二去邪勿疑豫因擬之而立言曰身心法要則有任真勿二去邪勿疑二者大同唯改一字而已學法之人或未能深入妙境但且師老子之日莊子之鞭後蘧子之知非顏子之改過若能致力悉備自然暗合于道子今申明圓覺楞嚴二經之旨趣夫圓覺經一味精純要妙專説心起之真妄悟修之頓漸以利鈍根故分辨學法之次第楞嚴經於真心正法之外又説種種事相有邪有魔有升有墮令人曉會不至差殊梁氏刪定止觀第五內有語云若善修三昧道力所持何罪不滅何業不轉豫於此法素有信心樂欲每覽如是語句令人倍加策發即此第五卷內又有語云夫慧解真正則不為諸相所惑然後鞭心入理業不能礙若本無解心又發意邪僻見相生愛則魔得其便入示吉凶生為鬼禪死墮鬼界必然之理也豫知有一類之人多作此見是思引證為戒因復采而書之又有語云當安忍內外諸障使不滯礙又不起法愛自然流入清淨之地得無上報得自在業返本還源智照圓極故名無上普門示現無往不應故名自在豫愛斯言蔚為妙法若能詳求其理力行其道此可足用何勞博訪空談又第六內有語云夫幻術法猶能變轉示人亦如流金結氷變化不一定力所轉理固宜然豫因思入道至論必須致力但無為與有為異耳天時之順序天文之垂象本乎天也據理則有常而或有不常人身之安否人事之得失本乎人也據理則有常而或有不常是則常中有不常古今如此亦可以為大常矣豫嘗為安處大常略論今復意及而書之姑務修己此意乃自然而然也豫嘗自作禪門法語四言五句二十字云正修行心以破為修以住為行非正修行其心反是周易正義序云江南義疏十有餘家皆辭尚虛玄若論住內住外之空就能就所之説斯乃義涉於釋氏非為教於孔門也又後漢書西域傳論佛教云詳其清心釋纍之訓空有兼遣之宗道書之流也此皆儒書正經之疏正史之語該説所及證據公矣但以內外之法理難相參故各行其教焉後人更相排斥未為通論人有所作之夢洎至明日或有忽然聞見與所夢相應者世俗謂之解夢吾因此似得二理一則表事有所定一則表神有所通必若澄心至清則能知未來之事其理不虛也吾有一事終未曉其由嘗與人對談或至一處所忽然記憶有似己曾如此言己曾如此見倐然復忘之耳自壯歲及老年相識故舊歷遇五經及第人于徹直集賢院范貽孫知制誥路振此三人亦説其事與吾暗合因追思而記之孔子罕言命與仁易稱窮理盡性以至於命竊詳命者正是佛書所説理性之法也人鮮能及之又仁為五德之首正是佛書所説能仁之事此亦人鮮能及故皆罕言非全不言也又對門人云未知生焉知死未能事人焉能事鬼蓋為力行世教不欲言人所不及之理非不知也達識之士宜體至聖密意今為已立法者二夫處世之法如謝鯤之率性也推理安常而已出世之法如阿難之回心也息緣反照而已楞嚴經云空生大覺中如海一漚發圓覺經云無邊虛空覺所顯發豫今引此二經配而明之蓋言見空見色皆不離覺性之中也又色空二法相對立名空相在覺性之中亦為障礙故般若心經云空即是色蓋言但有空相空即色也色即為其障礙矣豫嘗獨斷以其無為而大者謂之道有為而小者謂之術道之神妙無為而自然也術之神妙有為而精至也學其道者可名道士學其術者可名術士道德技術不可同日而言古人有云寧我負人無人負我此乃姦雄之魁圖取之志大也豫別有語正與此背却云寧人負我無我負人此勸仁智之士趣受之理大也又云寧天負我無我負天此則但信福善禍淫之格言勿疑其應與未應也昔子夏唯學素王之道而義與利交戰於胸中終義勝而肥所學之道必成也今豫兼學法王之道而信與疑交戰於胸中終信勝而喜所學之道豈有不成哉沖虛至德真經云孔子能廢心而用形注中所解之意謂對接世務止用形迹而已其心則泊然不動也豫謂臨世間之法固當如此如此則事濟而不勞矣又貫休寄山中伉禪師詩云舉世遭心使吾師獨使心萬緣冥目盡一句不言深其詩意謂舉世之人被心所役使而伉師獨能制服其心也豫又謂學出世之法亦宜如此如此則道成而不誤矣了三空之盡空知一真之至真此大觀也即時而萬念都息此大止也若能練之純熟道學成矣何必更尚多談妄求異見哉人所分別者名相也不可分別者體性也若能不著名相而直歸體性者何諍論之有經教中説一種外道作無所有想如兔無角謂一切法亦復如是經教中又有説未得謂得名增上慢豫觀今之談禪者多云知之則已更何修也故鄙其看經論求方便者以為滯於名相豫謂執此見者可惜誤人深矣譬如以兵力討賊兵力勝而賊退然後罷兵理之常也故法要有云如人入賊心不決定不能破賊破亂想軍亦復如是修行致力其喻如此吾輩看經論詳求旨趣以濟覺力又不得與課數希洪福尋文起狂慧者一槩視之也豫今集諸經妙言貫而為文共成四句曰求自然智住無礙行成不壞業名決定相古語云臨淵羡魚不如退而結網豫以為尋文好禪不如坐而進道止觀論有云帖帖安穩楞伽經有云上上升進此二者皆謂入道之相也道家流謂黃庭內境敻超外境豫以為尚屬有法未出幻魔之界豈知夫自覺聖智空寂靈明絶妙之境乎若有悟四相之非我知一真之大同始可與言此境矣榮啓期自云有三樂豫觀乎域中象外別有三樂焉聲色之樂樂之下者也名教之樂樂之中者也禪寂之樂樂之上者也豫但得宴坐之室靜日涉之園幽分恬智以均和合端虛而進道養太和之氣棲天真之心適我願兮無出於此常安了了之心常合深深之息諸念不動靜勝而樂斯入道之妙門也莊子內篇齊物論注云夫是非者生於好辨而休乎天均豫詳大意人好橫議分別道家所忌當息其言奈何所見各異稟於自然固難一揆責之也因思辨是與非唯有涖官為政分曲直之訟事國治家成規誨之道如此則明是非可矣若或真學之流間談之際未能頓絶商確評品斯亦有妨道行者也左氏春秋云人心如面焉蓋言各各不同不可齊一爾若也須責人心之非令皆歸於是斯則何異須責人貌之陋令皆同於美乎自今力戒此事為吾日損之一夫學道之人若能無事靜居清心調息雖云宴坐贏得養生故圓覺經注中説道場修證之法有云遇善境界得心輕安謂身心調暢輕利安和神爽氣清支體柔潤豫以為有此愛樹但令本根深固則枝葉自然茂盛也豫吏隱洛中之留臺忽踰六稔詳周易之樂天知命暨莊子之安時處順省躬契理庶乎得其少分焉而燕居之際與令順子孫之隨侍者往往談道適意甚歡於世論則為福猶愛善慶有餘之故也於迦談則為纍未到涅槃無餘之故也權公之文有云精修密詣蓋明修詣之功也白公之文有云陰利潛益蓋明利益之德也教門功德其在茲乎士有學素王之行行有枝葉學空王之心心無罣閡若令冠以道號方可目為真君豫今指陳佛書之簡要者有二經焉般若心經圎覺了義經是也般若心經凡三百餘言佛為舍利子説人空法空破一切相遣虛妄之情盡更有何事豫謂以正智為目見之而悟其理定其志而趣於道此乃妙法之心也圎覺了義經凡二十八紙佛為文殊菩薩等各説入道之門與圎成之性合更有何事豫謂以淨行為足行之而還其原臻其極而成於道此乃妙本之體也若人於此經中自足相資始終如一信解修證光嚴住持其人殊勝超絶不可稱量也方內之教原情而立法方外之教原性而立法二教淺深有異內外兼濟若能和會而公共不以勝負而交爭然後臻乎大通也子好涉獵內典研覃了義自謂種諸善根雖有之矣逮得己利則未能然夫妙道非形器言意所能區別其有教門逐末矛盾交爭者不出名利之場也試思未有書契之時孰分主宰而求勝乎教文中有言云靈靈不昧了了常知此乃妙性之本體也又有言云怗怗安隱躡躡而入此乃進道之法門也若更習性未已而好多聞覽此亦於道無所損於智有所益也豫今年近八旬矣保身自覺安而輕澄心自覺虛而明養氣自覺和而清得法自覺真而精豫有四覺覺如此不問道之成不成今之講師率多傳文之狂慧今之禪師率多傳口之空言唯有該明之士洞曉其理更不疑也釋梵之書謂人屬地水火風終非堅久故破之耳本為破虛幻之身而歸於實相也老莊之書謂人稱聖智仁義終非純一亦破之耳本為破小善之名而歸於大道也方內之士多駭其言以為破毀身名蓋局見一隅不能會通至理矣道經云恍兮惚其中有物𥥆兮𡨋其中有精其精甚真其中有信此則約信相之源而罔測周易云精氣為物遊魂為變是故知鬼神之情狀此則言生滅之法而未盡唯內典有一真靈妙三世流轉之説理最詳悉夫鴻明之士得意忘言然後可以心到先賢有清畏人知者謂潔己而不求名也吾則妙畏人知欲進道而亦不求名也先師孔子晚而好易讀之韋編三絶夫易者窮理𥁞性之書也豫亦晚而好讀上乘內典因而發為演勸筆不停綴良由見其旨趣極陳理性之法曲盡其妙雖設教不同而會歸於善是則區區力學不背先師之道明矣教識洞鑒當以為然古德有云前念迷是凡後念覺是聖豫因思之或有人念念不迷乃是以覺濟覺以聖繼聖者也若能守此常覺之念深固長久日新無極者此可為入道之人也豫於理性漸得會同之意謂出世定慧之均用如世間禮樂之相須夫禮勝則離故和之以樂樂勝則流故節之以禮豫以為定之過恐成於沉住故照之以慧慧之過恐成於動亂故制之以定禮樂相須然後盡美矣定慧均用然後盡善矣擬議二法出於陋衷內省吾心動不忘於觀照靜不忘於止息今自覺動多而靜少觀多而止少然不陷於邪觀惡慧昏住癡禪者也教文中有言云薄伽常在定無有不定時亦既內省居常以觀照在念因自謂豫心常在慧無有不慧時若於己分言之慧者燭理之謂也定者忘情之謂也覺其燭理易而忘情難耳夫枉道則心苦直道則身危守直道者所以甘於恬退而不爭趣捷之徑也自顧既老猶健視日影一分分一寸寸轉移不回則所發道心亦宜一念念一息息常在止觀二法方是正勤之功耳此事常已書之矣而復書之者惜日之志深也豫素尚禪觀日惜暮年天禧中乃固辭近職求退居散地遂得分臺於洛都輿論以為勇退人之難事而豫獨恬然以為甚易既而聞有吳中僧蘊賢者年始三十餘幽棲嵩頂之石室不交聲利幾乎絶食屏迹宴息已越數稔如此孤潔未之有也豫是以精進之志彌堅焉豈非天資其助歟因自喜曰起豫者賢也始可與言禪已矣凡分彼我皆是妄心妙一真心元無彼我浮生可見如夢幻泡影雖有象而終無妙本難窮謂真信靈明雖無象而常有古賢著書垂法心存利澤而後人務求言意之齟齬橫生駁議似是而非者余目之曰文訟吾著文立意欲如國寶莊嚴為妙器求法練心欲如國工鍛鍊成真金此比別欲不亦優乎諦觀常情於彼虛名冗利有取無捨是以粗暴之勇明入死地而不顧姦偽之智暗踐畏途而不慮必謂至理無有勝於此乎洪覆之內無數之人人人所覩各有一天地世界互不相妨苦其法性歸真又不同分假之身自然混融攝入何有彼我哉夫萬物有象皆於大道無象中生此則無為無不為之理故聖人之道貴混然無迹凡有迹者雖美善名著亦未合於大道也吾日三省吾心自知性之串習尚有悠哉之浮想事之違忤尚有憋然之小忿愛法成縛未免披文染翰之動作若能𥁞去此纍吾亦庶幾於道而獲逍遙也豫於佛法中精勤詳練浸久浸深研覃會同往往有得因知人有兩種悟豫謂小者智通大者神通且如古顏回之改過蘧瑗之知非及諸臨事見機觀書達理之類此小悟者易到蓋由智之通也又有龐居士詩云羅漢若悟空擲鉢騰空闕緣覺若悟空醒見三生事止觀論云憶三世事不忘名解脫無減自然覺悟不同二乘名解脫知見無減豫謂此自得聖力而然耳維摩經中説富樓那為新學比丘説小乘法時維摩詰謂富樓那言此比丘久發大乘心中忘此意如何以小法而教導之時維摩詰即入三昧令此諸比丘自識宿命曾於五百佛所殖衆德本即時豁然還得本心豫謂此假彼聖力而然耳此大悟者難到蓋由神之通也圭峰密禪師亦有言云迷時煩惱悟時神變此悟亦是神通之悟也豫又思此大悟者已涉佛境六通之數其宿命通具如上説其漏盡通豫因設喻以為漏盡通如月之除雲雲漸除而光漸出雲盡除而明盡現又如鑑之除垢垢漸除而明漸現垢盡除而明盡現亦如始覺小而有所覺有所不覺本覺大而無所覺無所不覺豫剖析雖繁貴其理之曲盡矣維摩經云舉足下足皆從道場來豫因自思晝心夜心常遊法苑去學道之人不能少思寡欲澄神定靈雖未得應圓覺之妙心亦可入楞嚴之外分矣豫詳華嚴經大意明法性圓通無所不至如教中説須彌納芥子芥子納須彌之義蓋言大無不包細無不入者也嘗試論之譬如含識之靈流轉受生先為鯤鵬非隨其形而增大後為蟭螟非隨其形而減小本性元一不變易而分洪纖也所以華嚴之義有云一微塵中包含法界以明一真之性本無分假區限矣莊子云能體純素謂之真人嘗試論之斯乃人中之人也教文中有以竺乾古先生為仙中仙天中天也蓋以仙人天人已在世人之上而古先生又於其中角立傑出尤為殊勝者也覆載之內中古之氓紛擾無算形與名則然矣以道以實求相應者則不可知不可見也夫人以幻化之身又常為虛偽之行是則表裏非真重疊名而已深思其理豈不內愧達識公論當以為然居常自誨撥去外事外物不用計著務置身心於安穩之所其有浩浩茫茫不能前知者無必然之理不當虛勞過慮耳莫若歸乎大委順誦無可奈何之歌而已矣了了見一真之體如掌珠圓明悠悠覺萬有之空似天雲變滅談賔有云辨不如訥語不如默動不如靜忙不如間豫愛之重之因作五言二句云不言成吉慶無事是神仙繫心一緣文殊之妙德入流亡所觀音之法門合此天機為吾日用能長且久得意忘言而况獨聞和焉又𥁞善也名決定相其在茲乎一切凡夫皆是迷人內有回心起信詢求妙理者此是迷中悟人也其中却有細分名義或空務對答流宕而不返者此又是悟中迷人也若有悟而不迷此是通人可以學道吾嘗獨斷名義夫非過非不及謂之中也事是理當謂之正也此二字循名責實難矣哉夜犬虛警不辨姦良而吠有之矣衆犬傳吠愈遠愈踈夫昧道束教響和流謗亦類此也智人有求有樂有憂道人無求無樂無憂寶積經云常行清澄微妙之法豫因經意自立其法據圓覺經有注云心息相依息調心靜竊詳心淨即清澄之類也息調即微妙之類也今以綿綿之息合深深之心心淨息調日益純熟此則清澄微妙之法乃禪那之本體也人之常情所慣習者當云習性而又云習氣者何也豫據莊子釋文有注云許慎云人心以上氣所往來豫謂心常御氣而動故心順而喜則氣和平心逆而怒則氣結滯必然之理也性與氣同體故亦云習氣多殺以恣充口腹者神仙之人目之為啄腐吞腥善以過求富貴者高尚之士比之以吮癰舐痔視其美惡何如哉豫於觀慧大略已知物本無物當復道之混茫空中不空當入佛之知見莊子雜篇原憲之解病孔子之辨窮通與凡情不同故聖賢適天均而不憂也吾輩靜而省己稟賦之性望聖賢絶遠幸而有祿不至於樺冠縱履藜羹不糝資用之屬反優豐於古德足外有餘復何憂乎純動者躁人也純靜者道人也動靜相濟者吉人也夫人在仕宦之途固難純靜即須動中息之以靜故白氏有動靜交相養賦莊子有恬智交相養言論語云文質彬彬然後君子豫擬之而成句云動靜均均然後吉人人多盛車服外修潔身之容鮮克尚道義內修潔心之行其倒置也率皆如此老子曰君子終日行不離輜重豫以為不離輜重則資用無闕也豫亦終日居不離靜室不離靜室則虛極可致也每念爰從引退但覺恬愈位高金多畏官途之叵測息調心淨宗禪學以彌深人不我知茲唯自得蠶之有𮈔𮈔染成色色之明暗由工之力人之有思思作成德德之吉凶由己之識噫歷觀羣迷趣向背一真無有之鄉營四海他人之事智者獨斷豈無親踈豫自思之日日深窮天理廣立文意終是分別名相營為事迹不如靜坐息心也若欲貫人天而膺福報必在乎陰德密行清心素節圓滿具足而已矣若欲超色空而入佛境必在乎大止妙觀淨定真慧圓滿具足而已矣悠悠之説何假多云豫有四句雅言中含八字深旨上智默而自識中智説之乃知其言曰欲得保身道訣莫若間靜介潔要知出世禪功無如照收凝融事不師古匪豫攸聞心間道尊仰高風於疏傅名遂身退遵格訓於老𣆀非云自矜是足為樂常患禪宗所説名相階差頗多繁細卒難湊泊一日忽自悟焉此是漸門權教譬如病有多方故藥有多種罪有多名故律有多條若無病無罪何用藥律夫大禮無體因思大道無為大法無説何必須在分別名相企及階差乎但自守一而已一之之義亦不能更煩解説唯空無二當自契焉寶積經云求自然智破無明殼吾其庶幾趨捷徑者誤涉穢地足之所汙心無再往素所更事心之所惡不當追思亦復如是佛書説生老病死人所共有夫生死二者今不復言嘗思富貴多欲之人乃至清淨不惑之士於此四數之中頗見各闕其一富貴多欲之人頗見有病而無老清淨不惑之士頗見有老而無病較其得失何如哉豫好和會經旨發明義趣竊以為佛書所云正受者有類毛詩云思無邪左氏春秋云弗納於邪也又以為物我如如定之體也吉祥止止慧之兆也若執柱則同面墻般若心經所説觀自在深般若見五蘊皆空華嚴經所説菩提心如快箭破一切苦的學法者若能如是解孺子可教矣麟之獨角則居瑞之首人之獨覺則居士之上獨覺表自然之智獨學失外獎之益獨之名理有所不同孔子曰如有周公之才之美使驕且吝其餘不足觀也己意才美如周公猶不可驕吝而况不及者乎故孫叔敖位益高而禮益恭祿愈厚而施愈博所以三相楚而無罪者不驕吝也覺之一字豫有三説隨其淺深而分也一者覺觸之覺謂一切含靈凡有自身之所觸無不知也二者覺悟之覺謂一切明哲凡有事之所悟無不辨也三者覺照之覺謂一切大聖凡有性之所至無不通也前二覺名曰俗覺一凡一智後一覺名曰真覺入神之見亦名正覺大覺圓覺謂十方三世之中無數之物無不見之也無數之事無不知之也豫嘗窮理盡性自問真性之理根本如何自答曰無邊法界真空性又問即今之心如何又自答曰有限凡軀妄想心世間法出世間法皆以酌中為妙且夫禪門之理大約心要不勞用意除滅妄想但覺塵念所起勿復恣其相續而已亦如敵人侵疆不可窮追盡殺但禦扞之勿縱其深入吾地而已事上亦然上之所欲不可斥言干忤必不能止也徒以自觸禍機但不將迎求媚而已儒家言百行道家言三千功行佛家言萬行大約舉其衆多之數今詳楞嚴經所説乾慧地十信十住十行十回向四加行十地等妙二覺共五十七心足矣或問豫佛之功行如何豫對曰能除百千萬劫障䪺超五十七階心白氏有詩句云夢中説夢兩重虛今略就改別作上句云影外影為三等妄夢中夢是兩重虛白氏又有詩云紫綬朱青布衫顏色不同而已矣豫又擬之別作兩句云三台八座九品官名目不同而已矣學道之人深入妙境仍不得起見解之礙譬如燈以照暗燈且不言其功湯以消氷湯亦不見其迹此喻親切者也圓覺經注中述禪那處言心息之相依南華經注中述心齋處言氣性之自得妙理同也莊子注云凡非真性皆塵垢也豫因觸類而言之曰凡非實相皆夢幻也儒書論語云君子無所爭又云君子矜而不爭禮記儒行篇云道塗不爭險易之利冬夏不爭陰陽之和道書老子云上善若水水善利萬物而不爭又云夫唯不爭故無尤又云以其不爭故天下莫能與之爭又云善勝敵者不爭又云天之道不爭而善勝又云聖人之道為而不爭大矣哉古先聖哲垂不爭之訓丁寧周至也如此豫今更引佛書和會發明據金剛經須菩提言佛説我得無諍三昧人中最為第一僧肇注云須菩提得六萬三昧無諍最勝善防衆生心不與違諍也豫以為須菩提解空第一既能洞曉萬緣虛妄自然不肯爭空其心大定故名無諍三昧竊詳三教之書大略同矣夫學法之人若能遵儒道書中不爭之言合佛書中無諍之行此一法首出於萬法也豫於此法亦似得萬分之一爾證道歌云心是根法是塵則知愛法之心亦是塵也又有修行方便名為樂欲欲即愛也若非愛欲妙道豈肯歸心乎由有諸法助發愛性是故能令慧觀相續俟其勝進純熟拂去愛塵可矣智之通局繫乎人焉學道之人但且用五勝之法亦可為資助之品矣此豫自立名數謂令五者之力皆勝耳清勝於濁靜勝於動忘勝於思默勝於語性勝於情五勝習熟乃入道之漸門也人倫生化大幻也世事新陳大夢也寒暑往來大瘧也中外歷職大采選也官曹決事大雜戲也作是觀者名為大觀古人以義而死猶謂之得死所而况以道而退以吏而隱辭劇就間棲真養素適願自樂何以加焉亦可謂得其所矣豫嘗作四禪體要偈因再思之大約物理成壞勢數至四而極夫心念則生住異滅身相則生老病死器界則成住壞空此世間必壞之理勢數至四而極者也亦如四時之次焉禪定之功是出世間必成之理勢數至四而極亦復如是修行之人但準四禪而行斯可矣况華嚴論亦言四禪為佛境界不然者何以不言五禪六禪乎究觀其妙得二無礙法須菩提無諍三昧推為最勝外無礙也維摩詰不二法門貴乎深入內無礙也內外無礙可至於道因而又得三無之名次第愈勝謂無諍三昧無生法忍無上菩提是也有故舊之交以豫老退貧居憂其不足而問念者豫對以不然夫資用有闕或可以求而致之也形質有闕必不可求而致之也不可求致者豫一無所闕可以求致者亦不甚闕其天幸也如此又何憂不足之有夫鳥雀啄食疾視而遽起畏擊捕之患鴻雁銜蘆而飛以避矰繳耳人有禁行險多取致禍者雀雁之不若也飲食味美太多則傷權利過求亦復如是習乎定則當澄念不動如道經之云徐清是也生乎慧則當燭理無盡如易卦之云久照是也苟能如此其道成矣在分假形軀盡生分別到虛無靈妙熟可思量彼我之情夫復何有白樂天詩云識行妄分別智隱迷是非若轉識為智菩提其庶幾豫詳識之與智同體而異用耳識是智之迷者也常尋妄境而生愛智是識之悟者也獨辨真理而有歸詳究禪宗之法有想妄作入於邪見也無想癡定落於頑空也若以虛融之體含微妙之用乃合中道耳論精深之理直須到此其或意幽語峻習為宗風者不必根究反致迷悶其間柱之瑟濫吹之竽抑亦甚衆焉教文中有言云佛境界如又云魔境界如豫因思之此以陰為魔耳正覺之念即佛境界也邪見之念即魔境界也固當同體但由人心正邪而已知其要者莫若破五陰之區宇復一真之本源則混并其二境矣淳而不敏則失入於愚敏而不淳則失入於猾愚猾畢備其何以堪淳而復敏既靜且明靜明者定慧之異名寂照之根性也禪兼照了非守默之癡禪慧復澄凝非尋文之狂慧凡一百二十八章
