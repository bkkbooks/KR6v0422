body:
  text: 宋朝逈撰一念照了一念之菩提也一念宴息一念之涅槃也三心日夕趣向依止欲念念常然故或默或語而匪疾匪徐夫如是雖曰微細善緣儻積習純熟何憂失之淪墜哉深根固蒂長生久視道家保身之要也生滅滅已寂滅為樂釋氏清心之要也上智明了可以足用吾老矣而能生一智執一志何謂也外順世間法無固無必以此為無所礙之智內學出世間法有初有終以此為不可奪之志志與智交相濟久而彌堅吾之道其殆庶幾乎開示悟入大事之因緣也由乎師觀練薰修大事之功用也由乎己若止務空言則必貽後悔摩訶止觀有語云躡躡而入玄聖蘧廬有語云溶溶而進人多間好禪談罕見實知妙用天台教止觀二法法華經悟入兩字入字最後濟覺之力也豫自得此精意不能剖析而言有客謂豫曰嘗觀吾子落筆成言不求功名不求富貴奚獨如此蒙竊惑焉豫對曰夫拜將拜相處世之榮名學仙學禪出塵之妙事各從所好復何疑哉豫引古佛名號人多笑其迦談因思以理和會之也莊子云至德之人無聲之中獨聞和焉豈非觀音佛之法門乎又云宇泰定者發乎天光豈非定光佛之名相乎豫於二者覺有至微朕兆苟或固致詰豫當默然而已豫嘗歷覽釋教經論所說有二生滅一寂滅若具引本書即文繁隔越難為直指豫今節略裁成俾人易曉二生滅者其一是分假生滅即今一切衆生相續有情是也其一是變易生滅即所謂阿羅漢菩提薩埵隨意生身出沒自由是也一寂滅者謂如來覺利自他兼濟功畢入于圓寂不復生滅是也古人有言為善最樂吾亦有言學禪最樂此理大同而小異自淺而及深者也為善世間法學禪出世間法知者自知說則難說豫老矣人多見稱言其面色紅潤神氣清健此以發外而可知也而不知豫入道深密抗心高遠此以積中而不知也豫覽羅什答慧遠書加之一偈其首云既已捨染樂心得善攝否若得不馳散深入實相否豫愛此語但能深入實相安住妙境何假參禪問法耶高僧傳云晉司徒王謐致書於廬山慧遠有語自陳曰年始四十衰同耳順遠答書曰古人不愛尺璧而重寸陰觀其所存似不在長年檀越乘佛理以御心復何羡於遐齡耶豫因思之壽長不及於道勝况諸悠悠之事豈勝於道乎釋道常此字本是雷風卦名豫避廟諱權改秦姚興敦逼欲奪其法服令居翼贊之任固辭得免乃嘆曰古人有言曰益我貨者我神生我名者殺我身於是竄影岩壑畢命幽藪蔬食味禪緬迹人外豫因思向子平云富不如貧貴不如賤殆相類乎顧此法但能識心達本無微細之疑忘情契理到純熟之地其道成矣安用繁云塊處清間自誨曰迹務退藏避虛名之為纍心勿馳散入實相以增深善緣既獲冥符餘景豈宜空過古人輕尺璧重寸陰良有以也浮雲或聚或散豈礙太虛之清曠浮漚或成或破豈寒潭之湛淨浮想或起或滅豈壞真心之靈照念念不息人皆有之勿以其然遂虧進道豫以決志辭榮間居佚老躋仁壽之域樂育無彊窺衆妙之門勝進不退翛然自得何必求之身如翔鴻不可籠心如蓮華不著水身心所樂已出世間何况純修別有妙處晉書隱逸傳云𥞇康從孫登游三年問其所圖終不答康每嘆息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光不用其光而果在於用光人生而有才不用其才其果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命乃作幽憤詩曰昔慙柳下今愧孫登豫詳識真二字愛之重之以為明哲保身之法也賢達詣道之見也有智之士可不務乎莊老之書理有明據嗜欲深而天機淺道德高而下士笑真隱寡偶自古而然塊處逍遙亦足為樂今有文士目莊子曰碎金多采先生之語以資應用章句耳豫亦耽味其書求理綴文以為助道之品入此法藏碎金録中名同而實異者也又晉隱逸傳云董京字威輦至洛陽行吟常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受或見推排罵辱曾無怒色孫楚貽書勸仕京不從答以古詩其末有句云萬物皆賤惟人為貴動以九州為狹靜以圜堵為大豫詳最後二句明知足常足𩿾鷃逍遙之意也又詳其少欲忍辱涉于梵行得非高僧高士倫類相參而流轉乎范喬字伯孫稟德真粹立操高潔以父粲有疾侍養衡門至于白首凡一舉孝廉八薦公府再舉清白異行又舉寒素一無所就豫覽此愛之重之古人純孝高節有如此者與夫名實相違者異矣譙秀字元彥巴西人也祖周以儒學著稱顯名蜀朝秀少而靜默不交於世知天下將亂預絶人事雖內外宗親不與相見郡察孝廉州舉秀才皆不就遇亂避難宗族依憑之者以百數秀年出八十衆人欲代之負擔秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年纍諸君也年九十餘卒豫讀秀傳美其有清節有先見推分克己無所干擾而獲康強壽考乃福報之使然乎莊子云大浸稽天而不溺大旱金石流土山焦而不熱注云無往而不安則所在皆適死生無變於己况溺熱之間哉故至人之不嬰乎禍難非避之也推理直前而自然與吉會又晉書隱逸辛謐傳云賢人君子雖居廟堂之上無異於山林之中斯窮理盡性之妙豈有識之者耶是故不嬰於禍難者非為避之但冥心至趣而與吉會耳豫以二書意同乃合而書之索襲字偉祖敦煌人也虛靖好學不應州郡之命舉孝廉賢良方正皆以疾辭敦煌太守陰淡奇而造焉經日忘返淡曰世人之所有餘者富貴也目之所好者五色也耳之所玩者五音也而先生棄衆人之所𭣣𭣣衆人之所棄味無味於恍惚之際兼重玄於衆妙之內宅不彌𤱔而志忽九州形居塵俗而棲心天外因詳陰淡之言豫以為古之賢人君子道德內充而自得者其實沛然滿足不可以常情擬議也張忠字巨和中山人也永嘉之亂隱于泰山恬靖寡欲清虛服氣餐芝餌石修導養之法以至道虛無為宗其教以形不以言弟子受業觀形而退年在期視聽無爽豫味先生所授之道有似禪師密傳心印者也又以為窒嗜欲之源居清曠之域壽長神王固當然歟宋纖字令艾少有遠操沈靖不與世交隱居于酒泉南山不應州郡辟命酒泉太守馬岌具威儀鳴鐃鼓造焉纖拒而不見岌歎曰名可聞而身不可見德可仰而形不可覩先生人中之龍也年八十篤學不倦後張祚遣使者備禮徵為太子友尋遷太子太傅頃之上疏曰臣受生方外心慕太古生不喜存死不悲沒素有遺屬屬諸知識在山投山臨水投水處澤露形勿告我家今當命終乞如素願遂不食而卒年八十二諡曰玄虛先生豫詳達人大觀形骸為外物族類為妄緣不以形纍性不以族嬰情與夫大禪師臨終勿塔勿悲之言何異之有郭瑀字元瑜敦煌人也少有超俗之操精通經義雅辨談論多才藝善屬文隱于臨松薤谷鑿石窟而居服柏實以輕身張天錫遣使者孟公明持節以蒲輪玄纁備禮徵之遺瑀書曰先生潛光九臯懷真獨遠心與至境冥符志與四時消息豈知蒼生倒懸四海待拯者乎孔聖車不停軌墨子駕不俟旦皆以黔首之禍不可以不救先生懷濟世之才故遣使者虛左授綏鶴企先生乃眷下國公明至山瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹豫讀瑀傳愛張天錫遺瑀書云心與至境冥符此一句入道之門也祁嘉字孔賓酒泉人也少清貧好學年二十餘夜窗中有聲呼曰祁孔賓祁孔賓隱去來隱去來修飾人間事甚苦不可諧所得未毛銖所喪如山崖旦而逃去西至敦煌依學官誦書遂博通經傳精究大義西游海渚教授門生百餘人張重華徵為儒林祭酒天錫謂為先生而不名之竟以壽終豫讀祁嘉傳異其窗中呼者蓋神人也所言得喪利害之殊堪為鑒誡耳吾今逼大耋之年已老之身舉止輕健不為惡欲之所敗已老之心觀照明了不為邪見之所昧必因宿習何憂後緣此真實語非增上慢晉書謝鯤傳中多說鯤規諫王敦之事是時朝望被害皆為其憂而鯤推理安常時進正言而敦不能用豫讀鯤傳愛此推理安常凡四字蔚為心要夫自古及今有無數之人無數之情無數之事是非曲直得失利害憂恚苦樂種種不同理之常而大者也若以道斷但推而安之都為夢幻如觀羣動終歸乎空不用鼓發於言下留滯於胸中此乃無礙法門之最也豫嘗為安順大常略論意亦如此今重言之出世大聖人具有一切智能行一切行不住一切相此是佛功德以世間法如何擬議夫齊戒沐浴清淨身之法也滌除疏瀹清淨心之法也必若識真拔俗退居進道之士可用此外內二清淨潔其身心以為資助爾顧此法自悟自得契真不殊可目之曰同文印覺他利他照暗相繼可目之曰無盡燈在上上之智謹授受之理不可輕也我自立一科法言欲得己心至空至明以為體善利萬物不求其報以為用亦不分屬名家論語云子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳豫因思內典教中有語云衆生無邊誓願度煩惱無邊誓願斷法門無盡誓願學無上佛道誓願成如此言句豈止書紳銘肌鏤骨可也解脫門三親切方便而出纏縛良以次第相成也涅槃路一直截坦蕩而歸寂滅不由岐徑致迂也我如是言人謂我何豫詳教中所說之意謂小乘著空是心住於相而起見障蓋言空之為法執亦成礙而况外道之學別作異計種種邪妄為病也可知矣自顧晚年信道彌篤南華經髓遊逍遙之墟西聖書心泛寂滅之海盡攝大千沙界無蒂芥於胸中深入不二法門非剖析於言下所好如此誰為同人法華經云諸佛世尊唯以一大事因緣故出現於世其下陳列欲令衆生開示悟入佛之知見豫嘗率意立言云開示由乎師悟入由乎己其後因覽唐李繁著書十六篇名曰玄聖廬內有心宗第十一不動第十二夢覺第十三聞思第十四有說云經言開示悟入而不說開示悟入之方因著此四篇開心宗之性示不動之體悟夢覺之真入聞思之寂豫詳四篇所述咸有妙旨就中悟夢覺之真入聞思之寂暗合豫即今朝夕趣向事理親切由是欣然自得以為天獎冥符爾不復一一具載之也白樂天有自詠詩云鬬間僧尚閙較瘦鶴猶肥豫因自思抑亦如此仍敘餘意可資清談爰自引年挂冠攝生修道居深迹晦絶無泛交行健聽聰覺有所得乃復為兩句以擬前詩云介居僧尚雜警聽鶴猶聾初讀老莊之書入大觀之理見世間夢幻蕩胸中蒂芥後讀釋梵之書得上乘之法啓我明徹之智無窮而不昧鋭我堅利之志無窮而不壞根力次第有如此者法止一乘日常三省幻身虛假雖悟有涯之生本覺空明未歸無念之體然於淨信不忘真修文殊表信解之智普賢明周遍之德合而為一是謂毗盧遮那華嚴名曰三聖圓融觀信妙矣哉豫覺晚年益甘道味酷好含華隱曜𭣣視反聽優游何有之鄉放曠自得之場從造物者為師友而世間幻纍其如豫何宜乎三徑就荒一室不掃凝塵滿席其心湛然圓覺經義有云從本起末為出攝末歸本為入又云迷之則出悟之則入豫因知悟入二字理合相連又知既能覺悟而乃攝其妄念入于無念斯為法要而况聞中靈應助發道緣豈非天瑞冥符資其宿習俾我䇿勵何法喜之深乎夫恬愈相資成長久之道喜怒不節傷陰陽之和顧己暮年尤宜知明而力勝也豫覽二教之書有所愜當而能唯變所適推而廣之釋氏經旨豫愛其見空而度苦厄一見其空則一一皆空矣自然目之所及見其無全物無全事無不是空何能障礙于目哉老氏經旨豫愛其知常而益明了一見其常則一一皆常矣自然心之所及知其天時之慘舒晦明人身之災福苦樂世故之順逆成敗無不是常何能刺鯁于心哉二者對治可以足用身心之法舉要而言一真是本名之為道萬緣是末名之為纍不可棄本逐末以纍妨道如此達觀謂之初學人之學禪率多隨其影和其嚮效為語立為文豫之學禪無不貫於心達于性發以智濟以力其理如此何必繁云有道友嘗說考驗修行功課之法令置白黑二碁子每有一善念投一白子入於一器中每有一惡念投一黑子別入一器中至夜比較其數即知善惡之念增減多少矣豫竊謂此法太迂闊誰能細碎致煩豫又自思但性急耳除有觸境小忿未能頓除外且無故心造惡之念不當如斯拘執算數也唯知務在靜勝於動最為要切宜於日夕四威儀中不計情境如何隨分量力常習靜念而已不可廢也莊子所說有以死生為小變我與變俱而無失為大常此則深契佛書所明理性真常之道夫如是則知身外悠悠愈不足以介意也昭然矣莊子云百里奚爵祿不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人吾因思之若或即今有人二者不入於心吾當推而尊之曰至人真人道人也豫省己方期耄及似覺智生切欲內習絶倫離人而獨立外順晦迹虛緣而葆真確乎彌堅怡然自得荀卿有言曰志意修則驕富貴道義重則輕王公豫謂此世間法也豫別作二句語云達觀深則遺情纍內習至則還天真此出世間法也中乘之人能觀根本十二緣轉為生死輪不煩更述豫今又觀枝末三緣結為煩惱網謂身緣家緣世緣是也續說三者該括盡矣此緣此理古今大常既知大常足以消遣昔老𣆀於新沐之餘凝然遊心於物之初且云不能知不能言我亦於新悟之餘凝然遊心於聞之初亦不能知不能言引類而書以明殊勝佛書云須菩提解空第一豫於觀空之智亦得少分然而不入斷滅又知有不空如來藏也一切凡夫終日念念營致五欲樂具不知萬中有一真大丈夫回向一乘妙法如此勝事與誰交談楞嚴經云情想均等不飛不墜生於人間想明斯聰情幽斯鈍竊詳此語信不虛矣豫今年近八旬而覺耳聰心爽每於清宵靜臥虛白堂中或聞左右前後兒孫列宇言音所及辨其誰何故有效白體詩云介居僧尚雜警聽鶴猶聾之句是知想明斯聰豫得萬一因思貫休之詩有以楞嚴為禪髓樂天之詩有以壇經為佛心凡此類例豫最稱美豫觀世界倫類都是衆多幻化因緣生滅假合而成其中情氣各各微細分別遂有紛擾無窮之事新陳相續隨時運任造化古今常然無如之何然而到了虛妄唯有一種妙說目曰一真法界非但少有到者抑亦少有知之豫愛如此而言曲盡其理莊子雜篇有云長生安體樂意之道豫愛此語因而簡省聯貫目之曰長安樂之法竊謂此三者無賢不肖皆愛之雖愛之之心同而致之之道異所以利害相反矣豫若形于文言則淺近而犯時忌人能自以意取則深遠而得天機今故不復具陳智者詳之可也豫自謂心遊𭹹瑋之書所以慕高遠目想清曠之域所以遺繁華於道雖非大成於理亦為小善道集虛吾所信仁者靜吾所師無聲之聲聲成文非因叩寂無學之學學日益止務棲真不作聖心安住妙境有如此者謂之何哉唐圭峰密禪師有指示學人最後安心方便之法先有敘述之言云諸修行人但將不認不隨之智照於身心自然覺疾病時痛惱時或暫安樂時侍者乖意時喜事適情時所有種種念慮千般萬類皆如幻化影像皆是他緣靈靈一心如鏡之明未曾不照斯為真我我既本無病健無死生誰能勞神而憂他妄緣乎已曾千萬億劫妄憂之竟何所益非惟無益仍展轉招於妄苦今但自保靈明免遭妄執所繫即捨此身趣後身時無所慮也云云豫詳密公之言雖僧俗不同而緣纍一也乃至族之蕃衍因而緣亦增多固當如是但依此教誠以覺智斷之慎勿一向憂撓若能如此便是得親切法門也觀諸文字之中有使棲心棲神棲真棲禪大約秪是檢情攝念之意有如鳥之棲宿不飛不動是也豫以為明正學人但於一切時中隨分止息思慮凝然宴寂而已復何疑焉列子所說周之尹氏大治産心營世事慮鍾家業資財有餘心形俱疲夜則昏而寐夢為人僕趨走作役而尹氏之趨役者晨昏弗息有老役夫筋力竭矣而使之彌勤夜亦昏憊熟寐夢為國君其樂無比此章立理大約齊物以明覺夢不異苦樂各適一方未足分勝負豫於此外別得新意以為尹氏家雖富盛心有營運之勞故有夢中之苦役夫身雖貧賤而心無營運之勞故有夢中之樂若復有人晝無役夫之勞苦夜無尹氏之勞苦其享福也何如哉豫又獨斷以為勞心之苦苦甚於勞身之苦也如何分勝負五鼓夢回緣念未起靈響清徹聞和逹聰凝聽靜專頗資禪悅安住妙境何勝如之阿育王經云優波笈多宿世為獼猴學緣覺坐禪證阿羅漢果又玄聖蘧廬心法篇云東都有人養鸚鵡以其慧甚而施於僧僧教之能念經往往架上不言不動問其故對云身心俱不動為求無上道及其死焚之有舍利洛人為之作塔豫詳二者得道皆自宴寂中入夫如是則華嚴經云心佛及衆生是三無差別信不虛語矣唯人為萬物之貴者苟不知此道乃猿鳥之不若也知之者安可自輕棄乎晉劉毅對武帝之言比帝為漢之桓靈尤為不遜晉武能笑而容之此事有人君之量情之所難也因思為人臣者忍受惡言於理差易而不自抑制於理可乎受人凌辱畏其勢而忍之者不足為忍無可畏之勢而能忍之者真為忍也教中說煩惱即菩提豫嘗比方而可曉夫人之為惡一變成善譬如盜賊亦有勸諭感悟然改圖便為良民者即盜賊本良民也煩惱即菩提固當無二無益之言自戒勿發無益之事自戒勿思世間法以讓為德然亦有不可讓者故儒書有云君子不爭必也射乎又曰當仁不讓於師出世間法尤不可讓古德有偈云十方法界諸有情念念以證善逝果彼既丈夫我亦爾何得自輕而退屈談者曰蠅能緣物不能緣火若能緣火與火為一人能緣事不能緣道若能緣道與道為一聞人談論但且虛受悅服慎勿鋒起求勝詳究取捨在我而已老子曰不爭而善勝豫欲加此而行非止不爭亦不取其善勝之勝有故人嘗說人自無始以來情性相合欲遣其情有如親戚之人同居已久相別之際戀戀難去豫以為世間法貴乎情日厚出世間法貴乎情日薄然聖人忘情者非木石之無情也無偏愛之仁耳故有緣之慈以親親而慈其慈小無緣之慈不以親親而慈其慈大豫嘗自立兩句語云欲可從于人不可從于物上句取儒書以欲從人則可以人從欲鮮濟之義是屈己以濟事也下句取佛書若能轉物即同如來之義是不令真隨妄轉也豫自說云因言會意謂之悟道忘情詣理謂之修道至寂洞照謂之得道易遁卦上九肥遁無不利肥者饒裕之義也以其無應於內故曰肥遁豫今以人心比之若有人其心既靜而能無應於外亦可謂之肥靜矣內心外迹厥理何殊孔子曰克己復禮天下歸仁焉豫擬之別立句克情復性衆妙歸本焉豫自立言云神氣相守道家存有心息相依禪功造微其理一揆吾能貫之竊為口訣二句云須有智斷方修止觀因自解云有智照了乃能决定信有斷猛利乃能决定行諦觀無明如醉醉人起諸惡展轉為過咎以至禍敗無明生衆支展轉為因緣以至老死佛書云寂滅者名為一心謂無念也自一起念則為二矣豫因獨斷人二心為念字似得此理佛書云本覺曰如心住曰如不變易曰如豫因觸類演之曰性與理合曰如物我混一曰如豫謂小乘初學者也大乘功成者也故釋迦佛云我念過去諸佛方便力皆以小乘引誘然後令入究竟一乘是也豫又謂亦如世間法童法蒙與老成之學量次第不同矣覺了一切法如幻化者如悟杯中蛇影豁然而疾愈知其疾妄想結成也唐陸象先嘗謂人曰天下本無事祗是庸人擾之始為繁耳豫又以為心間本無事率由妄念擾之始為煩耳入道之門須用止觀二法何以故夫理障礙正知見事障續諸生死非大觀之法安能除理障非大止之法安能除事障楞嚴經有云非因緣非自然豫常疑其兩無所歸一日忽自悟夫因緣者虛妄假合凡夫世間法也自然者撥無因果外道不了義也唯出世了義不墮二邊耳亦可自謂得無師智也老子云不見可欲使心不亂此小乘之力也若見可欲而心亦不亂此大乘之力也亦如牛頭山慧融禪師云有二種用心一者不見一切物得空唯見於空不見一切物二者一切物得空了了見一切有不住於有了了見一切空不住於空是也昔晉王濟有馬癖和嶠有錢癖杜預有左傳癖豫亦有耽味禪悅遺忘機心之癖習僞智矯性狥時損天真取世資考其得失至人弗為也有客謂豫曰欲求妙道從何門而入豫因决擇徑直而答曰當須悟人法二空斷事理二障學止觀二法去沈掉二病四者純熟有進無退勿問符應久而自知此法簡要親切而言之也學法之人有聞談道而豁然頓悟者亦是宿世修習之功而不自知也譬如學世間文章曾經諷誦歲深遺忘或有舉其端緒復能記之又如久別之人相逢不識彼若話及姓字此乃忽爾悟焉亦猶是也世間博聞強記洪筆麗藻之士視其暴威武而不識姓名點畫者何如哉達人大觀窮理盡性視其懵然不知者亦類於此禮以檢其迹樂以和其心豫又別得無體之禮檢攝之至者南華莊真人所著書中述其心齊是也無聲之樂和暢之妙者襄陽龐居士所集詩中述其智樂是也此樂音落人多止好神仙之事而不知禪功造極者合至神之神為仙中之仙也枹朴子曰辭千金之重聘忽卿相之貴位者無所修為猶尚如此况加以知神仙之道必不肯役身於世矣豫以為脫落世網致禪功之深妙者比諸神仙又增殊勝也外身出纏小自在內身出纏太自在如如不動寂為體了了常知照為用智者知也深知其理勿復誤為行者行也力行其道勿復虛過楞伽阿跋多羅寶經云緣自得勝進相遠離言說文字虛妄趣無漏界自覺地光明輝發是名宗通此一科合論語云古之學者為己又經云說種種教法以巧方便隨順衆生令得度脫是謂說通此一科又合論語云今之學者為人於其本教又合自覺覺他自利利他脫世網避畏途簡妄緣甘靜居小寂滅之樂也塵事無所拘勞慮悉已除心如大虛清遠恬愈大寂滅之樂也但趣此境何必廣求異論哉詳佛法所明之理有二殊勝與凡情對背有以親為踈謂五蘊皆空形相是外物此智之深者也有以踈為親謂一切衆生皆如己子此仁之大者也此智與仁何如哉苟有敏識不當輕議豫以不貪之故獲善利者三不涉畏途不履危機一也量入自足身間氣和資養生之道二也習靜悟空深知理性之法三也二姓之親因媒而成親成而留媒不遣媒反為擾一真之道因智而合道合而留智不遣智反為礙古德云有所知者有所不知無所知者無所不知豫嘗設喻以明此理上八字有似夜有其燭燭不及而有所不見下八字有似晝無其燭燭不用而無所不見形質全具人之外美繫乎天耳目手足是也行實全具人之內美繫乎人道德仁義是也其外幸而全具不能內修以相稱誠堪自惜誠堪自責且夫外不全具無如之何內不全具可以修補而鮮克能然堪惜堪責豈虛語哉世人但見有之有不見有之空如此者無數或見有之空不見空之有如此者甚多既見有之空又見空之有如此者甚少若能空有並見智行相資䐇合深入謂之得道名器權利虛中之虛壽康給足虛中之實詳擇所急馴致天倪踰量躁求道家深忌心者身之本也心不生滅則身不生滅定矣故荷澤法門有語云雖備修萬行唯以無念為宗無念即無生之法也千經萬論但廣敷揚法之根源止在無念念增緣起乃入輪回古人云燕雀焉知鴻鵠之志此於世間法中志之大者也豫因擬之別有語云醯雞焉知雲龍之志此出世間法中志之大者也人物志云晉楚帶劒相詭反注云自晉視楚則笑其右自楚視晉則笑其左因思好道德者避權利之地修安樂之行無傍觀之榮免切身之苦好富貴者大笑之好富貴者據權利之地失安樂之行得傍觀之榮被切身之苦好道德者亦竊笑之與帶劍相笑其事雖殊其理相類豫好推求妙理念念增新落筆成文編綴未已有如心府之內衆寶莊嚴又如百鍊之金轉加明淨以此自慰不亦然乎萬事貴乎得中夫日過午則昃月過盈則虧物過盛則衰器過滿則溢必然之理也世人升高位積羡財不務得中貪極致禍者多矣宜乎自戒之也唯有學道之志貫微臻極精修密詣使太過此則無妨世間法不失其正者究竟猶虛若更邪僞紛擾此又虛中之虛也不知至真至妙之理枉用其心與物化滅者但可嗟憫而已何足貴乎妙法功行勿憚難成譬如瓦礫易取珠玉難求自然之理也若不登山涉海安得此寶莫同瓦礫輕視之耳得之則其利甚博後漢孟敏字叔達荷甑墮地不顧而去郭林宗見而問之答曰甑已破矣顧之何益林宗異之勸令學業果著其名豫謂斯人明理而有斷者也為事敏達稱其名焉以此推之人所失當以既往不咎勿復介懷有若更追思不已亦猶顧惜破甑何所益乎佛教說因果道教說自然說因果則有懲勸說自然則無懲勸夫萬事若皆謂自然撥無因果則陷人於不修而虛生浪死多入惡趣之中也殊不知於其自然亦有因果試舉一端以明之耳人有樹蓻之功則有采收之利自然之理也樹蓻者豈非因乎采收者豈非果乎人有未壯之子而為薄徒所誘習以成非罹于深刑者多矣唯幼敏而殊常者乃能不近薄徒人有可欲之心而為塵境所誘習以成迷墮于惡趣者亦多矣唯夙悟而殊常者乃能不逐塵境配而設喻殆相類乎豫欲自規并勸學道之人修四常行謂常不障常不礙常不動常不退上二行在乎智明而量大也次二行在乎志堅而力勝也昔向子平所言富不如貧貴不如賤豫又知顯不如隱蓋以隱近道家之旨老聃大聖人史氏止謂之隱君子然而隱者亦有竊吹濫巾之士釣聲華希寵利而已若能名迹俱隱乃為真隱古人有詩云始知真隱者不必在山林又有云禪師示我真隱心月在中峰葛洪井又出處一貫為通隱古人有詩云禪門有通隱喧寂共忘機如此之類是也凡一百二十六章詳校官監察御史臣王爾烈檢討臣何思鈞覆勘
