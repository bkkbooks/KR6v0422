body:
  text: 宋朝逈撰圓覺經中所説禪觀法門粲然該備吾今約己隨宜決擇其一以為入道之權輿威德章中説三種觀門今取其三觀之初者經云以淨覺心取靜為行由澄諸念覺識煩動靜慧發生身心客塵從此永滅便能內發寂靜輕安由寂靜故十方世界諸如來心於中顯現如鏡中像此方便者名奢摩他其次辨音章中説二十五種清淨定輪今亦取其二十五輪之初者經云唯取極靜由靜力故永斷煩惱究竟成就不起於坐便入涅槃此名單修奢摩他豫詳二説其理一也豫愛所言不起于坐便入涅槃可以且從此去禪源都序有云隨時隨處息業養神正是此矣協用恬愈養天和以適性密扣真寂乘佛理以御心殊勝法門吾從此入身居一室安之則具足逍遙身也心住一境安之則具足禪定心也身心俱安動靜相養宴息法空之坐優遊自得之場今我能然云何不樂智曉了性真純學澄凝成證應自立此意如貫四珠委細名理分配𭣣攝用為法要復何以加儒家之言率性道家之言養神禪家之言修心其理一也何煩諍論昔魏太祖曹操嘗謂蜀先主劉備曰天下英雄唯使君與操耳豫以為此乃世間之事也固不足云若有言天下大達唯君與我此乃出世之事也何以超此未知有人言之乎真學之士若能順天和以調息乘佛理以御心亦可目之曰調御丈夫矣大雄氏則調御法中大調御可尊之曰大調御丈夫矣夫能堅固金石之志詳求寶玉之書窮盡天人之理有此三善可無愧於心矣有以佛書為寶書道書為玉書豫今於圓覺經普賢章辨音章共采四句凡十六字合為一法約己足用文簡理備可即時而行自以意求無煩筆解其語云知幻即離不作方便不起於坐便入涅槃羣誙誙而趣死獨熙熙而養生智識之殊天壤斯絶不可説莫能知莊生至樂之言信乎自得而已情因事觸未能不動當使情之所動動如電光光即時滅動之所應應如谷響響即時絶動情應觸如斯而已如斯之善已為難得若能如蘇迷盧山八風不動此則卓爾絶倫矣心歸妙理學西域之無生迹避畏途得南華之至樂此二殊勝復何加焉似動不動真人深深之息似用不用如來空空之心心息相依息調心淨混融純熟名曰精修真隱之深者身心俱隱身隱之深則人倫不能見其迹心隱之深則鬼神不能察其意陶然得天和䐇然與道合我願如此孰知之耶夫達士者不入智籠異羣愚也獨扣道樞知所歸也窮當益堅勇於拔俗老當益壯勤於行道具四奇節孰能比方我願師之庶幾踵武禪源所云隨時隨處息業養神者豫因解之云不拘晷刻之多少不擇處所之喧靜但能攝念安心皆是禪功分限雅善之名雖有百分之一亦勝於無何謂也夫鄭衛之聲曲將終而奏雅猶勝於終不奏雅姦慝之人命將終而言善猶勝於終不言善一氣散結而為身一靈分宅而為神神身合而為人人所起而為事事相續而為世世事無窮紛紜其中種種不可説一一旋成空唯有萬一真知獨能和而不同權利是外貪愛若不能鑒戒而知止足則不免事有變衰之患恩情是內貪愛若不能覺了而求出離則不免身有生化之輪環迷悟兩端有直有枉迷則天壤悟則反掌天地中萬物人倫中萬情世界中萬事吾以道眼觀之無不知其大槩種種是常何煩分別吾自諦思黑業殆盡白業增多唯未到無業有覺之深深處若能到此吾道成矣豫自思即今常修三無漏學粗得百分之一焉何謂也奉焚課小法又間日食素懲忿窒欲應日損之師以此為戒學隨時隨處息業養神以此為定學得經論智因以文章為佛事命筆立言多明觀照之理以此為慧學清曠域逍遙遊外境殊勝避世高士知之華嚴法界金剛淨土內境殊勝出世大士知之知之行之而能深入造極者不可及也諦觀人世身有病健勞逸心有憂喜苦樂事有吉凶成敗相𠫵混然大槩如此若能推理安常亦是達人之一法耳夫鯫生不可與議遠圖曲士不可與談大道故豫塊然獨處聊以自娛研味典墳師友聖賢而已經教中説四大之四色為四蛇六根之六入為六賊身心為幻垢附離真性統名曰我其理如此而於此外悠悠更欲求備如意不亦踈乎不亦過乎自古聖賢發大菩提心學大調御法成大涅槃果彼安能説俗安能知默然自得而已經教中所説住心一境名為具足禪定心豫因自言存心衆妙名為具足智慧心又有所説繫心一緣以習定如發箭也發多則中多久久而箭箭不失豫因又言遊心萬法以增慧如分燈也分多則明多久久而燈燈無盡推類適變伊子能然吾諦觀人心於世間法不及於情者大約言萬數於出世法不及於性者又巨萬數噫吾誰與言自省吾心而有三寡剛而寡欲不由勢利之徑訥而寡辭不接遊戲之談介而寡合不須友泛之交三者無相妨自便於從道見在之身慶大耋而康健未來之性願隔生而誠明世智所圖非吾願也豫以罷留滯於西臺求退居於上國歸乎舊地松菊猶存易以隱裝衣冠甚偉挂車不出讀書自娛絶無榮利之心洞究正真之道此唯自得何必人知豫有二不求六自覺名不求虛榮利不求太盈修身自覺輕澄心自覺明調氣自覺清為文自覺精顧行自覺平學道自覺生去彼取此莫之與京人人各有四因緣蓋起於身心事世者也自止三數由於已最下之一則不然何謂也身可使無侵損心可使無惑亂事可使無繫縛此皆由己者也其唯衆共成世有可安之理則不由己此固無可奈何而三者由己亦罕能自保有之噫人之大迷也如此何必讀書然後乃知而未嘗見人言及於此豫嘗內思自壯及老志辭權利懼貽水炭之懷欲寡私邪免罹針艾之苦率由己見不俟他言列子第七楊朱篇第四葉有注云夫不謀其前不慮其後無戀當今者德之至也豫愛其語可以銷憂釋結豫當奉持又能不失中正者也三歸五戒初法其師出以律四諦六度終濟於曲盡其妙此從方便門漸進修行路吾嘗究觀人世大情於其稟賦有限光景之中志在求取無窮愛欲之事者萬萬皆然萬中有一自保天均不致大患者已為明哲若又能別得悟入之理此則巨萬中或有一人乃希世絶倫者也衆人不可得而知之而此人亦不可得自言之耳豫以觀書得意聊舉三家之所宗孔氏之書云有殺身以成仁無求生以害仁此以名為宗不顧其身者也老氏之書云名與身孰親此以身為宗不顧其名者也釋氏之書云妙性圓明離諸名相此以性為宗不顧其名與身者也源流實繁難以廣記而備言之爾豫自引年退居日用有定酒藥隨宜扶衰養疾身心隨時息緣反照以經論為智地以文章為佛事止此四者餘無所云夫學道入理之心有如翔禽度空而不留迹又如間雲出岫而不著物經教中所説無住法門無礙法門其自在也如此復何疑乎處世之道亞聖鄰於至聖出世之道等覺鄰於妙覺唯變所適始可與言道已矣豫退居養老有清遐高潔之意恬和適悅之味殊勝超絶之志自知而已豫所見所踐所願不求名譽福報若其理有如影響自應者抑亦非豫所貪也豫承多士美談見推清健自詳內典所説似得輕安只此清健輕安不羡華腴充盛自念退身漸老脫俗彌殊無所圖無所拘不好圍碁不好呼盧立法之言信必書服藥之酒斷沽日得新新經論智知有孤雄大丈夫自覺隨宜真應之兆久聞靈響清徹透三靜關未得心華發明照十方剎此善境界鄰妙吉祥吾志在圓覺經得普眼上根之觀門行在楞嚴經得觀音入流之法要姑務相濟積習勝緣剛健中正豫取韋編之言以為定觀練薰修豫取具典之言以為慧大築如此餘自詳求之也真修法門次第有四智觀道斷志守力行此但開端詳求在己或該己録意孰增深清心釋纍豫取後漢書息業養神豫取禪源序二句足矣用不必多身心不動坐圓覺道場權實會歸入法華三昧從吾所好何必求人豫思壯歲歷官之日嘗見公館之壁上有題詩云猛風大樹其樹根已露上有寄生草青青猶未悟不審何人之作也因知物理自昔而然先覺形言警戒多矣解脫三門見空虛而有覺涅槃一路云寂滅以無餘廣説異端吾不取也偉茲靈響發我天機乘妙妙之聞心入如如之成相欽哉瑞應蔚為道師人之多欲三聖同誠周易損卦云懲忿窒欲老子道經云少私寡欲釋氏涅槃經云離於愛欲垂訓并著豈合縱心言行動天地儒教之極致也此法有為寂照含虛空佛理之極致也此法無為二法俱正其用則別人間有畏途內外共二皆速死之地也舉世誙誙然趣之而不能避安知有一路涅槃門乎苟聞斯言大笑者多矣南史中有説梁時劉歊者幼敏特高長而博學有文才不娶不仕隱居學道忽有老人無因而至謂歊曰君心力堅猛必破死生彈指而去尋之莫知其所豫因追師獨斷其理夫人分假之身乃一幻纍之蘊耳此人能破之而出所謂有自然智破無明役超於天人者也豈世網之可嬰乎孔子學禮辨其俎豆之名品此則典儀之職也孔子贊易演其卜筮之象數此則執藝之職也然孔子所學此有司之職乃是體大而不失其正者耳若以妙道超乎形器之上出乎言意之表固不可同日而論也而輒問禮於老𥅆故老𥅆答以他辭形於教誡而孔子遽有猶龍之歎焉是知宣尼主善為師聞義則服有如此者豫別得一對治之法矣言簡意備可以足用先思己之切於身心次及庶事之不如意者總名為苦而歷觀甚於己者至多又思己之切於身心次及庶事之得如意者總名為樂而歷觀不及己者亦至多夫如是以己方人有何不足豫惜暮年壯心不已所修功德頗異於常作不退輪銘且志之於己而勿失自警策於胸中作無𥁞燈頌又傳之於人而漸多期照耀於天下自覺自利覺他利他言念此生不為虛過南史內有説梁劉歊志行甚高奇嘗有異人謂歊曰君心力堅猛必破死生豫慨然慕之而志氣雄偉願超造化抗心希古唯力是視諦思人倫自凡及聖分為四種知見夫唯貪所欲都無覺悟此是凡夫知見超凡有覺屑屑然樂於小法或沈空住寂此是小乘知見夫傑出此類而不落小乘二邊獨得中道此是大乘知見雖得中道亦不住於相此是上乘知見出此四等之外更有上上乘知見無不了知不可以限量對待為比而妙覺周圓此是佛之知見南華之書有説逍遙遊蓋明大小雖殊而能隨己自足不越涯分而過貪西域之書有説解脫門蓋明次第皆空而能見理無著免罹虛幻之所縛誓將乘逍遙遊入解脫門豫苟能然豈有不當二教參用有何相違士若宿植善根將成勝果練一心之凝寂期五眼之圓明馭不退輪行無上道有如此者何以加焉豫之引退志本真純三徑就荒願無客到五漿先饋常畏人知自然而然不可致詰今得自生巧慧事甚近而意甚新夫化導於人猶為種種方便而况於己豈不能然此久迷而忽悟者也自今或值一切不如意事當即時而先覺屹然不動在我而已苟不能然於己何益化民成俗之學儒門之事也長生久視之道道門之事也清心釋纍之訓佛門之事也豫以此三事為貴名同而實異者也今偶得一論一經之中四字各一句采而合之以為道家心體之四相苟或能然何須廣求入理之法坐忘論云心安而虛南華經云水靜猶明豫謂但令心體安虛靜明即是真人至人爾忽自追省曾作靜深生四妙詞其序具述靜中生四妙謂安虛明樂是也今之所説該涉其四矣且表志趣純深自然暗合故不避重復而書若有人功名富貴如唐之裴度郭子儀我不愛之若有人琢磨道德師友造化合於天倫名出世人我愛之重之願以至誠效之持金剛經者若有人了知住無所住心得無所得法者此名慧業若有人日積課誦之功希求豐報之利者此名福業二者相去絶遠如霄壤矣周易云知進退存亡而不失其正者其唯聖人乎老子云見素抱朴少私寡欲又云知足不辱知止不殆涅槃經云於世間中得名聖者少欲知足亦名清淨夫如是則三教之書有何相戾勸戒之道有何不同讀書之人何不聽信寶積經云猶如大龍所作已辦涅槃經云如空野象獨一無侶豫因思之大士智力如大龍獨象奇特超絶也如此若望有朋自遠方來不亦難乎定如辟立不動也慧如珠明圓照也定慧相合體用備矣到此體用何必多談若有人於世間法中不嬰於網𮊁不犯於鍖斧於出世間法中知出世之道路見入理之門戶如是之人可謂獨步我自思之誰將晤語豫嘗作願成四勝深心偈云豁然悟空了然見性凝然不動寂然無思今又以此四句偈自為己説用之為法要焉豁然悟空者照破幻蘊情纍不留苦惱也了然見性者洞曉相續有情都是一真法界也凝然不動者任其外緣所觸如八風之吹妙高山也寂然無思者如晏海澄湛絶識浪之騰躍也四法純熟其利甚博古人古事過去空今人今事即今空未來人事決定空不悟則已既深悟之豈可於此大虛空幻妄之中一一執為有法執之為有則有礙有礙則有害視之為空則無礙無礙則無害以理斷之何者為勝苟不見此理何以得為上上智苟不能以理奪情於己何益又何以得為大丈夫哉行之由己何必求人動搖支體無積滯之氣融練情性無結閡之念修行之要最為親切豫今老年所學如此儒門中所尊推之曰龍周易云龍德而隱者也道門中所尊亦推之曰龍史記孔子曰老子其猶龍耶釋門中所尊亦推之曰龍寶積經中稱述無生大士云猶如大龍所作已辦豫因思凡諸俊彥有以人龍士龍自負者一何容易哉吾今佚老自謂方知身心世洞見大空佛道儒會歸真理浩然氣暢但保太和之和油然心新當成至樂之樂以茲度日豈曰虛生志於道者必在乎抗心希古雄節邁倫窮當益堅老當益壯脫落儔侶如獨象之絶羣超騰風雲如大龍之辦事噫我有此願而世無同人才智為佛事文殊之法門也行實為佛事普賢之法門也聲響為佛事觀音之法門也求自然智唯變所適吾能獨斷何必咨詢慧可初師事達摩告其師曰我心不安達摩曰將心來與汝安慧可曰我心不可得達摩曰吾與汝安心訖豫謂人之心也若此其身乃是至真至親之處然亦無物可得况乎虛名至假至疏而乃自矜其有不亦謬哉設有人曰我得好官豫當告之曰將官來與汝看彼或曰我官衆緣所成強名曰官亦如數輿無輿不可得取而看之也豫當答曰吾與汝看官訖豫因泛覽諸書又得三種之師尚書云主善為師夫宏達之士不當止學一先生之言凡有一善皆能師之則其智廣矣又列子云子列子師壼丘子林注云日損之師老子云為道日損夫人若能知非改過日思減損有去非之善居無過之地乃幾於道也又唐賢白樂天有詩云淡然無他念虛靜是吾師莊子云唯道集虛老子云歸根曰靜夫人若能虛靜其心則於道最為親切此三種理有淺深俱為入道之門故豫采而師之彌陀之淨土法華之化城權教也漸教也金剛之無所住心圓覺之普眼觀門實教也頓教也看內典者當如是戒吾於二教之書各得法要之一老氏之書云深根固蒂此乃長生之法也釋氏之書所云息緣反照此乃無生之法也名相之談不煩多取豫自視所履進退不失其正應儒教之宗旨也動靜之養其命應道教之宗旨也定慧均適其性應釋教之宗旨也合此三善之法奉今一報之身與衆不同於己有得二獸濟渡壯獨象之絶流四果超升嘉大龍之辦事甘從曲士見誚迦談入道之要先戒嗜欲吾口不恣其所嗜得老氏之旨淡乎無味心不恣其所欲得大易之旨寂然不動能戒嗜欲故幾於道豫素愛重唐圭峯禪師宗密所述法要之書尤為詳備竊心師之久矣天聖八年正月十八日夜忽夢見一老僧或云此即密公也豫乃再拜稽首自敘宿昔歸依之志云弟子幼不狎好弄之侶長不學無益之藝唯於妙道久留深意夙欽禪德願為門人擕瓶洗鉢服勤問法而已公亦有答見器之深而不一一記省其語寤而思之雖知因心成夢固當然歟亦喜妙事同符斯可見矣中觀論云因緣所生法我説即是空豫自別有語云因果所成法我説不是空何以故豫謂善惡真妄皆有報應故不為空也然而善惡真妄其理不同夫人心之根本為因也心之所起為緣也所成為果也當知惡緣妄緣可以除去有如左氏之語云無使滋蔓蔓難圖也善緣真緣可以封植有如白公之詩云前歲種桃核今歲為花樹其理決然耳智人宜乎詳擇之也自古以駕馭英雄乃威柄之極致莊子之師友造化在人倫而何如超絶卓然殊非擬議威儀動止有節身隨宜也𭣣合凝融有敘心隨宜也飲啖服餌有法物隨宜也詳擇應順有理事隨宜也我之四隨宜日用人不知設使絶倫才逸賞之曰天上謫仙人何如出世道高推之為法中大調御凡夫之心動而昏聖人之心靜而明深智之士志於道者詳究此言足用矣身世二事罕有悟者世有世網之患難身有身蘊之苦厄二俱出離方名解脫季子觀樂觀諸國之樂知其各有興衰此外事也豫之觀音觀獨聞之音知其最為殊勝此內事也觀音之名亦非無謂豫於世間法本以薄藝自結人主未嘗依權幸而苟進也於出世間法亦思以至誠合天道未嘗信巫祝之妄求也自然而然無助我者迷人既貪存日虛榮虛利此乃有中之空也又貪歿後虛名虛飾此乃空中之空也皆由自執為我不悟我是虛妄幻纍之根本孰能思之豫覽唐書文苑傳云司空圖退居中條山別墅自稱耐辱居士豫因思佛法中有六度而忍辱是其一耐辱即忍辱之義也夫如是則釋迦文曾為忍辱仙人司空圖自稱耐辱居士噫言之斯無難唯受辱俾如流是唯難哉經教中謂能忍者名為有力大人豫獨斷其理夫人不能忍者則有惡事發作譬如暴風起濤坐致覆沒能忍之者必得惡事消滅譬如沸湯沃雪不暫停留圖若誠如所稱豫謂耐忍辱居士便是有力大人學法之要見性居先槩舉大端諦觀可曉佛經云非幻不滅道經云其精甚真難遇至人欵談妙理老莊道奧既見其清虛能秀禪宗又知其頓漸晚年真學自顧多然天時人事物理道樞舉四大端該括𥁞矣豫於四者靡不經心鋭意詳求悉見崖略撫己自得豈曰虛生卜此談交罕逢深契豫讀圓覺經愛普眼觀門理事無礙讀華嚴經愛普賢觀行智力相資若夫優柔而求厭飫而趣是吾心也云誰知之自思性分稍應佛書引車避仇得須菩提無諍三昧忘言合意入維摩詰不二法門竊冀涓塵積成海嶽是於妙道粗結勝緣隋珠彈雀荊玉抵鵲外物也人猶惜其所失而况精神內寶也棄而不𭣣過求虛冗之榮利者吾惜之深也禪心之體不可不住不可有住當住乎無所住之住金剛經云應生無所住心坐忘論樞翼云不依一物而心常住是也若住此住安穩深固可以到自覺聖智境界之處此其大略也至要也出是非域見莊子之道樞破煩惱賊用維摩之慧劒學也如此人其何謂徐寅律賦體格浮華內有可采豫亦𭣣之有賦述神仙之道約略記其大意明乎道不易致其語有云上不在天不可以翼翥下不在地不可以身到不在乎近不可以耳目審不在乎遠不可以車馬造又有云在乎破塵網清心源出嗜欲之千里入希夷之一門豫亦以為然禮記有云七歲曰悼八十九十曰耄悼與耄雖有罪而不加刑豫今年八十矣因而自思非但不作世間有刑之罪又欲力學出世間無為之道以此比方怡然自是吾老矣自設常用疾力之法譬如金鐵之器可以速辦湯飲者名曰急須子是也今自約於其四威儀中不管情境之順違不管晷刻之多少且即時而入至人無何有之鄉放懷而遊不計近遠又即時而泛如來大寂滅之海冥神而涉不計淺深量𭣣功用此法定矣禪源都序云隨時隨處息業養神正是此也所宜罷諸演説之煩爾豫以文章為佛事者自然道心好陳法要非世間之隨順也又以音聲為佛事者自然靈響暗資法樂非耳外之鏗鏘也言念勝因何求益友豫記得齊己詩句云心清檻底瀟湘月骨冷禪中太華秋又記得似是陳陶詩句云高僧示我真隱心月在中𡶶葛洪井豫愛誦之令人氣格爽夫人生之所值遇者大槩凡有四種焉世運之治亂事理之順違氣質之盛衰情意之苦樂皆有勢數而不能出矣唯有大覺力聖人至明至勇鍊成不二性還源深固者獨能出之豫所見如此復與誰言圓覺經普眼觀門被上根而如來告普眼菩薩言欲求如來淨圓覺心應當正念遠離諸幻先依如來奢摩他行堅持禁戒安處徒衆宴坐靜室豫詳真學當從此始夫安處徒衆則非吾事所云堅持禁戒實資外獎又云宴坐靜室最為要切維摩經云不於三界現身意是為宴坐豫嘗擬之而言云不令一事礙方寸是為虛室然而此皆言其臻極之理必未能爾自思力量且宜從漸雖不及苾芻受具足戒且以嚴持小法檢迹正儀可也雖未能頓虛方寸之地以為吉祥之室且虛方丈之室專於靜居可也吾之老年屬意如此學而欲求外事者唯恐人不知欲求內事者唯恐人知之吾有此言已泄天機諦觀貪欲有二大患固權寵而觸禍機飾私邪而涉畏途知之善避百無一二古今之大情也如是自謂暮年急於無學之學不必須俟從容固當隨時抖擻一切塵念冥心絶境便是入至人無何有之鄉泛如來大寂滅之海此但至小至淺者也古德所言之理乃是至大至深者也服雲母粉不如我自得法門甘露味之妙也聽清商樂不如我獨聞性域天籟音之和也五鼓夢回聰警甚樂福會靈應超然絶倫習定如習射射多則中多中多則分寸無失如此則定心熟矣益慧如益燈燈多則明多明多則毫芒必照如此則慧心廣矣非曰狂言悉因經據吾求自然智切問近思唯變所適他皆倣此儒家之文雅道家之清淨禪家之宴寂吾登耋耄之年彌加樂欲之意自喜性習之天然也如此左氏春秋有語曰老將智而耄及之豫今年登八旬而演法成文其意無盡常患才多以為增上緣然而年及耄而智日新度越古人亦足自慶即非妄有矜伐也加以壽康給足似續蕃衍使我勝修益壯耳豫讀楞嚴經知動靜不生之相讀圓覺經見理事無礙之門非止讀經而皆得法豫讀類書有云隋時高潔之士張文詡博覽文籍以灌園為業州郡頻舉皆不應也以其貧素而賑給之又輒辭不受每歎曰老冉冉而將至恐修名之不立豫見古人之行如此因而省己夫服勞有養自免學老圃之事賜祿足用豈待致公家之恤年登大耋精爽不昧慶幸畢集超於先賢固當激勵志莭亦加先賢一等今不復修飾更求虛名且歎曰老冉冉而已至惜涉道之未深爾豫自冠及耄好讀書未省一日而廢棄亦既大耄尤嗜竺墳酷信所説行之因報如影響不差慨然有挺拔出塵之想猶患前言博而寡要因為四字六句以定積習之法自曉而已其語云知幻識真去邪住正冥心攝念入流聞和不失不勞法要𥁞矣人倫有三大苦未見有丁寧形言而戒懼者仕宦之間暗觸禍機衽席之上密涉畏途輪環之中枉入諸趣夫第一第二之苦可以目覩第三之苦可以心知若能嚴持至行善避此苦者其唯有智力大人乎人之所惜愈增愈踈豫之所惜愈減愈親智者可以意取豫不能以言陳離名相精真體用難為力致不思議解脫境界率由神會故惟道侶非尚談交時君御極舊有至言書云任賢勿二去邪勿疑豫因思之法王御心亦復如是依華嚴經信用普賢依楞嚴經勿受羣邪是也大道人事物理動息各有自然時數若能洞曉臻極而無蒂芥於胸中者可推之曰賢哉大丈夫祿位神物也求者不可得有有者不可得守守者不可得久所以然者不知其道也抑亦數有定分也心之所起念念名為塵垢念之所屬事事名為夢幻當如是觀如是斷勿復分別牽纏大千沙界尚為空𫟚之空名巨萬金錢固是末中之末事非上上智無了了心我自得二大觀法門觀一切動植之形來觸目者悉謂之夢幻觀一切差別之情來觸心者悉謂之魔賊此二者事類繁細不可件析從無始以來與我為仇敵非我獨然而人皆然非止於今已往未來無窮亦皆然我知之矣彼來觸我我當觀之令精審而不迷練之令純熟而不動難則至難未必能爾然比夫全不知觀練者則殊矣我視富貴如秋風之過如浮雲之變視身世如幻化之相如夢想之狀是故我心無所住而住亦不見其無所住之住吾晚年之學住無所住故不為住修無所修故不為修得無所得故不為得説不可説所以無説是故徑荒交絶介然自守而已吾嘗諦觀多士求其傑出若乃博聞強記洪筆麗藻學洞天人之際才堪將相之科根器得中或有之矣必要中根以上自然智生知高蹈之大方見還源之妙性超出世表卓然獨存者吾不得而見之矣莊子外篇有虛緣葆真之説圓覺經普眼章有理事無礙法門豫嘗究觀其體一也夫順緣而不失真與應事而不妨理有何差別宏達之士適變會同固當如此若偏執一家之言而意成隔閡者非也南華之經有所評品謂之蔽蒙之民倒置之民天之戮民豫歎士大夫為何不知此言可愧可畏又西域之經有所尊獎謂之開士大士無上士為何不知此言可貴可愛而但蠢蠢然紛紛然與萬物同化滅欲何為哉夫聖人作易窮神知化窮理𥁞性此乃數術之大者也數術雖大而有限量惟世雄妙覺之理不可以數術窮之獨出限量之外固非偏見孤説角其勝負者也金剛齊云我不依有住而住不依無住而住如是而住豫因續之以言云我願於造次顛沛之際逆情垂意之時亦不失安然而住采集內典四句以明己意云宴坐靜室冥神絶境凡所有相夢幻泡影道家之言虛無但得其體佛教之言寂照體用兼備真學之流所宜具此知見分其半滿清心釋纍姑務息緣澄神定靈居常宴坐用之不匱其如豫何儒書之要仁與義道書之要恬養智佛書之要定生慧兼而有之廣大悉備非理外至當如逢虎即時而避勿恃格獸之勇非理內起當如探湯即時而止勿從染指之欲大率如此不煩具陳老子云有物混成先天地生此乃釋教所説一真法界是也周易云精氣為物遊魂為變此乃釋教所説羣有從一真起滅名為生死隨其因報輪環各入諸趣是也若非大和會不凝滯何以到窮理盡性之處不以時刻之少多處所之喧靜情境之違順冥心息念常存揔持夫道家法要氣為元也調柔順適自覺氣之和禪家法要性為宗也空明洞徹自覺性之靈二法相符其妙盡矣多藏厚亡不如積而能散高位疾顛不如卑以自牧是以古人有言富不如貧貴不如賤者識之深者也內學之人但依道家流所説真人至人體純素之理禪家流所説大乘上乘入空妙之法協用臻極誰窮智力修證儀中已説須具五緣豫嘗思之尚未該備今自立一説須具四緣第一具心緣深信樂欲此為根本其次具身緣無諸疾瘴事役其次具資緣有物足用有人善奉其次具世緣運歷平寧是也最先由己次第委命豫愛經教中所言棲心聖境冥心絶境安住妙境若能知而密契語默一致其要備矣何假外求於人豫讀經得楞嚴圓通法門圓覺無礙法門維摩不二法門與夫誦其經而籍其數者異矣學道者但得寐無夢而寤無憂譽不喜而毀不怒吻色空而如一即動靜而皆如練此純深其道成矣歸心聖境上有古先生藏事私庭下有𨽾子弟吾之慶幸灼然居多圓覺經中敘普眼之觀重重是幻沖虛經中辨爭鹿之訟重重是夢是知即今之我是幻也即我之所是夢也見此大空已是真智猶名半智又此普眼章中言非幻不滅如老子云其精甚真此則不空若能洞曉非空非不空超絶混融方名全智豫已大耋之年矣尚多遊心文章愈愛體勢混融格力雄重才學典雅語句清拔內視靈府殊未有昏濁之狀法華之悟入圓覺之隨順吾思詳練兼該以盡致力之妙斯亦無得之得信正説作正觀志在超絶洞曉無為之理者名為達道信邪説作邪觀志在貪得增上有為之事者名為侫佛此二人心霄壤殊致豫好看內典若要學出世聖人圓寂妙湛之心固不可及然而觀練增深了達世間之幻妄銷去胸中之蒂芥比不知者亦獲法利萬分之一也人所愛欲大率有二有聲無形謂之名或物或事謂之利殊勝反是亦有其二美善自得謂之德美善可蹈謂之道條目繁細此舉宏綱前輩有詩句云兩輪日月般興廢一合乾坤夾是非有以見是非之頗多也如此今人著文褒貶古人以為論有以見是非之有餘也又如此故莊生之書以環中之空為道樞釋氏之書以心言路絶名曰不可思議解脫真學之士若不到此則其言意未有休歇之地真學之士且能言不出是非色不形喜慍意不存愛憎積習純深亦不易得寂然不動定體也志以道寧油然而生慧用也心華發越混而為一何慮何營人生而靜天之性也此為因地感物而動性之欲也此為緣起息緣反照是為要妙一真法界本自常然三世妄心了不可得始覺之覺名曰聖胎難忍能忍謂之有力大人觀練交深所作辦矣豫讀類書相術門有説唐時事初高智周來濟郝處俊孫處約同遊寓於揚州而江都人石仲覽傾産以待之嘗引相工視濟等相工曰此四人皆宰相也來公早貴而末途屯躓高公晚達而最為壽考夫速登者易顛徐進者少患天之道也而濟等皆如所言又有説五代周時趙乂世為星官仍於袁許之鑒長於氣色清泰未乂待詔內庭嘗與樞密學士呂琦同行琦從容密問國家運祚乂曰來年厄會之期俟過別論琦敦訊不已乂曰保邦在刑政保祚在福德於刑政則術士不敢言奈何際會諸公罕有卓絶福德者下官實有恤緯之僭尋而晉高祖入洛豫因思藝術之士亦如此言是知天時人事必以理道居先耳維摩經疏中有説云文字般若謂名句文三者平顯般若故又圓覺道場修證儀中説修行初地得經綸智豫因自思好看佛書道書得意著文亦不失學法之巧慧耳酷嗜於道談乎無味之味也獨聞其和天然無聲之聲也有如此者名決定相不嗅驕餌則免五鼎之烹不入智籠則免四隅之觸古人高蹈肥遁其見如此若復別得妙道何以加焉學仙至要無越於深根固蒂長生久視安養神氣自求獨善之利學禪至要無越於定慧相合合而後明化導生靈曲成兼濟之名其意則已備矣其言則無窮也豫讀內外經典咸有所得讀法華經信入佛知見為大事所以依正覺觀其妙不使心昏迷讀周易信蒙以養正為聖功所以履正道晦其迹不求人見知協用交濟何往弗宜內學之士智明而無為行於正道者是也識暗而有作行於邪道者非也大率如此法門樞要澡雪靈明之心道可致也固存幻化之身道所寄也牽制重復之緣道有纍也於此觀練尤宜純熟蒙以正功乃聖其直貫天必無愆應晦而明用乃靈其照對物必無遁形我如是言亦不立名今采經録之語配為四句諸幻𥁞滅覺心不動照體獨立物我皆如法相及此吾道成矣儒家燕居間暇和舒顯放懷之容止禪家宴坐澄心空寂晦入道之指歸理有淺深説難窮盡道書言真人至人佛書言大乘最上乘者其理大同小異若執所説則難為和會凡一百八十一章覆校官博士臣劉光第校對官中書臣范來宗謄録監生臣宋允辰詳校官監察御史臣王爾烈檢討臣何思鈞覆勘
